<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Chit Funds - Management Vault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg:#0a0e1a; --card:#141b2d; --inp:#1c253b; --gold:#f39c12; --border:#252f48; --text-dim:#8e9aaf; --purple-bg: rgba(129, 140, 248, 0.1); }
        body { background-color:var(--bg); color:white; font-family:'Segoe UI',sans-serif; padding-bottom:100px; margin:0; }
        
        .stat-card { background:var(--card); border:1px solid var(--border); border-radius:15px; padding:20px; text-align:center; }
        .stat-num { font-size:2rem; font-weight:bold; color:#fff; }
        .btn-record-main { background:var(--gold); color:#000; font-weight:800; border:none; padding:18px; border-radius:15px; width:100%; font-size:1.1rem; box-shadow: 0 4px 15px rgba(243, 156, 18, 0.2); }
        .btn-print-orange { background:#ff851b; color:black; font-weight:800; border-radius:8px; padding:6px 18px; border:none; font-size:0.85rem; }

        .search-box { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:15px; width:100%; color:white; outline:none; }
        .suggestions-list { position:absolute; width:100%; background:var(--inp); border:1px solid var(--border); z-index:3000; display:none; border-radius:0 0 12px 12px; }
        .suggestion-item { padding:12px; cursor:pointer; border-bottom:1px solid var(--border); }
        .suggestion-item:hover { background:var(--card); color:var(--gold); }

        .member-card { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:20px; margin-top:20px; }
        .avatar { width:45px; height:45px; background:rgba(243,156,18,0.1); border:1px solid var(--gold); color:var(--gold); border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:bold; }
        .badge-v3 { background:rgba(243,156,18,0.2); color:var(--gold); border:1px solid var(--gold); padding:2px 8px; border-radius:6px; font-size:0.7rem; font-weight:bold; }
        .badge-meta { background:rgba(99,102,241,0.15); color:#a5b4fc; border:1px solid rgba(99,102,241,0.3); padding:3px 10px; border-radius:6px; font-size:0.7rem; margin-right: 5px;}
        
        .history-summary-bar { background:rgba(255,255,255,0.03); padding:12px 15px; border-radius:10px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; margin-top:15px; border-bottom: 2px solid var(--border); }
        .table-history { width:100%; font-size:0.75rem; margin-top:10px; border-collapse: separate; border-spacing: 0 4px; }
        .table-history th { color:var(--text-dim); padding:10px; text-transform:uppercase; font-size:0.6rem; }
        .table-history td { padding:12px 10px; vertical-align: middle; background: rgba(255,255,255,0.01); }
        .row-multi { background: var(--purple-bg) !important; border-left: 3px solid #818cf8; }

        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; padding:20px; overflow-y:auto; }
        .m-content { background:var(--card); border-radius:25px; padding:25px; max-width:500px; margin:auto; border: 1px solid var(--border); }
        .f-inp { background:var(--inp); border:1px solid var(--border); color:white; padding:12px; border-radius:10px; width:100%; margin-bottom:12px; font-size:0.9rem; }
        .text-dim { color: var(--text-dim); }

        .nav-bar { position:fixed; bottom:0; width:100%; background:#070b14; display:flex; justify-content:space-around; padding:15px 0; border-top:1px solid var(--border); }
        .nav-item { cursor:pointer; text-align:center; font-size:0.7rem; color:var(--text-dim); text-decoration:none; }
        .nav-item.active { color:var(--gold); font-weight: bold; }
    </style>
</head>
<body>

<div class="container py-3">
    <div class="row g-2 mb-4">
        <div class="col-4"><div class="stat-card"><div class="stat-num" id="stM">0</div><small class="text-dim">MEMBERS</small></div></div>
        <div class="col-4"><div class="stat-card"><div class="stat-num" id="stG">0</div><small class="text-dim">GROUPS</small></div></div>
        <div class="col-4"><div class="stat-card"><div class="stat-num text-success" id="stT">₹0</div><small class="text-dim">TODAY</small></div></div>
    </div>

    <button class="btn-record-main mb-4" onclick="openPaymentModal()">💳 Record Payment</button>

    <div class="position-relative mb-3">
        <input type="text" id="mSearch" class="search-box" placeholder="Search Member for Summary / PDF..." oninput="handleSearch(this.value)">
        <div id="mSuggestions" class="suggestions-list shadow-lg"></div>
    </div>

    <div id="ledgerArea"></div>
</div>

<div id="payModal" class="modal-overlay">
    <div class="m-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="text-white fw-bold mb-0">💳 Record Payment</h5>
            <button class="btn btn-sm btn-outline-warning" onclick="sync()">Refresh</button>
        </div>
        
        <label class="small text-dim mb-1">PAYMENT DATE</label>
        <input type="date" id="pDate" class="f-inp">
        
        <label class="small text-dim mb-1">MEMBER</label>
        <div class="position-relative">
            <input type="text" id="pMemSearch" class="f-inp" placeholder="🔍 Search Member..." oninput="handleModalSearch(this.value)">
            <div id="pSuggestions" class="suggestions-list"></div>
            <input type="hidden" id="pSelectedMid">
        </div>

        <label class="small text-dim mb-1">GROUP / ENROLLMENT</label>
        <select id="pGroup" class="f-inp" onchange="checkChitStatus()"><option value="">-- Select Member First --</option></select>
        
        <div class="row g-2">
            <div class="col-6"><label class="small text-dim">CHIT AMOUNT</label><input type="number" id="pChit" class="f-inp" placeholder="₹ per month"></div>
            <div class="col-6"><label class="small text-dim">TOTAL PAID</label><input type="number" id="pPaid" class="f-inp" placeholder="₹ total"></div>
        </div>

        <label class="small text-dim mb-1">PAID BY</label>
        <select id="pMode" class="f-inp">
            <option value="GPay">GPay</option>
            <option value="PhonePe">PhonePe</option>
            <option value="Cash">Cash</option>
            <option value="Bank Transfer">Bank Transfer</option>
        </select>

        <label class="small text-dim mb-1">CHIT PICKED?</label>
        <select id="pPicked" class="f-inp">
            <option value="No">No</option>
            <option value="Yes">Yes ✅</option>
        </select>

        <button class="btn w-100 py-3 fw-bold mt-2" style="background: linear-gradient(90deg, #ff8000, #ff9500); color: black; border-radius: 12px;" onclick="savePayment()">✓ Sync Payment</button>
        <button class="btn btn-link w-100 text-white" onclick="closeModal('payModal')">Cancel</button>
    </div>
</div>

<nav class="nav-bar">
    <a class="nav-item active">🏠<br>Home</a>
    <a class="nav-item">📁<br>Groups</a>
    <a class="nav-item">📲<br>Remind</a>
    <a class="nav-item">💾<br>Backup</a>
</nav>

<script>
// --- FIREBASE SETUP ---
const firebaseConfig = { apiKey: "AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU", authDomain: "ak-events-2016.firebaseapp.com", projectId: "ak-events-2016" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let _cache = { m: [], g: [], p: [] };

async function sync() {
    const [m, g, p] = await Promise.all([db.collection('members').get(), db.collection('groups').get(), db.collection('payments').get()]);
    _cache.m = m.docs.map(d => ({id:d.id, ...d.data()}));
    _cache.g = g.docs.map(d => ({id:d.id, ...d.data()}));
    _cache.p = p.docs.map(d => ({id:d.id, ...d.data()}));
    
    document.getElementById('stM').innerText = _cache.m.length;
    document.getElementById('stG').innerText = _cache.g.length;
}

// Search & Selection
function handleSearch(val) {
    const list = document.getElementById('mSuggestions');
    if (val.length < 1) { list.style.display = 'none'; return; }
    const filtered = _cache.m.filter(m => m.name.toLowerCase().includes(val.toLowerCase()));
    list.innerHTML = filtered.map(m => `<div class="suggestion-item" onclick="selectMember('${m.id}', '${m.name}')">${m.name}</div>`).join('');
    list.style.display = 'block';
}

function handleModalSearch(val) {
    const list = document.getElementById('pSuggestions');
    if (val.length < 1) { list.style.display = 'none'; return; }
    const filtered = _cache.m.filter(m => m.name.toLowerCase().includes(val.toLowerCase()));
    list.innerHTML = filtered.map(m => `<div class="suggestion-item" onclick="selectForPay('${m.id}', '${m.name}')">${m.name}</div>`).join('');
    list.style.display = 'block';
}

function selectMember(id, name) {
    document.getElementById('mSearch').value = name;
    document.getElementById('mSuggestions').style.display = 'none';
    renderLedger(id);
}

function selectForPay(id, name) {
    document.getElementById('pMemSearch').value = name;
    document.getElementById('pSelectedMid').value = id;
    document.getElementById('pSuggestions').style.display = 'none';
    const member = _cache.m.find(x => x.id === id);
    const gDrop = document.getElementById('pGroup');
    gDrop.innerHTML = '<option value="">-- Select Group --</option>' + (member.groupIds || []).map(gid => {
        const group = _cache.g.find(g => g.id === gid);
        return `<option value="${gid}">${group ? group.name : 'Unknown Group'}</option>`;
    }).join('');
}

// Logic: Auto-disable Picked
async function checkChitStatus() {
    const mid = document.getElementById('pSelectedMid').value;
    const gid = document.getElementById('pGroup').value;
    const pickedSelect = document.getElementById('pPicked');
    const alreadyPicked = _cache.p.some(p => p.memberId === mid && p.groupId === gid && p.chitPicked === 'Yes');

    if (alreadyPicked) {
        pickedSelect.value = "No";
        pickedSelect.options[1].disabled = true;
        pickedSelect.style.opacity = "0.5";
    } else {
        pickedSelect.options[1].disabled = false;
        pickedSelect.style.opacity = "1";
    }
}

// Render Ledger with Expansion
function renderLedger(mid) {
    const m = _cache.m.find(x => x.id === mid);
    const mPays = _cache.p.filter(p => p.memberId === mid);
    const totalPaid = mPays.reduce((s, p) => s + (parseFloat(p.amountPaid) || 0), 0);
    const totalBal = mPays.reduce((s, p) => s + (parseFloat(p.balance) || 0), 0);

    document.getElementById('ledgerArea').innerHTML = `
        <div class="member-card">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <div class="avatar">${m.name[0]}</div>
                    <div><h4 class="mb-0 fw-bold">${m.name}</h4><small class="text-dim">${mPays.length} payments · 1 group</small></div>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-sm border-secondary text-white">✏️</button>
                    <button class="btn-print-orange">🖨️ Print</button>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-start mt-4">
                <div>
                    <span class="fw-bold fs-5" style="color:var(--gold)">📂 5 Lakhs <span class="badge-v3 ms-2">V3</span></span>
                    <div class="mt-2">
                        <span class="badge-meta">🗓️ Started: 05/02/2026</span>
                        <span class="badge-meta">📅 Due: 5th</span>
                        <span class="badge-meta">📦 2 bulk payments</span>
                    </div>
                </div>
                <div class="text-end">
                    <h4 class="mb-0">19<small class="text-dim">/21</small></h4>
                    <small class="text-dim" style="font-size:0.6rem">MONTHS PENDING</small>
                </div>
            </div>

            <div class="history-summary-bar" onclick="toggleHistory()">
                <span class="text-dim fw-bold small">PAYMENT HISTORY (${mPays.length} ENTRIES)</span>
                <div class="d-flex gap-3">
                    <span class="text-success fw-bold">₹${totalPaid.toLocaleString()} paid</span>
                    <span class="text-warning fw-bold">₹${totalBal.toLocaleString()} bal</span>
                    <span id="chev">▼</span>
                </div>
            </div>

            <div id="histContent" style="display:none; overflow-x:auto;">
                <table class="table-history">
                    <thead>
                        <tr><th>#</th><th>Month</th><th>Pay Date</th><th>Chit</th><th>Paid</th><th>Bal</th><th>Mode</th><th>Pick</th></tr>
                    </thead>
                    <tbody>
                        ${mPays.map((p, i) => `
                            <tr class="${p.numMonths > 1 ? 'row-multi' : ''}">
                                <td>${i+1}</td>
                                <td class="text-primary fw-bold">${p.monthCovered || '05/03/2026'}</td>
                                <td>${p.date}</td>
                                <td>₹${(parseFloat(p.amountPaid) + parseFloat(p.balance)).toLocaleString()}</td>
                                <td class="text-success fw-bold">₹${parseFloat(p.amountPaid).toLocaleString()}</td>
                                <td class="text-warning">₹${parseFloat(p.balance).toLocaleString()}</td>
                                <td>${p.mode || 'GPay'}</td>
                                <td>${p.chitPicked === 'Yes' ? '✅' : '—'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        </div>
    `;
}

function toggleHistory() {
    const el = document.getElementById('histContent');
    const isHidden = el.style.display === 'none';
    el.style.display = isHidden ? 'block' : 'none';
    document.getElementById('chev').style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
}

function openPaymentModal() {
    document.getElementById('pDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('payModal').style.display = 'block';
}

function closeModal(id) { document.getElementById(id).style.display = 'none'; }

async function savePayment() {
    const data = {
        memberId: document.getElementById('pSelectedMid').value,
        groupId: document.getElementById('pGroup').value,
        amountPaid: parseFloat(document.getElementById('pPaid').value),
        balance: parseFloat(document.getElementById('pChit').value) - parseFloat(document.getElementById('pPaid').value),
        mode: document.getElementById('pMode').value,
        chitPicked: document.getElementById('pPicked').value,
        date: document.getElementById('pDate').value
    };
    await db.collection('payments').add(data);
    closeModal('payModal');
    sync();
}

sync();
</script>
</body>
</html>
