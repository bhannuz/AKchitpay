<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Chit Funds - Admin Portal v2.5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg-dark:#0a0e1a; --card-bg:#141b2d; --input-bg:#1c253b; --accent-gold:#f39c12; --border:#252f48; --text-dim:#8e9aaf; }
        body { background-color:var(--bg-dark); color:white; font-family:'Segoe UI',sans-serif; padding-bottom:100px; margin:0; }
        .stat-card { background:var(--card-bg); border:1px solid var(--border); border-radius:15px; padding:15px; text-align:center; }
        .btn-record { background:var(--accent-gold); color:#000; font-weight:bold; border:none; padding:15px; border-radius:15px; width:100%; font-size:1.1rem; }
        .search-box { background:var(--card-bg); border:1px solid var(--border); border-radius:12px; padding:12px; width:100%; color:white; outline:none; }
        .suggestions-list { position:absolute; width:100%; background:var(--input-bg); border:1px solid var(--border); z-index:3000; max-height:200px; overflow-y:auto; border-radius:0 0 12px 12px; }
        .suggestion-item { padding:12px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.05); }
        .suggestion-item:hover { background:#252f48; color:var(--accent-gold); }
        .member-card { background:var(--card-bg); border:1px solid var(--border); border-radius:18px; padding:20px; margin-bottom:15px; }
        .avatar-circle { width:45px; height:45px; background:rgba(243,156,18,0.15); border:1px solid var(--accent-gold); color:var(--accent-gold); border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:1.2rem; }
        .btn-print { background:#ff851b; color:black; font-weight:bold; border-radius:8px; padding:5px 15px; border:none; }
        .nav-bar { position:fixed; bottom:0; width:100%; background:#070b14; display:flex; justify-content:space-around; padding:15px 0; border-top:1px solid var(--border); z-index:1000;}
        .nav-item { cursor:pointer; text-align:center; font-size:0.7rem; color:var(--text-dim); text-decoration:none; }
        .nav-item.active { color:var(--accent-gold); }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; padding:20px; }
        .m-content { background:var(--card-bg); border-radius:25px; padding:25px; max-width:450px; margin:auto; border:1px solid var(--border); }
        .tab-content { display:none; } .tab-content.active { display:block; }
    </style>
</head>
<body>

<div class="container py-3">
    <div id="homeTab" class="tab-content active">
        <div class="row g-2 mb-4 text-center">
            <div class="col-4"><div class="stat-card"><b class="fs-3 d-block" id="countM">0</b><small class="text-dim">Members</small></div></div>
            <div class="col-4"><div class="stat-card"><b class="fs-3 d-block" id="countG">0</b><small class="text-dim">Groups</small></div></div>
            <div class="col-4"><div class="stat-card"><b class="fs-3 d-block text-success" id="sumT">₹0</b><small class="text-dim">Today</small></div></div>
        </div>

        <button class="btn-record mb-4" onclick="openModal('payModal')">💳 Record Payment</button>

        <div class="position-relative mb-4">
            <input type="text" id="mSearch" class="search-box" placeholder="🔍 Search Member for Summary / PDF..." oninput="handleSearch(this.value)">
            <div id="mSuggestions" class="suggestions-list" style="display:none;"></div>
        </div>

        <div class="row g-2 mb-4">
            <div class="col-6"><button class="btn btn-outline-warning w-100 py-3 fw-bold" onclick="openModal('memModal')">👤 Create Member</button></div>
            <div class="col-6"><button class="btn btn-outline-success w-100 py-3 fw-bold" onclick="openModal('grpModal')">🏦 New Group</button></div>
        </div>

        <div id="ledgerArea"></div>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="location.reload()">🏠<br>Home</div>
    <div class="nav-item">📁<br>Groups</div>
    <div class="nav-item">📲<br>Remind</div>
    <div class="nav-item">💾<br>Backup</div>
</nav>

<div id="payModal" class="modal-overlay"><div class="m-content">
    <h5 class="text-warning mb-3">Record Payment</h5>
    <select id="pM" class="form-control mb-2 bg-dark text-white border-secondary"></select>
    <input type="number" id="pA" class="form-control mb-2 bg-dark text-white border-secondary" placeholder="Amount">
    <button class="btn btn-warning w-100" onclick="savePayment()">Sync Payment</button>
    <button class="btn btn-link w-100 text-white" onclick="closeModal('payModal')">Cancel</button>
</div></div>

<div id="memModal" class="modal-overlay"><div class="m-content">
    <h5 class="text-warning mb-3">Add Member</h5>
    <input type="text" id="mN" class="form-control mb-2 bg-dark text-white border-secondary" placeholder="Name">
    <input type="tel" id="mP" class="form-control mb-2 bg-dark text-white border-secondary" placeholder="Phone">
    <button class="btn btn-warning w-100" onclick="saveMember()">Save</button>
    <button class="btn btn-link w-100 text-white" onclick="closeModal('memModal')">Cancel</button>
</div></div>

<script>
const firebaseConfig = { apiKey: "AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU", authDomain: "ak-events-2016.firebaseapp.com", projectId: "ak-events-2016" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let _db = { members: [], groups: [], payments: [] };

async function init() {
    const [m, g, p] = await Promise.all([db.collection('members').get(), db.collection('groups').get(), db.collection('payments').get()]);
    _db.members = m.docs.map(d => ({id: d.id, ...d.data()}));
    _db.groups = g.docs.map(d => ({id: d.id, ...d.data()}));
    _db.payments = p.docs.map(d => ({id: d.id, ...d.data()}));

    document.getElementById('countM').innerText = _db.members.length;
    document.getElementById('countG').innerText = _db.groups.length;
    
    const pSel = document.getElementById('pM');
    pSel.innerHTML = _db.members.map(x => `<option value="${x.id}">${x.name}</option>`).join('');
}

function handleSearch(val) {
    const list = document.getElementById('mSuggestions');
    if (val.length < 2) { list.style.display = 'none'; return; }
    const filtered = _db.members.filter(m => m.name.toLowerCase().includes(val.toLowerCase()));
    list.innerHTML = filtered.map(m => `<div class="suggestion-item" onclick="selectMember('${m.id}', '${m.name}')">${m.name}</div>`).join('');
    list.style.display = filtered.length ? 'block' : 'none';
}

function selectMember(id, name) {
    document.getElementById('mSearch').value = name;
    document.getElementById('mSuggestions').style.display = 'none';
    viewLedger(id);
}

function viewLedger(mid) {
    const member = _db.members.find(x => x.id === mid);
    const mPays = _db.payments.filter(p => p.memberId === mid);
    const totalPaid = mPays.reduce((s, p) => s + (p.amountPaid || 0), 0);

    // Rendering exactly like image_3.png
    document.getElementById('ledgerArea').innerHTML = `
        <div class="member-card">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="d-flex align-items-center gap-3">
                    <div class="avatar-circle">${member.name[0]}</div>
                    <div>
                        <h5 class="mb-0 fw-bold">${member.name}</h5>
                        <small class="text-dim">${mPays.length} payments</small>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-outline-secondary">✏️</button>
                    <button class="btn-print" onclick="window.print()">🖨️ Print</button>
                </div>
            </div>
            
            <div style="background:rgba(255,255,255,0.03); border-radius:12px; padding:15px;">
                <div class="d-flex justify-content-between small text-dim mb-1">
                    <span>PAYMENT HISTORY (${mPays.length} ENTRIES)</span>
                    <span class="text-success fw-bold">₹${totalPaid.toLocaleString()} paid ▶</span>
                </div>
            </div>
        </div>
    `;
}

async function saveMember() {
    await db.collection('members').add({ name: document.getElementById('mN').value, phone: document.getElementById('mP').value });
    closeModal('memModal'); init();
}

function openModal(id) { document.getElementById(id).style.display = 'block'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

init();
</script>
</body>
</html>
