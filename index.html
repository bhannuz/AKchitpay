<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPI Payment Page</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  body { font-family: Arial; background:#f4f6f9; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
  .box { background:#fff; padding:20px; border-radius:12px; width:340px; box-shadow:0 5px 15px rgba(0,0,0,0.1); text-align:center; }
  h2 { margin-bottom:10px; color:#333; }
  input { width:100%; padding:12px; margin:6px 0; border-radius:6px; border:1px solid #ccc; font-size:16px; }
  button { width:100%; padding:14px; margin:8px 0; border:none; border-radius:6px; font-size:16px; font-weight:bold; cursor:pointer; }
  .gpay { background:#00c853; color:white; }
  .phonepe { background:#6a1b9a; color:white; }
  .otherupi { background:#ff9800; color:white; }
  #qrcode { margin-top:15px; }
  .small { font-size:12px; color:#888; margin-top:6px; }
</style>
</head>
<body>

<div class="box">
  <h2>Pay via UPI</h2>
  <input type="number" id="amount" placeholder="Enter Amount ₹">
  <input type="text" id="note" placeholder="Note (optional)">

  <button class="gpay" onclick="pay('gpay')">Pay with GPay</button>
  <button class="phonepe" onclick="pay('phonepe')">Pay with PhonePe</button>
  <button class="otherupi" onclick="pay('other')">Pay with Other UPI App</button>

  <div id="qrcode"></div>
  <p class="small">Scan QR code if app doesn’t open automatically.</p>
</div>

<script>
const UPI_ID = "yourupi@upi"; // 🔴 Replace with your UPI ID
const PAYEE_NAME = "Your Name";

function pay(app){
  const amount = document.getElementById("amount").value;
  const note = encodeURIComponent(document.getElementById("note").value || "Payment");
  if(!amount){ alert("Enter amount"); return; }

  let upiLink = `upi://pay?pa=${UPI_ID}&pn=${encodeURIComponent(PAYEE_NAME)}&am=${amount}&cu=INR&tn=${note}`;

  // Generate QR code
  document.getElementById("qrcode").innerHTML="";
  new QRCode(document.getElementById("qrcode"), { text:upiLink, width:180, height:180 });

  const isAndroid = /Android/i.test(navigator.userAgent);
  const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

  if(app==='gpay' && isAndroid){
    // Android intent URL for GPay
    window.location.href = `intent://pay?pa=${UPI_ID}&pn=${encodeURIComponent(PAYEE_NAME)}&am=${amount}&cu=INR&tn=${note}#Intent;scheme=upi;package=com.google.android.apps.nbu.paisa.user;end`;
  } else if(app==='phonepe' && isAndroid){
    // Android intent URL for PhonePe
    window.location.href = `intent://pay?pa=${UPI_ID}&pn=${encodeURIComponent(PAYEE_NAME)}&am=${amount}&cu=INR&tn=${note}#Intent;scheme=upi;package=com.phonepe.app;end`;
  } else {
    // iOS or Android fallback for other UPI apps
    window.location.href = upiLink;
  }
}
</script>
</body>
</html>
