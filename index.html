<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Admin - Bulk UPI Reminders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg:#0a0e1a; --card:#141b2d; --inp:#1c253b; --gold:#f39c12; --border:#252f48; --text-dim:#8e9aaf; --green:#2ecc71; }
        body { background-color:var(--bg); color:white; font-family:'Segoe UI',sans-serif; padding-bottom:120px; }
        .stat-card { background:var(--card); border:1px solid var(--border); border-radius:15px; padding:15px; text-align:center; }
        .btn-record-main { background:var(--gold); color:#000; font-weight:800; border:none; padding:18px; border-radius:15px; width:100%; margin-bottom: 15px;}
        .member-card { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:20px; margin-top:20px; }
        .table-custom { width:100%; font-size:0.8rem; margin-top:10px; }
        .table-custom th { color:var(--text-dim); padding:10px; text-transform:uppercase; font-size:0.6rem; }
        .table-custom td { padding:10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; padding:20px; overflow-y:auto; }
        .m-content { background:var(--card); border-radius:25px; padding:25px; max-width:480px; margin:auto; border: 1px solid var(--border); }
        .f-inp { background:var(--inp); border:1px solid var(--border); color:white; padding:12px; border-radius:10px; width:100%; margin-bottom:15px; }
        .f-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; display: block; }
        .nav-bar { position:fixed; bottom:0; width:100%; background:#070b14; display:flex; justify-content:space-around; padding:15px 0; border-top:1px solid var(--border); }
        .nav-item { cursor:pointer; text-align:center; font-size:0.7rem; color:var(--text-dim); }
        .nav-item.active { color:var(--gold); font-weight: bold; }
        .tab-content { display:none; } .tab-content.active { display:block; }
        .btn-bulk { background: transparent; border: 1px solid var(--gold); color: var(--gold); font-size: 0.7rem; padding: 4px 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container py-3">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="mb-0 fw-bold text-warning">AK ADMIN</h5>
        <button class="btn btn-sm btn-outline-secondary text-white" onclick="openModal('setupModal')">⚙️ UPI Setup</button>
    </div>

    <div class="row g-2 mb-4 text-center">
        <div class="col-4"><div class="stat-card"><div class="stat-num" id="stM" style="font-size:1.5rem">0</div><small class="text-dim">MEMBERS</small></div></div>
        <div class="col-4"><div class="stat-card"><div class="stat-num" id="stG" style="font-size:1.5rem">0</div><small class="text-dim">GROUPS</small></div></div>
        <div class="col-4"><div class="stat-card"><div class="stat-num text-success" id="stT" style="font-size:1.5rem">₹0</div><small class="text-dim">TODAY</small></div></div>
    </div>

    <div id="homeTab" class="tab-content active">
        <button class="btn-record-main" onclick="openModal('payModal')">💳 Record Payment</button>
        <div class="row g-2 mb-4">
            <div class="col-6"><button class="btn btn-outline-warning w-100 py-3 fw-bold" style="border-radius:12px;" onclick="openModal('memModal')">👤 New Member</button></div>
            <div class="col-6"><button class="btn btn-outline-success w-100 py-3 fw-bold" style="border-radius:12px;" onclick="openModal('grpModal')">🏦 New Group</button></div>
        </div>
        <div id="ledgerArea"></div>
    </div>

    <div id="groupsTab" class="tab-content">
        <div id="groupsArea"></div>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="switchTab('home', this)">🏠<br>Home</div>
    <div class="nav-item" onclick="switchTab('groups', this)">📁<br>Groups</div>
</nav>

<div id="setupModal" class="modal-overlay">
    <div class="m-content">
        <h5 class="text-warning fw-bold mb-3">⚙️ Admin Settings</h5>
        <label class="f-label">Your Business UPI ID</label>
        <input type="text" id="adminUPI" class="f-inp" placeholder="e.g. 8121723153@ybl">
        <label class="f-label">Standard Monthly Chit Amount (Default)</label>
        <input type="number" id="stdAmt" class="f-inp" placeholder="₹ 10000">
        <button class="btn btn-warning w-100 py-3 fw-bold" onclick="saveSettings()">Save Configuration</button>
        <button class="btn btn-link w-100 text-white mt-2" onclick="closeModal('setupModal')">Close</button>
    </div>
</div>

<div id="payModal" class="modal-overlay"><div class="m-content">
    <h5>Record Payment</h5>
    <select id="pMember" class="f-inp" onchange="updateGroupDropdown()"></select>
    <select id="pGroup" class="f-inp"></select>
    <input type="number" id="pPaid" class="f-inp" placeholder="Paid ₹">
    <input type="number" id="pBal" class="f-inp" placeholder="Balance ₹">
    <button class="btn btn-warning w-100 py-3" onclick="savePayment()">Sync</button>
</div></div>

<script>
const firebaseConfig = { apiKey: "AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU", authDomain: "ak-events-2016.firebaseapp.com", projectId: "ak-events-2016" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let _cache = { m: [], g: [], p: [] };
let _settings = { upi: localStorage.getItem('ak_upi') || '', amt: localStorage.getItem('ak_amt') || '0' };

async function sync() {
    const [m, g, p] = await Promise.all([db.collection('members').get(), db.collection('groups').get(), db.collection('payments').get()]);
    _cache.m = m.docs.map(d => ({id:d.id, ...d.data()}));
    _cache.g = g.docs.map(d => ({id:d.id, ...d.data()}));
    _cache.p = p.docs.map(d => ({id:d.id, ...d.data()}));
    document.getElementById('stM').innerText = _cache.m.length;
    document.getElementById('stG').innerText = _cache.g.length;
}

function switchTab(id, el) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id + 'Tab').classList.add('active');
    el.classList.add('active');
    if(id === 'groups') renderGroups();
}

function saveSettings() {
    const upi = document.getElementById('adminUPI').value;
    const amt = document.getElementById('stdAmt').value;
    localStorage.setItem('ak_upi', upi);
    localStorage.setItem('ak_amt', amt);
    _settings = { upi, amt };
    alert("Settings Saved!");
    closeModal('setupModal');
}

function renderGroups() {
    const area = document.getElementById('groupsArea');
    area.innerHTML = _cache.g.map(group => {
        const members = _cache.m.filter(m => m.groupId === group.id || (m.groupIds && m.groupIds.includes(group.id)));
        return `
            <div class="member-card">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="text-warning fw-bold mb-0">🏦 ${group.name}</h6>
                    <button class="btn-bulk" onclick="bulkRemind('${group.id}', '${group.name}')">📲 Bulk Remind</button>
                </div>
                <table class="table-custom">
                    ${members.map(m => `
                        <tr>
                            <td>${m.name}</td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-success py-0" style="font-size:0.6rem" onclick="sendWA('${m.phone}','${m.name}','${group.name}')">📲</button>
                            </td>
                        </tr>`).join('')}
                </table>
            </div>`;
    }).join('');
}

function sendWA(phone, name, gName, isBulk = false) {
    if(!phone) return;
    if(!_settings.upi) return alert("Please set your UPI ID in Settings first!");

    const amt = _settings.amt || "0";
    const upiLink = `upi://pay?pa=${_settings.upi}&pn=AK%20Chit%20Funds&am=${amt}&cu=INR`;
    
    // Using a URL shortener service or just long text
    const msg = `Hello ${name}, reminder for AK Chit Funds (${gName}).\n\nPay via UPI: ${upiLink}\n\nPlease share screenshot after payment.`;
    
    const url = `https://wa.me/91${phone.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`;
    
    if(isBulk) window.open(url, '_blank');
    else window.open(url, '_blank');
}

function bulkRemind(gid, gName) {
    const members = _cache.m.filter(m => m.groupId === gid || (m.groupIds && m.groupIds.includes(gid)));
    if(confirm(`Send WhatsApp reminders to ${members.length} members? This will open multiple tabs.`)) {
        members.forEach((m, index) => {
            setTimeout(() => {
                sendWA(m.phone, m.name, gName, true);
            }, index * 1000); // Delay to avoid browser blocking
        });
    }
}

// Global UI Helpers
function openModal(id) { 
    if(id === 'setupModal') {
        document.getElementById('adminUPI').value = _settings.upi;
        document.getElementById('stdAmt').value = _settings.amt;
    }
    document.getElementById(id).style.display = 'block'; 
}
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
sync();
</script>
</body>
</html>
