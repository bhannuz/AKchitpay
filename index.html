<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Chit Funds - Admin Portal v3.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="printOverlay"></div>

<div class="container py-3">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <span class="badge rounded-pill bg-warning text-dark px-3 py-2 fw-bold">AK ADMIN</span>
        <button class="btn btn-sm btn-outline-danger rounded-pill px-3" onclick="location.reload()">Logout</button>
    </div>

    <div class="row g-2 mb-4 text-center">
        <div class="col-4"><div class="stat-card"><div class="stat-num" id="stM">0</div><small class="text-dim">Members</small></div></div>
        <div class="col-4"><div class="stat-card"><div class="stat-num" id="stG">0</div><small class="text-dim">Groups</small></div></div>
        <div class="col-4"><div class="stat-card"><div class="stat-num text-success">₹-</div><small class="text-dim">Today</small></div></div>
    </div>

    <button class="btn-record-main mb-4 mx-auto d-block" onclick="openModal('payModal')">💳 Record Payment</button>

    <div class="position-relative mb-4">
        <input type="text" id="mSearch" class="search-box" placeholder="Search Member for Summary..." oninput="handleSearch(this.value, 'mSuggestions', 'mSearch', true)">
        <div id="mSuggestions" class="suggestions-list shadow-lg"></div>
    </div>

    <div class="row g-2 mb-4">
        <div class="col-6"><button class="btn btn-outline-warning w-100 py-3" onclick="openModal('memModal')">👤 Member</button></div>
        <div class="col-6"><button class="btn btn-outline-success w-100 py-3" onclick="openModal('grpModal')">🏦 Group</button></div>
    </div>

    <div id="ledgerArea"></div>
</div>

<div id="payModal" class="modal-overlay">
    <div class="m-content">
        <h5>Record Payment</h5>
        <input type="date" id="pDate" class="f-inp">
        <div class="position-relative">
            <input type="text" id="pMSearch" class="f-inp" placeholder="Search Member..." oninput="handleSearch(this.value, 'pSuggestions', 'pMSearch', false)">
            <div id="pSuggestions" class="suggestions-list"></div>
            <input type="hidden" id="pSelectedMid">
        </div>
        <select id="pGroup" class="f-inp" onchange="checkChitStatus()"><option value="">Select Member First</option></select>
        <div class="row g-2">
            <div class="col-6"><input type="number" id="pChit" class="f-inp" placeholder="Chit Amt"></div>
            <div class="col-6"><input type="number" id="pPaid" class="f-inp" placeholder="Paid Amt"></div>
        </div>
        <select id="pMode" class="f-inp"><option>GPay</option><option>Cash</option></select>
        <select id="pPicked" class="f-inp"><option value="No">No</option><option value="Yes">Yes ✅</option></select>
        <button class="btn btn-warning w-100 py-3 fw-bold" onclick="savePayment()">Sync Payment</button>
        <button class="btn btn-link w-100 text-dim" onclick="closeModal('payModal')">Cancel</button>
    </div>
</div>

<div id="memModal" class="modal-overlay">
    <div class="m-content">
        <h5>New Member</h5>
        <input type="text" id="memN" class="f-inp" placeholder="Full Name">
        <input type="tel" id="memP" class="f-inp" placeholder="Phone">
        <button class="btn btn-warning w-100" onclick="createMember()">Create</button>
        <button class="btn btn-link w-100 text-dim" onclick="closeModal('memModal')">Cancel</button>
    </div>
</div>

<div id="grpModal" class="modal-overlay">
    <div class="m-content">
        <h5>New Group</h5>
        <input type="text" id="grpN" class="f-inp" placeholder="Group Name">
        <input type="number" id="grpD" class="f-inp" placeholder="Months">
        <button class="btn btn-success w-100" onclick="createGroup()">Create</button>
        <button class="btn btn-link w-100 text-dim" onclick="closeModal('grpModal')">Cancel</button>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item active">🏠<br>Home</div>
    <div class="nav-item">📁<br>Groups</div>
    <div class="nav-item">📜<br>List</div>
</nav>

<script src="app.js"></script>
<script src="planner.js"></script>
</body>
</html>
