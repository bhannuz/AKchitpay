<div id="paymentModal" class="modal-overlay">
    <div class="modal-content-custom" style="max-width: 480px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="text-white fw-bold mb-0">💳 Record Payment</h5>
            <button class="btn btn-sm btn-outline-secondary text-warning border-secondary d-flex align-items-center gap-1" onclick="resetPaymentForm()">
                <small>🔄 Refresh</small>
            </button>
        </div>

        <label class="form-label-small">PAYMENT DATE</label>
        <input type="date" id="pDate" class="f-inp" value="2026-03-17">

        <label class="form-label-small">MEMBER</label>
        <div class="position-relative">
            <input type="text" id="pMemberSearch" class="f-inp" placeholder="🔍 Search Member..." oninput="handlePMemberSearch(this.value)">
            <div id="pSuggestions" class="suggestions-list"></div>
            <input type="hidden" id="selectedMemberId">
        </div>

        <label class="form-label-small">GROUP / ENROLLMENT</label>
        <select id="pGroup" class="f-inp">
            <option value="">-- Select Member First --</option>
        </select>

        <label class="form-label-small">PAYMENT TYPE</label>
        <select id="pType" class="f-inp">
            <option value="single">Single Month</option>
            <option value="multi">Multiple Months (Bulk)</option>
        </select>

        <div class="row g-2">
            <div class="col-6">
                <label class="form-label-small">CHIT AMOUNT</label>
                <input type="number" id="pChit" class="f-inp" placeholder="₹ per month">
            </div>
            <div class="col-6">
                <label class="form-label-small">TOTAL AMOUNT PAID</label>
                <input type="number" id="pPaid" class="f-inp" placeholder="₹ total">
            </div>
        </div>

        <label class="form-label-small">PAID BY</label>
        <select id="pMode" class="f-inp">
            <option value="">-- Select Mode --</option>
            <option value="GPay">GPay</option>
            <option value="PhonePe">PhonePe</option>
            <option value="Cash">Cash</option>
            <option value="UPI">Other UPI</option>
        </select>

        <label class="form-label-small">CHIT PICKED?</label>
        <select id="pPicked" class="f-inp">
            <option value="No">No</option>
            <option value="Yes">Yes ✅</option>
        </select>

        <button class="btn w-100 py-3 fw-bold mt-3" 
                style="background: linear-gradient(90deg, #ff8000, #ff9500); color: black; border-radius: 12px; font-size: 1.1rem;" 
                onclick="savePaymentEntry()">
            ✓ Sync Payment
        </button>
        <button class="btn btn-link w-100 text-white mt-1" onclick="closeModal('paymentModal')">Cancel</button>
    </div>
</div>

<script>
// --- LOGIC FOR UPDATED MODAL ---

function handlePMemberSearch(val) {
    const list = document.getElementById('pSuggestions');
    if (val.length < 1) { list.style.display = 'none'; return; }
    
    // Filter from your global _cache.m (Members)
    const filtered = _cache.m.filter(m => m.name.toLowerCase().includes(val.toLowerCase()));
    list.innerHTML = filtered.map(m => `
        <div class="suggestion-item p-2" onclick="selectMemberForPayment('${m.id}', '${m.name}')">
            ${m.name}
        </div>`).join('');
    list.style.display = filtered.length ? 'block' : 'none';
}

function selectMemberForPayment(id, name) {
    document.getElementById('pMemberSearch').value = name;
    document.getElementById('selectedMemberId').value = id;
    document.getElementById('pSuggestions').style.display = 'none';
    
    // Load groups assigned to this member
    const member = _cache.m.find(m => m.id === id);
    const groupDropdown = document.getElementById('pGroup');
    
    if (member && member.groupIds) {
        groupDropdown.innerHTML = member.groupIds.map(gid => {
            const g = _cache.g.find(group => group.id === gid);
            return `<option value="${gid}">${g ? g.name : 'Unknown Group'}</option>`;
        }).join('');
    } else {
        groupDropdown.innerHTML = '<option value="">No Groups Found</option>';
    }
}

async function savePaymentEntry() {
    const data = {
        memberId: document.getElementById('selectedMemberId').value,
        groupId: document.getElementById('pGroup').value,
        date: document.getElementById('pDate').value,
        chitAmount: parseFloat(document.getElementById('pChit').value),
        amountPaid: parseFloat(document.getElementById('pPaid').value),
        mode: document.getElementById('pMode').value,
        chitPicked: document.getElementById('pPicked').value,
        balance: parseFloat(document.getElementById('pChit').value) - parseFloat(document.getElementById('pPaid').value),
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    };

    if(!data.memberId || isNaN(data.amountPaid)) {
        alert("Please select a member and enter the amount.");
        return;
    }

    try {
        await db.collection('payments').add(data);
        alert("✅ Payment Synced Successfully!");
        closeModal('paymentModal');
        initializeApp(); // Refresh your dashboard data
    } catch(e) {
        console.error("Error saving payment: ", e);
    }
}

function resetPaymentForm() {
    document.getElementById('pMemberSearch').value = "";
    document.getElementById('pGroup').innerHTML = '<option value="">-- Select Member First --</option>';
    document.getElementById('pChit').value = "";
    document.getElementById('pPaid').value = "";
}
</script>
