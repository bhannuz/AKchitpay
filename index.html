<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Chit Funds - Admin Portal v2.1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --bg-dark:#0a0e1a; --card-bg:#141b2d; --input-bg:#1c253b; --accent-gold:linear-gradient(90deg,#ff9800,#f57c00); --text-dim:#8e9aaf; --border:#252f48; }
        body { background-color:var(--bg-dark); color:white; font-family:'Segoe UI',sans-serif; padding-bottom:120px; margin:0; }
        .app-header { display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg-dark); z-index:1000; }
        .stat-card { background:var(--card-bg); border:1px solid var(--border); border-radius:15px; padding:15px; text-align:center; }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:2000; padding:20px; overflow-y:auto; }
        .modal-content-custom { background:var(--card-bg); border-radius:25px; padding:25px; max-width:450px; margin:20px auto; border:1px solid var(--border); }
        .form-input { background:var(--input-bg); border:1px solid var(--border); color:white; padding:12px; border-radius:12px; width:100%; margin-bottom:12px; }
        .nav-bar { position:fixed; bottom:0; width:100%; background:#070b14; display:flex; justify-content:space-around; padding:15px 0; border-top:1px solid var(--border); z-index:1000; }
        .nav-item { cursor:pointer; text-align:center; font-size:0.62rem; color:var(--text-dim); }
        .nav-item.active { color:#f39c12; font-weight:bold; }
        .table-custom { color:white; font-size:0.7rem; width:100%; border-collapse:collapse; }
        .table-custom th { color:var(--text-dim); border-bottom:1px solid var(--border); padding:8px 5px; text-transform:uppercase; font-size:0.6rem; }
        .table-custom td { padding:9px 5px; border-bottom:1px solid rgba(255,255,255,0.05); }
        .tab-content { display:none; } .tab-content.active { display:block; }
        .suggestions-list { position:absolute; width:100%; background:var(--input-bg); border:1px solid var(--border); z-index:3000; max-height:200px; overflow-y:auto; display:none; }
        .wa-tag { font-size:0.6rem; background:rgba(37,211,102,0.1); border:1px solid rgba(37,211,102,0.3); color:#25D366; border-radius:5px; padding:2px 7px; font-weight:700; cursor:default; }
        #printOverlay { position:fixed; inset:0; background:white; z-index:99999; overflow-y:auto; padding:24px; display:none; color:#111; }
    </style>
</head>
<body>

<div id="printOverlay"></div>

<div id="loginScreen" style="position:fixed; inset:0; background:var(--bg-dark); z-index:9000; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div class="modal-content-custom" style="width:100%; max-width:400px; text-align:center;">
        <h2 class="text-warning fw-bold mb-4">AK CHIT FUNDS</h2>
        <div id="loginStep1" class="login-step active">
            <input type="tel" id="loginPhone" class="form-input" placeholder="10-digit mobile number" maxlength="10">
            <button class="btn btn-warning w-100 py-3 fw-bold mt-2" onclick="handleLoginSubmit()">🔐 Continue</button>
        </div>
        <div id="loginStep2" class="login-step d-none p-4">
            <div class="fs-1 mb-3">⏳</div>
            <h5>Access Requested</h5>
            <p class="small text-dim">Your request is pending admin approval.</p>
            <button class="btn btn-outline-warning w-100" onclick="location.reload()">Check Status</button>
        </div>
    </div>
</div>

<div class="container py-2" id="appMain">
    <header class="app-header">
        <div class="brand text-warning">AK CHIT FUNDS <small class="badge border border-success text-success ms-2" style="font-size:0.4em;">LIVE</small></div>
        <button onclick="handleLogout()" class="btn btn-sm btn-outline-danger px-3">Logout</button>
    </header>

    <main id="homeTab" class="tab-content active">
        <div class="row g-2 mt-3">
            <div class="col-4"><div class="stat-card"><span class="stat-num d-block text-warning" id="memberCount">-</span><small class="text-dim">Members</small></div></div>
            <div class="col-4"><div class="stat-card"><span class="stat-num d-block text-warning" id="groupCount">-</span><small class="text-dim">Groups</small></div></div>
            <div class="col-4"><div class="stat-card"><span class="stat-num d-block text-success" id="todayColl">₹0</span><small class="text-dim">Today</small></div></div>
        </div>
        <button class="btn btn-warning w-100 py-3 fw-bold mt-3 rounded-4 shadow" onclick="openPaymentModal()">💳 Record Payment</button>
        <div class="p-3 my-3 bg-dark border border-secondary rounded-4 position-relative">
            <input type="text" id="summarySearch" class="form-input mb-0" placeholder="🔍 Search Member Ledger..." oninput="filterSearch('summarySearch','summaryList','summaryView')">
            <div id="summaryList" class="suggestions-list"></div>
            <input type="hidden" id="summaryView">
            <div id="ledgerData" class="mt-3"></div>
        </div>
    </main>

    <section id="whatsappTab" class="tab-content">
        <div class="p-3">
            <h5 class="text-success mb-3">📲 WhatsApp Reminders</h5>
            <textarea id="waTemplate" rows="4" class="form-input mb-2" placeholder="Message template...">Hi {name} 👋, your payment for {group} is due. Amount: ₹{amount}. Pay here: {upi_link}</textarea>
            <div class="d-flex flex-wrap gap-1 mb-3">
                <span class="wa-tag">{name}</span><span class="wa-tag">{amount}</span><span class="wa-tag">{group}</span><span class="wa-tag">{upi_link}</span>
            </div>
            <div id="waMemberList"></div>
        </div>
    </section>

    <section id="backupTab" class="tab-content">
        <div class="p-4 text-center">
            <button class="btn btn-outline-warning w-100 mb-3 py-3" onclick="exportFullBackup()">💾 Download JSON Backup</button>
            <input type="file" id="restoreFile" class="form-control bg-dark text-white border-secondary mb-2">
            <button class="btn btn-danger w-100" onclick="confirmRestore()">🔄 Restore Data</button>
        </div>
    </section>
</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="switchTab('home')" id="navHome">🏠<br>Home</div>
    <div class="nav-item" onclick="switchTab('whatsapp')" id="navWhatsapp">📲<br>Remind</div>
    <div class="nav-item" onclick="switchTab('backup')" id="navBackup">💾<br>Backup</div>
</nav>

<div id="paymentModal" class="modal-overlay">
    <div class="modal-content-custom">
        <h5 class="text-warning mb-3">Record Payment</h5>
        <input type="date" id="pDate" class="f-inp">
        <select id="pMember" class="form-input" onchange="linkGroupForPayment()"><option value="">Select Member</option></select>
        <select id="pGroup" class="form-input"><option value="">Select Group</option></select>
        <div class="row g-2">
            <div class="col-6"><input type="number" id="pChit" class="form-input" placeholder="Chit Amount"></div>
            <div class="col-6"><input type="number" id="pPaid" class="form-input" placeholder="Amount Paid"></div>
        </div>
        <button class="btn btn-warning w-100 py-2 fw-bold" onclick="savePayment()">Sync Payment</button>
        <button class="btn btn-link w-100 text-white" onclick="closeModal('paymentModal')">Cancel</button>
    </div>
</div>

<script>
// --- CONFIG ---
const firebaseConfig = { apiKey: "AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU", authDomain: "ak-events-2016.firebaseapp.com", projectId: "ak-events-2016", appId: "1:78066764444:web:5bb9e0d48c128a8632fb59" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let CURRENT_USER = null;

// --- CACHE & UTILS ---
let _cache = { m:[], g:[], p:[] };
const fmtAmt = v => '₹' + (parseFloat(v)||0).toLocaleString('en-IN');
const bustCache = () => { _cache = { m:[], g:[], p:[] }; };

async function updateUI() {
    const [m, g, p] = await Promise.all([
        db.collection('members').get(),
        db.collection('groups').get(),
        db.collection('payments').get()
    ]);
    _cache.m = m.docs.map(d=>({id:d.id, ...d.data()}));
    _cache.g = g.docs.map(d=>({id:d.id, ...d.data()}));
    _cache.p = p.docs.map(d=>({id:d.id, ...d.data()}));

    document.getElementById('memberCount').innerText = _cache.m.length;
    document.getElementById('groupCount').innerText = _cache.g.length;
    
    // Populate Payment Dropdown
    const pSel = document.getElementById('pMember');
    pSel.innerHTML = '<option value="">Select Member</option>' + _cache.m.map(x=>`<option value="${x.id}">${x.name}</option>`).join('');
}

// --- WHATSAPP UPI LOGIC ---
function waBuildMessage(member, group) {
    const upiID = "8121723153@ybl"; // Replace with your actual UPI ID
    const amt = 5000; // Example dynamic amount
    const upiLink = `upi://pay?pa=${upiID}&pn=AKChitFunds&am=${amt}&cu=INR`;
    
    const tpl = document.getElementById('waTemplate').value;
    return tpl.replace(/{name}/g, member.name)
              .replace(/{group}/g, group.name)
              .replace(/{amount}/g, amt)
              .replace(/{upi_link}/g, upiLink);
}

function waSend(mid) {
    const m = _cache.m.find(x=>x.id === mid);
    const msg = waBuildMessage(m, {name: 'Group A'});
    window.open(`https://wa.me/91${m.phone}?text=${encodeURIComponent(msg)}`, '_blank');
}

// --- NAVIGATION & AUTH ---
function switchTab(t) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.getElementById(t + 'Tab').classList.add('active');
    document.getElementById('nav' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
}

async function handleLoginSubmit() {
    const phone = document.getElementById('loginPhone').value;
    if(phone === '8121723153') { // ADMIN NUMBER
        document.getElementById('loginScreen').style.display = 'none';
        updateUI();
    } else {
        alert("Member login pending approval.");
    }
}

function handleLogout() { location.reload(); }
function openModal(id) { document.getElementById(id).style.display = 'block'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

document.addEventListener('DOMContentLoaded', updateUI);
</script>
</body>
</html>
