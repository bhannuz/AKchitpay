<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Chit Funds - Admin Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg:#060b19; --card:#111827; --inp:#1e293b; --gold:#ffc107; --brd:#334155; --dim:#94a3b8; }
        body { background:var(--bg); color:white; font-family:sans-serif; padding-bottom:100px; }
        .header-bar { display: flex; gap: 8px; padding: 20px; }
        .badge-admin { border: 2px solid var(--gold); color: var(--gold); padding: 4px 12px; border-radius: 8px; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; }
        .stat-container { background: var(--card); border: 1px solid var(--brd); border-radius: 15px; padding: 20px; text-align: center; }
        .btn-record { background: var(--gold); color: black; border: none; border-radius: 50px; padding: 15px; font-weight: 800; width: 100%; font-size: 1.1rem; }
        .refresh-box { background: var(--card); border: 1px solid var(--brd); border-radius: 15px; width: 55px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-outline-custom { background: var(--card); padding: 15px; border-radius: 12px; font-weight: 700; width: 100%; display: flex; justify-content: center; gap: 8px; border: 1px solid var(--brd); }
        .btn-member { border-color: var(--gold); color: var(--gold); }
        .btn-group { border-color: #10b981; color: #10b981; }
        .nav-bar { position:fixed; bottom:0; width:100%; background:#070b14; display:flex; justify-content:space-around; padding:12px 0; border-top:1px solid var(--brd); }
        .nav-item { color:var(--dim); text-align:center; font-size:0.65rem; cursor:pointer; text-decoration:none; flex:1; }
        .nav-item.active { color:var(--gold); font-weight: bold; }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; padding:20px; overflow-y:auto; }
        .m-content { background:var(--card); border-radius:25px; padding:25px; max-width:450px; margin:auto; border: 1px solid var(--brd); }
        .f-inp { background:var(--inp); border:1px solid var(--brd); color:white; padding:12px; border-radius:12px; width:100%; margin-bottom:12px; }
        .tab-c { display:none; } .tab-c.active { display:block; }
        .sap-card { background:var(--card); border:1px solid var(--brd); border-radius:12px; padding:15px; margin-bottom:12px; border-left:4px solid var(--gold); }
        .del-btn { color: #f87171; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="header-bar">
    <div class="badge-admin">Admin</div>
    <div class="ms-auto d-flex gap-2">
        <button class="btn btn-sm btn-outline-danger" onclick="location.reload()">⏻ Logout</button>
    </div>
</div>

<div class="container">
    <div class="row g-2 mb-4 text-center">
        <div class="col-4"><div class="stat-container"><b class="fs-3 d-block" id="memberCount">0</b><small class="text-dim small">MEMBERS</small></div></div>
        <div class="col-4"><div class="stat-container"><b class="fs-3 d-block" id="groupCount">0</b><small class="text-dim small">GROUPS</small></div></div>
        <div class="col-4"><div class="stat-container"><b class="fs-3 d-block text-success" id="todayColl">₹0</b><small class="text-dim small">TODAY</small></div></div>
    </div>

    <div class="d-flex gap-2 mb-4">
        <button class="btn-record" onclick="openModal('paymentModal')">💳 Record Payment</button>
        <div class="refresh-box" onclick="updateUI()">🔄</div>
    </div>

    <div id="homeTab" class="tab-c active">
        <div class="row g-2 mb-4">
            <div class="col-6"><button class="btn-outline-custom btn-member" onclick="openModal('memberModal')">👤 Create Member</button></div>
            <div class="col-6"><button class="btn-outline-custom btn-group" onclick="openModal('groupModal')">🏦 New Group</button></div>
        </div>
        <h6 class="text-dim small fw-bold mb-3">MEMBER LIST</h6>
        <div id="ledgerData"></div>
    </div>

    <div id="groupsTab" class="tab-c">
        <h6 class="text-dim small fw-bold mb-3">ACTIVE GROUPS</h6>
        <div id="groupListArea"></div>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="switchTab('home')" id="navHome">🏠<br>Home</div>
    <div class="nav-item" onclick="switchTab('groups')" id="navGroups">📁<br>Groups</div>
</nav>

<div id="memberModal" class="modal-overlay">
    <div class="m-content">
        <h5 class="mb-3 fw-bold">Add Member</h5>
        <input type="text" id="mName" class="f-inp" placeholder="Full Name">
        <input type="tel" id="mPhone" class="f-inp" placeholder="Phone Number">
        <button class="btn btn-warning w-100 py-2 fw-bold" onclick="saveMember()">Save</button>
        <button class="btn btn-link w-100 text-white mt-1" onclick="closeModal('memberModal')">Cancel</button>
    </div>
</div>

<div id="groupModal" class="modal-overlay">
    <div class="m-content">
        <h5 class="mb-3 fw-bold">New Group</h5>
        <input type="text" id="gName" class="f-inp" placeholder="Group Name">
        <input type="number" id="gAmount" class="f-inp" placeholder="Chit Amount ₹">
        <button class="btn btn-success w-100 py-2 fw-bold" onclick="saveGroup()">Create</button>
        <button class="btn btn-link w-100 text-white mt-1" onclick="closeModal('groupModal')">Cancel</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU", authDomain: "ak-events-2016.firebaseapp.com", projectId: "ak-events-2016" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let _dbCache = { m:[], g:[] };

    async function updateUI() {
        const [mSnap, gSnap] = await Promise.all([db.collection('members').get(), db.collection('groups').get()]);
        _dbCache.m = mSnap.docs.map(d=>({id:d.id, ...d.data()}));
        _dbCache.g = gSnap.docs.map(d=>({id:d.id, ...d.data()}));
        
        document.getElementById('memberCount').innerText = _dbCache.m.length;
        document.getElementById('groupCount').innerText = _dbCache.g.length;
        
        renderHomeList();
        renderGroupsList();
    }

    function renderHomeList() {
        document.getElementById('ledgerData').innerHTML = _dbCache.m.map(m => `
            <div class="sap-card">
                <div class="d-flex justify-content-between">
                    <div><b>${m.name}</b><br><small class="text-dim">${m.phone}</small></div>
                    <div class="del-btn" onclick="deleteItem('members','${m.id}','${m.name}')">REMOVE</div>
                </div>
            </div>`).join('');
    }

    function renderGroupsList() {
        document.getElementById('groupListArea').innerHTML = _dbCache.g.map(g => `
            <div class="sap-card" style="border-left-color: #10b981;">
                <div class="d-flex justify-content-between">
                    <div><b>${g.name}</b><br><small class="text-dim">₹${(g.amount||0).toLocaleString()}</small></div>
                    <div class="del-btn" onclick="deleteItem('groups','${g.id}','${g.name}')">DELETE</div>
                </div>
            </div>`).join('');
    }

    async function deleteItem(col, id, name) {
        if(confirm(`Permanently delete ${name}?`)) {
            await db.collection(col).doc(id).delete();
            updateUI();
        }
    }

    async function saveMember() {
        await db.collection('members').add({ name: document.getElementById('mName').value, phone: document.getElementById('mPhone').value });
        closeModal('memberModal'); updateUI();
    }

    async function saveGroup() {
        await db.collection('groups').add({ name: document.getElementById('gName').value, amount: parseFloat(document.getElementById('gAmount').value) });
        closeModal('groupModal'); updateUI();
    }

    function switchTab(t) {
        document.querySelectorAll('.tab-c').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(t + 'Tab').classList.add('active');
        document.getElementById('nav' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
    }

    function openModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    document.addEventListener('DOMContentLoaded', updateUI);
</script>
</body>
</html>
