<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Chit Funds - Management Vault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --bg:#0a0e1a; --card:#141b2d; --inp:#1c253b; --gold:#f39c12; --border:#252f48; --text-dim:#8e9aaf; --purple:#818cf8; }
        body { background-color:var(--bg); color:white; font-family:'Segoe UI',sans-serif; padding-bottom:100px; margin:0; }
        
        /* Header & Stats */
        .app-header { display:flex; justify-content:space-between; align-items:center; padding:15px 20px; border-bottom:1px solid var(--border); }
        .stat-card { background:var(--card); border:1px solid var(--border); border-radius:15px; padding:20px; text-align:center; }
        .stat-num { font-size:2rem; font-weight:bold; color:#fff; }

        /* Buttons & Actions */
        .btn-record-main { background:var(--gold); color:#000; font-weight:800; border:none; padding:18px; border-radius:15px; width:100%; font-size:1.1rem; box-shadow: 0 4px 15px rgba(243, 156, 18, 0.2); margin: 20px 0; }
        .action-btn-outline { border:1px solid; padding:15px; text-align:center; cursor:pointer; font-weight:bold; border-radius:12px; transition: 0.2s; }
        .action-btn-outline:active { transform: scale(0.98); }
        
        /* Search & Ledger */
        .search-box { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:15px; width:100%; color:white; outline:none; }
        .suggestions-list { position:absolute; width:100%; background:var(--inp); border:1px solid var(--border); z-index:3000; display:none; border-radius:0 0 12px 12px; }
        .suggestion-item { padding:12px; cursor:pointer; border-bottom:1px solid var(--border); }

        /* Member Card Design (Matches image_4.png) */
        .member-card { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:20px; margin-top:20px; }
        .avatar { width:45px; height:45px; background:rgba(243,156,18,0.1); border:1px solid var(--gold); color:var(--gold); border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:bold; }
        .badge-custom { font-size:0.65rem; padding:3px 8px; border-radius:6px; background:rgba(99,102,241,0.2); color:#a5b4fc; border:1px solid rgba(99,102,241,0.3); margin-right:5px; }
        .history-bar { background:rgba(255,255,255,0.03); padding:12px 15px; border-radius:10px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; margin-top:15px; border-bottom: 2px solid var(--border); }
        .table-history { width:100%; font-size:0.75rem; margin-top:10px; border-collapse: separate; border-spacing: 0 4px; }
        .table-history th { color:var(--text-dim); padding:10px; text-transform:uppercase; font-size:0.6rem; }
        .table-history td { padding:12px 10px; vertical-align: middle; background: rgba(255,255,255,0.01); }
        .row-multi { background: rgba(129, 140, 248, 0.1) !important; border-left: 3px solid #818cf8; }

        /* Navigation */
        .nav-bar { position:fixed; bottom:0; width:100%; background:#070b14; display:flex; justify-content:space-around; padding:15px 0; border-top:1px solid var(--border); z-index: 1000; }
        .nav-item { cursor:pointer; text-align:center; font-size:0.7rem; color:var(--text-dim); text-decoration:none; }
        .nav-item.active { color:var(--gold); font-weight: bold; }

        /* Modals */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; padding:20px; overflow-y:auto; }
        .m-content { background:var(--card); border-radius:25px; padding:25px; max-width:500px; margin:auto; border: 1px solid var(--border); }
        .f-inp { background:var(--inp); border:1px solid var(--border); color:white; padding:12px; border-radius:10px; width:100%; margin-bottom:12px; }
        
        .tab-content { display:none; } .tab-content.active { display:block; }
    </style>
</head>
<body>

<div class="container py-2">
    <header class="d-flex justify-content-between align-items-center mb-4 mt-2">
        <div class="d-flex gap-2">
            <button class="btn btn-warning btn-sm fw-bold rounded-pill text-black px-3" style="font-size:0.7rem;">ADMIN</button>
            <button class="btn btn-dark btn-sm text-warning rounded-pill px-3 border border-secondary" style="font-size:0.7rem;">🔒 Requests</button>
        </div>
        <button onclick="location.reload()" class="btn btn-sm btn-outline-danger px-3 rounded-pill" style="font-size:0.7rem;">Logout</button>
    </header>

    <main id="homeTab" class="tab-content active">
        <div class="row g-2 mb-2 text-center">
            <div class="col-4"><div class="stat-card"><div class="stat-num" id="stM">0</div><small class="text-dim">Members</small></div></div>
            <div class="col-4"><div class="stat-card"><div class="stat-num" id="stG">0</div><small class="text-dim">Groups</small></div></div>
            <div class="col-4"><div class="stat-card"><div class="stat-num text-success" id="stT">₹0</div><small class="text-dim">Today</small></div></div>
        </div>

        <button class="btn-record-main" onclick="openModal('payModal')">💳 Record Payment</button>

        <div class="position-relative mb-4">
            <input type="text" id="mSearch" class="search-box" placeholder="🔍 Search Member for Summary / PDF..." oninput="handleSearch(this.value)">
            <div id="mSuggestions" class="suggestions-list shadow-lg"></div>
        </div>

        <div class="row g-2 mb-4">
            <div class="col-6">
                <div class="action-btn-outline" style="border-color:var(--gold); color:var(--gold);" onclick="openModal('memModal')">👤 Create Member</div>
            </div>
            <div class="col-6">
                <div class="action-btn-outline" style="border-color:#2ecc71; color:#2ecc71;" onclick="openModal('grpModal')">🏦 New Group</div>
            </div>
        </div>

        <div id="ledgerArea"></div>
    </main>

    <section id="groupsTab" class="tab-content"><h5 class="p-3">Group Library</h5></section>
    <section id="remindTab" class="tab-content"><h5 class="p-3">WhatsApp Reminders</h5></section>
</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="switchTab('home')" id="navHome">🏠<br>Home</div>
    <div class="nav-item" onclick="switchTab('groups')" id="navGroups">📁<br>Groups</div>
    <div class="nav-item" onclick="switchTab('remind')" id="navRemind">📲<br>Remind</div>
    <div class="nav-item" onclick="switchTab('backup')" id="navBackup">💾<br>Backup</div>
</nav>

<div id="payModal" class="modal-overlay">
    <div class="m-content">
        <h5 class="text-warning mb-4">💳 Record Payment</h5>
        <select id="pMember" class="f-inp"></select>
        <select id="pGroup" class="f-inp"></select>
        <input type="number" id="pPaid" class="f-inp" placeholder="Amount Paid ₹">
        <button class="btn btn-warning w-100 py-3 fw-bold" onclick="savePayment()">Sync Payment</button>
        <button class="btn btn-link w-100 text-white" onclick="closeModal('payModal')">Cancel</button>
    </div>
</div>

<div id="memModal" class="modal-overlay">
    <div class="m-content">
        <h5 class="text-warning mb-4">👤 Create Member</h5>
        <input type="text" id="mName" class="f-inp" placeholder="Full Name">
        <input type="tel" id="mPhone" class="f-inp" placeholder="Phone Number">
        <button class="btn btn-warning w-100 py-3 fw-bold" onclick="createMember()">Save Member</button>
        <button class="btn btn-link w-100 text-white" onclick="closeModal('memModal')">Cancel</button>
    </div>
</div>

<script>
// --- FIREBASE ---
const firebaseConfig = { apiKey: "AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU", authDomain: "ak-events-2016.firebaseapp.com", projectId: "ak-events-2016" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let _data = { m: [], g: [], p: [] };

async function sync() {
    const [m, g, p] = await Promise.all([db.collection('members').get(), db.collection('groups').get(), db.collection('payments').get()]);
    _data.m = m.docs.map(d => ({id:d.id, ...d.data()}));
    _data.g = g.docs.map(d => ({id:d.id, ...d.data()}));
    _data.p = p.docs.map(d => ({id:d.id, ...d.data()}));
    
    document.getElementById('stM').innerText = _data.m.length;
    document.getElementById('stG').innerText = _data.g.length;
    
    // Populate dropdown
    document.getElementById('pMember').innerHTML = _data.m.map(x => `<option value="${x.id}">${x.name}</option>`).join('');
}

function switchTab(t) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.getElementById(t+'Tab').classList.add('active');
    document.getElementById('nav'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');
}

function handleSearch(val) {
    const list = document.getElementById('mSuggestions');
    if (val.length < 1) { list.style.display = 'none'; return; }
    const filtered = _data.m.filter(m => m.name.toLowerCase().includes(val.toLowerCase()));
    list.innerHTML = filtered.map(m => `<div class="suggestion-item" onclick="selectMember('${m.id}', '${m.name}')">${m.name}</div>`).join('');
    list.style.display = 'block';
}

function selectMember(id, name) {
    document.getElementById('mSearch').value = name;
    document.getElementById('mSuggestions').style.display = 'none';
    renderLedger(id);
}

function renderLedger(mid) {
    const m = _data.m.find(x => x.id === mid);
    const mPays = _data.p.filter(p => p.memberId === mid);
    const totalPaid = mPays.reduce((s, p) => s + (parseFloat(p.amountPaid) || 0), 0);
    const totalBal = mPays.reduce((s, p) => s + (parseFloat(p.balance) || 0), 0);

    document.getElementById('ledgerArea').innerHTML = `
        <div class="member-card animate__animated animate__fadeIn">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <div class="avatar">${m.name[0]}</div>
                    <div><h4 class="mb-0 fw-bold">${m.name}</h4><small class="text-dim">${mPays.length} payments</small></div>
                </div>
                <button class="btn-print-orange" onclick="window.print()">🖨️ Print</button>
            </div>

            <div class="d-flex justify-content-between mt-4">
                <span class="fw-bold" style="color:var(--gold)">📂 5 Lakhs <span class="badge-v3 ms-1">V3</span></span>
                <span class="fw-bold">19<small class="text-dim">/21</small></span>
            </div>
            
            <div class="history-bar" onclick="toggleHist()">
                <span class="text-dim fw-bold small">PAYMENT HISTORY (${mPays.length} ENTRIES)</span>
                <div class="d-flex gap-3"><span class="text-success fw-bold">₹${totalPaid.toLocaleString()}</span><span id="chev">▼</span></div>
            </div>
            <div id="hist" style="display:none;">
                <table class="table-history">
                    <thead><tr><th>Date</th><th>Paid</th><th>Bal</th></tr></thead>
                    <tbody>${mPays.map(p => `<tr><td>${p.date}</td><td class="text-success">₹${p.amountPaid}</td><td>₹${p.balance||0}</td></tr>`).join('')}</tbody>
                </table>
            </div>
        </div>`;
}

function toggleHist() {
    const el = document.getElementById('hist');
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function openModal(id) { document.getElementById(id).style.display = 'block'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

sync();
</script>
</body>
</html>
