<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPI Payment Checkout</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  body { font-family: 'Segoe UI', sans-serif; margin:0; background:#f4f6f9; height:100vh; display:flex; justify-content:center; align-items:center; }

  /* Overlay */
  .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; justify-content:center; align-items:center; }

  /* Modal */
  .modal { background:#fff; width:320px; border-radius:12px; padding:20px; text-align:center; position:relative; box-shadow:0 10px 25px rgba(0,0,0,0.2); animation:slideIn 0.3s ease-out; }

  @keyframes slideIn { from {transform:translateY(50px); opacity:0;} to {transform:translateY(0); opacity:1;} }

  .modal h2 { margin:10px 0; color:#333; }
  .modal p { margin:5px 0; color:#555; }

  input { width:100%; padding:10px; margin:6px 0; border-radius:6px; border:1px solid #ccc; font-size:16px; }

  button { width:100%; padding:14px; margin:8px 0; border:none; border-radius:6px; font-weight:bold; cursor:pointer; font-size:16px; }
  .pay-btn { background:#4CAF50; color:white; }
  .wa-btn { background:#25D366; color:white; }
  #qrcode { margin-top:15px; }
  .small { font-size:12px; color:#888; margin-top:6px; }
  .close { position:absolute; top:10px; right:12px; font-size:18px; font-weight:bold; cursor:pointer; }
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="modal">
    <span class="close" onclick="closeModal()">×</span>
    <h2>Pay via UPI</h2>
    <p id="payeeName">Recipient: Your Name</p>

    <input type="text" id="name" placeholder="Customer Name">
    <input type="number" id="amount" placeholder="Amount ₹">
    <input type="text" id="note" placeholder="Note">

    <button class="pay-btn" id="payButton">Pay Now</button>
    <button class="wa-btn" onclick="sendWA()">Share on WhatsApp</button>

    <div id="qrcode"></div>
    <p class="small">Scan QR code if app doesn't open automatically.</p>
  </div>
</div>

<script>
const UPI_ID = "yourupi@upi"; // 🔴 Replace with your UPI ID
const PAYEE_NAME = "Your Name";
let upiLink = "";

// Close modal
function closeModal(){ document.getElementById('overlay').style.display='none'; }

// Read URL parameters
function getParams() {
  const params = new URLSearchParams(window.location.search);
  if(params.get("amount")) document.getElementById("amount").value = params.get("amount");
  if(params.get("name")) document.getElementById("name").value = params.get("name");
}

// Generate UPI link
function generate() {
  const name = encodeURIComponent(document.getElementById("name").value || PAYEE_NAME);
  const amount = document.getElementById("amount").value;
  const note = encodeURIComponent(document.getElementById("note").value || "Payment");

  if(!amount){ alert("Enter amount"); return; }

  upiLink = `upi://pay?pa=${UPI_ID}&pn=${name}&am=${amount}&cu=INR&tn=${note}`;

  // QR Code
  document.getElementById("qrcode").innerHTML="";
  new QRCode(document.getElementById("qrcode"), { text:upiLink, width:180, height:180 });
}

// Detect mobile and open UPI app
document.getElementById("payButton").addEventListener("click", ()=>{
  if(!upiLink) generate();
  // Only open on mobile
  if(/Android|iPhone|iPad/i.test(navigator.userAgent)){
    window.location.href = upiLink;
  }else{
    alert("Use mobile device to open UPI app or scan QR code.");
  }
});

// WhatsApp share
function sendWA(){
  if(!upiLink) generate();
  const amt = document.getElementById("amount").value;
  const msg = encodeURIComponent(`Hello,\nPlease pay ₹${amt} using this link:\n${upiLink}`);
  window.open(`https://wa.me/?text=${msg}`,"_blank");
}

// On load
window.onload = function(){
  getParams();
  if(document.getElementById("amount").value) generate();
}
</script>
</body>
</html>
