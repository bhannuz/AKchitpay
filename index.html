<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Chit Funds - Admin Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg-dark:#0a0e1a; --card-bg:#141b2d; --input-bg:#1c253b; --accent-gold:#f39c12; --border:#252f48; --text-dim:#8e9aaf; }
        body { background-color:var(--bg-dark); color:white; font-family:'Segoe UI',sans-serif; padding-bottom:100px; }
        
        /* Stats & Header */
        .stat-card { background:var(--card-bg); border:1px solid var(--border); border-radius:15px; padding:15px; text-align:center; }
        .btn-record { background:var(--accent-gold); color:#000; font-weight:bold; border:none; padding:15px; border-radius:15px; width:100%; font-size:1.1rem; }
        
        /* Search & Suggestions */
        .search-box { background:var(--card-bg); border:1px solid var(--border); border-radius:12px; padding:12px; width:100%; color:white; outline:none; }
        .suggestions-list { position:absolute; width:100%; background:var(--input-bg); border:1px solid var(--border); z-index:3000; max-height:200px; overflow-y:auto; border-radius:0 0 12px 12px; }
        .suggestion-item { padding:12px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.05); }

        /* Member Card (Exactly as per Screenshot) */
        .member-card { background:var(--card-bg); border:1px solid var(--border); border-radius:18px; padding:20px; margin-bottom:15px; }
        .avatar-box { width:45px; height:45px; background:rgba(243,156,18,0.1); border:1px solid var(--accent-gold); color:var(--accent-gold); border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:bold; }
        .badge-custom { font-size:0.65rem; padding:3px 8px; border-radius:6px; background:rgba(99,102,241,0.2); color:#a5b4fc; border:1px solid rgba(99,102,241,0.3); margin-right:5px; }
        .history-bar { background:rgba(255,255,255,0.03); padding:12px 15px; border-radius:10px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; margin-top:15px; }
        
        /* Table Styles */
        .table-history { width:100%; font-size:0.75rem; margin-top:10px; border-collapse:collapse; }
        .table-history th { color:var(--text-dim); border-bottom:1px solid var(--border); padding:8px; text-transform:uppercase; }
        .table-history td { padding:10px 8px; border-bottom:1px solid rgba(255,255,255,0.05); }

        .btn-print { background:#ff851b; color:black; font-weight:800; border-radius:8px; padding:6px 18px; border:none; font-size:0.85rem; }
        .nav-bar { position:fixed; bottom:0; width:100%; background:#070b14; display:flex; justify-content:space-around; padding:15px 0; border-top:1px solid var(--border); }
    </style>
</head>
<body>

<div class="container py-3">
    <div class="row g-2 mb-4 text-center">
        <div class="col-4"><div class="stat-card"><b class="fs-3 d-block" id="countM">0</b><small class="text-dim">Members</small></div></div>
        <div class="col-4"><div class="stat-card"><b class="fs-3 d-block" id="countG">0</b><small class="text-dim">Groups</small></div></div>
        <div class="col-4"><div class="stat-card"><b class="fs-3 d-block text-success">₹0</b><small class="text-dim">Today</small></div></div>
    </div>

    <button class="btn-record mb-4" onclick="alert('Record Payment Clicked')">💳 Record Payment</button>

    <div class="position-relative mb-4">
        <input type="text" id="mSearch" class="search-box" placeholder="Prasad" oninput="handleSearch(this.value)">
        <div id="mSuggestions" class="suggestions-list" style="display:none;"></div>
    </div>

    <div id="ledgerArea"></div>
</div>

<script>
// --- CONFIG & DATA ---
const firebaseConfig = { apiKey: "AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU", authDomain: "ak-events-2016.firebaseapp.com", projectId: "ak-events-2016" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Mock Data to simulate your Firebase for immediate preview
let _cache = { 
    members: [{id: 'm1', name: 'Prasad', phone: '9988776655'}],
    groups: [{id: 'g1', name: '5 Lakhs', totalValue: 500000, duration: 21}],
    payments: [
        {id: 'p1', memberId: 'm1', groupId: 'g1', amountPaid: 45000, balance: 100, date: '2026-02-15'},
        {id: 'p2', memberId: 'm1', groupId: 'g1', amountPaid: 51600, balance: 100, date: '2026-03-01'}
    ]
};

async function fetchData() {
    const [m, g, p] = await Promise.all([db.collection('members').get(), db.collection('groups').get(), db.collection('payments').get()]);
    _cache.members = m.docs.map(d => ({id: d.id, ...d.data()}));
    _cache.groups = g.docs.map(d => ({id: d.id, ...d.data()}));
    _cache.payments = p.docs.map(d => ({id: d.id, ...d.data()}));
    document.getElementById('countM').innerText = _cache.members.length;
    document.getElementById('countG').innerText = _cache.groups.length;
}

function handleSearch(val) {
    const list = document.getElementById('mSuggestions');
    if (val.length < 1) { list.style.display = 'none'; return; }
    const filtered = _cache.members.filter(m => m.name.toLowerCase().includes(val.toLowerCase()));
    list.innerHTML = filtered.map(m => `<div class="suggestion-item" onclick="selectMember('${m.id}', '${m.name}')">${m.name}</div>`).join('');
    list.style.display = filtered.length ? 'block' : 'none';
}

function selectMember(id, name) {
    document.getElementById('mSearch').value = name;
    document.getElementById('mSuggestions').style.display = 'none';
    viewLedger(id);
}

function viewLedger(mid) {
    const member = _cache.members.find(x => x.id === mid);
    const mPays = _cache.payments.filter(p => p.memberId === mid);
    const totalPaid = mPays.reduce((s, p) => s + (p.amountPaid || 0), 0);
    const totalBal = mPays.reduce((s, p) => s + (p.balance || 0), 0);

    // FORMATTING AS PER ATTACHED SCREENSHOT
    document.getElementById('ledgerArea').innerHTML = `
        <div class="member-card">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="d-flex align-items-center gap-3">
                    <div class="avatar-box">${member.name[0]}</div>
                    <div>
                        <h5 class="mb-0 fw-bold">${member.name}</h5>
                        <small class="text-dim">${mPays.length} payments · 1 group</small>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-sm border-secondary text-white">✏️</button>
                    <button class="btn-print">🖨️ Print</button>
                </div>
            </div>

            <div class="mt-4">
                <div class="d-flex justify-content-between">
                    <span class="fw-bold" style="color:#f39c12">📁 5 Lakhs <span class="badge-custom ms-2">V3</span></span>
                    <span class="text-white fw-bold">19<small class="text-dim">/21</small></span>
                </div>
                <div class="d-flex gap-1 mt-2">
                    <span class="badge-custom">🗓️ Started: 05/02/2026</span>
                    <span class="badge-custom">📅 Due: 5th</span>
                    <span class="badge-custom">📦 2 bulk payments</span>
                </div>
                <div class="small text-dim text-end" style="margin-top:-15px;">MONTHS PENDING</div>
            </div>

            <div class="history-bar" onclick="toggleExpansion()">
                <span class="small fw-bold text-dim">PAYMENT HISTORY (${mPays.length} ENTRIES)</span>
                <div class="d-flex align-items-center gap-2">
                    <span style="color:#2ecc71; font-weight:bold;">₹${totalPaid.toLocaleString()} paid</span>
                    <span style="color:#f39c12; font-weight:bold;">₹${totalBal.toLocaleString()} bal</span>
                    <span id="chevron">▶</span>
                </div>
            </div>

            <div id="statementTable" style="display:none; overflow-x:auto;">
                <table class="table-history">
                    <thead>
                        <tr><th>Date</th><th>Chit</th><th>Paid</th><th>Bal</th></tr>
                    </thead>
                    <tbody>
                        ${mPays.map(p => `
                            <tr>
                                <td>${p.date}</td>
                                <td>₹${(p.amountPaid + p.balance).toLocaleString()}</td>
                                <td class="text-success">₹${p.amountPaid.toLocaleString()}</td>
                                <td class="text-warning">₹${p.balance.toLocaleString()}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        </div>
    `;
}

function toggleExpansion() {
    const table = document.getElementById('statementTable');
    const chevron = document.getElementById('chevron');
    if (table.style.display === 'none') {
        table.style.display = 'block';
        chevron.style.transform = 'rotate(90deg)';
    } else {
        table.style.display = 'none';
        chevron.style.transform = 'rotate(0deg)';
    }
}

fetchData();
</script>
</body>
</html>
