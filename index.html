<div id="payModal" class="modal-overlay">
    <div class="m-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="text-white fw-bold mb-0">💳 Record Payment</h5>
            <button class="btn btn-sm btn-outline-warning" onclick="resetForm()">Refresh</button>
        </div>
        <input type="date" id="pDate" class="f-inp">
        
        <div class="position-relative">
            <input type="text" id="pMemSearch" class="f-inp" placeholder="🔍 Search Member..." oninput="handleModalSearch(this.value)">
            <div id="pSuggestions" class="suggestions-list"></div>
            <input type="hidden" id="pSelectedMid">
        </div>

        <select id="pGroup" class="f-inp" onchange="checkChitStatus()"><option value="">-- Select Member First --</option></select>
        
        <div class="row g-2">
            <div class="col-6"><input type="number" id="pChit" class="f-inp" placeholder="Chit Amount ₹"></div>
            <div class="col-6"><input type="number" id="pPaid" class="f-inp" placeholder="Amount Paid ₹"></div>
        </div>

        <label class="small text-dim mb-1">PAYMENT MODE</label>
        <select id="pMode" class="f-inp">
            <option value="GPay">GPay</option>
            <option value="PhonePe">PhonePe</option>
            <option value="Cash">Cash</option>
            <option value="Bank Transfer">Bank Transfer</option>
        </select>

        <label class="small text-dim mb-1">CHIT PICKED?</label>
        <select id="pPicked" class="f-inp">
            <option value="No">No</option>
            <option value="Yes">Yes ✅</option>
        </select>

        <button class="btn w-100 py-3 fw-bold mt-2" style="background: linear-gradient(90deg, #ff8000, #ff9500); color: black; border-radius: 12px;" onclick="savePayment()">✓ Sync Payment</button>
        <button class="btn btn-link w-100 text-white" onclick="closeModal('payModal')">Cancel</button>
    </div>
</div>

<script>
// --- UPDATED JAVASCRIPT LOGIC ---

// Function to check if member already picked a chit in the selected group
async function checkChitStatus() {
    const mid = document.getElementById('pSelectedMid').value;
    const gid = document.getElementById('pGroup').value;
    const pickedSelect = document.getElementById('pPicked');

    if (!mid || !gid) return;

    // Check our local cache of payments for this specific member and group
    const alreadyPicked = _cache.p.some(p => 
        p.memberId === mid && 
        p.groupId === gid && 
        (p.chitPicked === 'Yes' || p.picked === true)
    );

    if (alreadyPicked) {
        pickedSelect.value = "No";
        pickedSelect.options[1].disabled = true; // Disable "Yes"
        pickedSelect.style.opacity = "0.5";
    } else {
        pickedSelect.options[1].disabled = false;
        pickedSelect.style.opacity = "1";
    }
}

// Updated selectForPay to trigger the check
function selectForPay(id, name) {
    document.getElementById('pMemSearch').value = name;
    document.getElementById('pSelectedMid').value = id;
    document.getElementById('pSuggestions').style.display = 'none';
    const member = _cache.m.find(x => x.id === id);
    const gDrop = document.getElementById('pGroup');
    
    gDrop.innerHTML = (member.groupIds || []).map(gid => {
        const group = _cache.g.find(g => g.id === gid);
        return `<option value="${gid}">${group ? group.name : 'Unknown Group'}</option>`;
    }).join('') || '<option value="">No Groups Found</option>';

    checkChitStatus(); // Check immediately after selection
}

// Updated Save Payment to include Mode and Picked status
async function savePayment() {
    const mid = document.getElementById('pSelectedMid').value;
    const gid = document.getElementById('pGroup').value;
    const chit = parseFloat(document.getElementById('pChit').value) || 0;
    const paid = parseFloat(document.getElementById('pPaid').value) || 0;
    const mode = document.getElementById('pMode').value;
    const picked = document.getElementById('pPicked').value;
    
    if(!mid || isNaN(paid)) return alert("Select member and enter amount.");

    await db.collection('payments').add({
        memberId: mid,
        groupId: gid,
        amountPaid: paid,
        balance: Math.max(0, chit - paid),
        mode: mode,
        chitPicked: picked,
        date: document.getElementById('pDate').value,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
    
    closeModal('payModal');
    await sync(); // Refresh global cache
    alert("✅ Payment Recorded");
}

// Existing handleSearch, renderLedger, etc. remain the same...
</script>
