<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Chit Funds v2.1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg:#0a0e1a; --card:#141b2d; --inp:#1c253b; --gold:linear-gradient(90deg,#ff9800,#f57c00); --txt:#fff; --dim:#8e9aaf; --brd:#252f48; }
        body { background:var(--bg); color:var(--txt); font-family:'Segoe UI',sans-serif; padding-bottom:100px; }
        .app-h { display:flex; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--brd); }
        .stat-card { background:var(--card); border:1px solid var(--brd); border-radius:15px; padding:12px; text-align:center; height:100%; }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; padding:20px; overflow-y:auto; }
        .m-content { background:var(--card); border-radius:25px; padding:25px; max-width:450px; margin:auto; border:1px solid var(--brd); }
        .f-inp { background:var(--inp); border:1px solid var(--brd); color:#fff; padding:12px; border-radius:12px; width:100%; margin-bottom:10px; font-size:0.9rem; }
        .nav-b { position:fixed; bottom:0; width:100%; background:#070b14; display:flex; justify-content:space-around; padding:10px 0; border-top:1px solid var(--brd); z-index:1000; }
        .n-item { cursor:pointer; text-align:center; font-size:0.65rem; color:var(--dim); }
        .n-item.active { color:#f39c12; font-weight:bold; }
        .t-custom { color:#fff; font-size:0.75rem; width:100%; }
        .t-custom th { color:var(--dim); padding:10px 5px; border-bottom:1px solid var(--brd); text-transform:uppercase; font-size:0.6rem; }
        .t-custom td { padding:10px 5px; border-bottom:1px solid rgba(255,255,255,0.05); }
        .tab-c { display:none; } .tab-c.active { display:block; }
        .suggest-l { background:var(--inp); border:1px solid var(--brd); position:absolute; width:100%; z-index:100; max-height:150px; overflow-y:auto; }
    </style>
</head>
<body>

<div class="container py-2">
    <header class="app-h">
        <div class="text-warning fw-bold fs-4">AK Chit Funds</div>
        <div class="d-flex gap-2 align-items-center">
            <span class="badge border border-warning text-warning">ADMIN</span>
            <button class="btn btn-sm btn-outline-danger" onclick="handleLogout()">Logout</button>
        </div>
    </header>

    <main id="homeTab" class="tab-c active">
        <div class="row g-2 mt-3">
            <div class="col-4"><div class="stat-card"><span class="stat-num d-block fw-bold text-warning" id="memberCount">0</span><small class="stat-label">Members</small></div></div>
            <div class="col-4"><div class="stat-card"><span class="stat-num d-block fw-bold text-warning" id="groupCount">0</span><small class="stat-label">Groups</small></div></div>
            <div class="col-4"><div class="stat-card"><span class="stat-num d-block fw-bold text-success" id="todayColl">₹0</span><small class="stat-label">Today</small></div></div>
        </div>
        <button class="btn btn-warning w-100 py-3 fw-bold mt-3 rounded-4" onclick="openModal('paymentModal')">💳 Record Payment</button>
        <div class="p-3 my-3 bg-dark rounded-4 border border-secondary position-relative">
            <input type="text" id="summarySearch" class="f-inp" placeholder="🔍 Search Member Ledger..." oninput="filterSearch('summarySearch','summaryList','summaryView')">
            <div id="summaryList" class="suggest-l" style="display:none;"></div>
            <div id="ledgerData" class="mt-2"></div>
        </div>
    </main>

    <section id="groupsTab" class="tab-c"><div id="groupListArea" class="mt-3"></div></section>
    <section id="backupTab" class="tab-c">
        <div class="stat-card p-4 mt-3">
            <button class="btn btn-warning w-100 mb-3" onclick="exportFullBackup()">💾 Download JSON Backup</button>
            <button class="btn btn-success w-100 mb-3" onclick="exportToExcel()">📊 Export to Excel</button>
            <input type="file" id="restoreFile" class="form-control bg-dark text-white border-secondary mb-2">
            <button class="btn btn-danger w-100" onclick="confirmRestore()">🔄 Restore All Data</button>
        </div>
    </section>
</div>

<nav class="nav-b">
    <div class="n-item active" onclick="switchTab('home')" id="navHome">🏠<br>Home</div>
    <div class="n-item" onclick="switchTab('groups')" id="navGroups">📁<br>Groups</div>
    <div class="n-item" onclick="switchTab('backup')" id="navBackup">💾<br>Backup</div>
</nav>

<div id="paymentModal" class="modal-overlay">
    <div class="m-content">
        <h5 class="mb-3 fw-bold">Record Payment</h5>
        <input type="date" id="pDate" class="f-inp">
        <input type="text" id="pMemberSearch" class="f-inp" placeholder="Search Member Name...">
        <select id="pGroup" class="f-inp"><option value="">Select Group</option></select>
        <div class="row g-2">
            <div class="col-6"><input type="number" id="pChit" class="f-inp" placeholder="Chit Amount ₹"></div>
            <div class="col-6"><input type="number" id="pPaid" class="f-inp" placeholder="Paid Amount ₹"></div>
        </div>
        <button class="btn btn-warning w-100 py-2 fw-bold rounded-3" onclick="savePayment()">✓ Save Sync</button>
        <button class="btn btn-link w-100 text-dim mt-2" onclick="closeModal('paymentModal')">Cancel</button>
    </div>
</div>

<script>
    const firebaseConfig={apiKey:"AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU",authDomain:"ak-events-2016.firebaseapp.com",projectId:"ak-events-2016",storageBucket:"ak-events-2016.firebasestorage.app",appId:"1:78066764444:web:5bb9e0d48c128a8632fb59"};
    firebase.initializeApp(firebaseConfig);
    const db=firebase.firestore();
    let _dbCache={}, _cacheTs={};

    const fmtAmt = v => '₹' + (parseFloat(v)||0).toLocaleString('en-IN');
    const fmtDate = d => d ? d.split("-").reverse().join("/") : "—";
    
    async function getCollection(col, force=false){
        const now = Date.now();
        if(!force && _dbCache[col] && (now - _cacheTs[col] < 60000)) return _dbCache[col];
        const s = await db.collection(col).get();
        _dbCache[col] = s.docs.map(d=>({id:d.id, ...d.data()}));
        _cacheTs[col] = now;
        return _dbCache[col];
    }

    function switchTab(t) {
        document.querySelectorAll('.tab-c').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.n-item').forEach(i => i.classList.remove('active'));
        document.getElementById(t + 'Tab').classList.add('active');
        document.getElementById('nav' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
        if(t === 'home') updateUI();
    }

    async function updateUI(){
        const [m, g, p] = await Promise.all([getCollection('members'), getCollection('groups'), getCollection('payments')]);
        document.getElementById('memberCount').innerText = m.length;
        document.getElementById('groupCount').innerText = g.length;
        const today = new Date().toISOString().split('T')[0];
        const total = p.filter(x => x.date === today).reduce((s,x) => s + (parseFloat(x.paid)||0), 0);
        document.getElementById('todayColl').innerText = fmtAmt(total);
    }

    function openModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // Logic for search, savePayment, and ledger loading goes here...
    document.addEventListener('DOMContentLoaded', updateUI);
</script>
</body>
</html>
