<script>
// UPDATED RENDER FUNCTION WITH DELETE BUTTON
function renderExpenses() {
    const list = document.getElementById('expenseList');
    let total = 0;
    
    if (EXPENSES.length === 0) {
        list.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-dim); font-size:0.8rem;">
            No transactions yet. Start by adding an expense!
        </div>`;
        document.getElementById('totalSpent').innerText = '₹0';
        return;
    }

    list.innerHTML = EXPENSES.map(exp => {
        // Don't count settlements in the "Total Monthly Spending"
        if(exp.type !== 'settlement') total += parseFloat(exp.amount || 0);
        
        const split = (exp.amount / (MEMBERS.length || 1)).toFixed(0);
        const isSettlement = exp.type === 'settlement';
        
        return `
        <div class="expense-item" style="${isSettlement ? 'border-left: 4px solid #10b981; background: rgba(16,185,129,0.03);' : ''}">
            <div class="avatar" style="${isSettlement ? 'background:#10b981; color:white;' : ''}">
                ${isSettlement ? '🤝' : (exp.payerName ? exp.payerName[0].toUpperCase() : '?')}
            </div>
            
            <div style="flex:1; min-width:0;">
                <div style="font-weight:bold; font-size:0.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                    ${exp.description}
                </div>
                <div style="font-size:0.7rem; color:var(--text-dim);">
                    ${isSettlement ? 'Debt Clearance' : 'Paid by ' + exp.payerName}
                </div>
            </div>

            <div style="text-align:right; display:flex; align-items:center; gap:12px; margin-left:10px;">
                <div>
                    <div style="font-weight:900; font-size:0.95rem; color:${isSettlement ? '#10b981' : '#fff'};">
                        ₹${isSettlement ? (exp.amount/MEMBERS.length).toFixed(0) : exp.amount}
                    </div>
                    <div style="font-size:0.6rem; color:var(--text-dim);">
                        ${isSettlement ? 'Settled' : 'Split: ₹'+split}
                    </div>
                </div>
                
                <button onclick="deleteExpense('${exp.id}', '${exp.description}')" 
                        style="background:rgba(239, 68, 68, 0.1); border:none; color:#ef4444; width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer;">
                    <span style="font-size: 1rem;">🗑️</span>
                </button>
            </div>
        </div>`;
    }).join('');
    
    document.getElementById('totalSpent').innerText = '₹' + total.toLocaleString('en-IN');
}

// DELETE FUNCTION
async function deleteExpense(id, desc) {
    if (confirm(`Delete "${desc}"? This will affect everyone's balances.`)) {
        try {
            await db.collection('expenses').doc(id).delete();
            showToast("🗑️ Expense removed");
        } catch (error) {
            console.error("Error deleting expense:", error);
            alert("Failed to delete. Check connection.");
        }
    }
}

// UPDATED TOAST (Supports both success and warning)
function showToast(msg) {
    const existing = document.querySelector('.custom-toast');
    if(existing) existing.remove();

    const t = document.createElement('div');
    t.className = 'custom-toast';
    t.style.cssText = "position:fixed; bottom:110px; left:50%; transform:translateX(-50%); background:#252f48; border:1px solid var(--border); color:white; padding:12px 24px; border-radius:16px; z-index:5000; font-size:0.8rem; font-weight:bold; box-shadow:0 10px 25px rgba(0,0,0,0.5); transition: all 0.3s ease;";
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2500);
}
</script>
