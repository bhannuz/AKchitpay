<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THODP - Trip Vault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg-dark:#060b19; --sidebar-bg:#0f172a; --card-bg:#1e293b; 
            --accent-blue:#007bff; --text-main:#ffffff; --text-dim:#94a3b8; --border:#334155; 
        }
        body { background-color:var(--bg-dark); color:var(--text-main); font-family:'Segoe UI', sans-serif; margin:0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Layout */
        .sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 25px 20px; font-size: 1.4rem; font-weight: 800; color: #f39c12; display: flex; align-items: center; gap: 10px; }
        .sidebar-menu { flex: 1; overflow-y: auto; padding: 10px; }
        .nav-link-custom { 
            display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; 
            color: var(--text-dim); text-decoration: none; border-radius: 8px; margin-bottom: 5px; transition: 0.2s; cursor: pointer;
        }
        .nav-link-custom:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-link-custom.active { background: var(--accent-blue); color: white; font-weight: 600; }
        .count-badge { background: rgba(0,0,0,0.2); padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; }

        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: var(--bg-dark); }
        .top-bar { padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; background: var(--bg-dark); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .content-body { padding: 30px; max-width: 1000px; margin: 0 auto; width: 100%; }

        /* SAP Library Card Style */
        .sap-card { 
            background: var(--card-bg); border-radius: 12px; padding: 20px 25px; margin-bottom: 15px; 
            border-left: 4px solid #f39c12; display: flex; justify-content: space-between; align-items: center;
            transition: transform 0.2s; cursor: pointer; position: relative;
        }
        .sap-card:hover { transform: translateX(5px); background: #2d3748; }
        .sap-card-title { font-size: 1.1rem; font-weight: 500; }
        
        .form-control-sap { background: white; border-radius: 6px; padding: 10px 15px; border: none; width: 100%; max-width: 400px; margin-right: 10px; }
        .btn-sap { background: #f39c12; color: black; font-weight: 600; border: none; border-radius: 6px; padding: 10px 20px; }
        
        /* Mobile Optimization */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
            .sidebar-menu { display: flex; overflow-x: auto; padding: 10px; }
            .nav-link-custom { flex-shrink: 0; margin-right: 10px; }
        }

        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:3000; padding:20px; overflow-y:auto; }
        .modal-content-custom { background:var(--sidebar-bg); border-radius:15px; padding:30px; max-width:500px; margin:50px auto; border: 1px solid var(--border); }
        .form-input { background:var(--bg-dark); border:1px solid var(--border); color:white; padding:12px; border-radius:8px; width:100%; margin-bottom:15px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">📚 Trip Library</div>
    <div class="sidebar-menu">
        <div style="font-size: 0.65rem; color: var(--text-dim); padding: 10px 15px; text-transform: uppercase; letter-spacing: 1px;">Navigation</div>
        <div class="nav-link-custom" onclick="switchTab('activity')" id="nav-activity">Activity</div>
        <div class="nav-link-custom" onclick="switchTab('members')" id="nav-members">Members</div>
        
        <div style="font-size: 0.65rem; color: var(--text-dim); padding: 20px 15px 10px; text-transform: uppercase; letter-spacing: 1px;">Recent Trips</div>
        <div id="sidebarGroups"></div>
        
        <div class="nav-link-custom" style="color: #f39c12; margin-top: 10px;" onclick="openModal('groupModal')">+ Add New Trip</div>
    </div>
</div>

<div class="main-content">
    <div class="top-bar">
        <input type="text" id="expenseSearch" class="form-control-sap" placeholder="Search topic..." oninput="renderExpenses()">
        <div class="d-flex gap-2">
            <button class="btn-sap" onclick="prepareNewExpense()">+ Add New Topic</button>
            <button onclick="toggleTheme()" style="background:none; border:none; font-size:1.2rem;" id="themeIcon">🌙</button>
        </div>
    </div>

    <div class="content-body">
        <h2 id="currentTripName" style="margin-bottom: 30px; font-weight: 700;">Select a Trip</h2>

        <div id="activityView" class="tab-content active">
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <div class="balance-card m-0" style="height: 100%;">
                        <div style="font-size: 0.8rem; color: var(--text-dim);">TRIP TOTAL</div>
                        <div id="totalSpent" style="font-size: 2.2rem; font-weight: 800;">₹0</div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="balance-card m-0" style="height: 100%; border-color: var(--accent-blue);">
                        <div style="font-size: 0.8rem; color: var(--text-dim);">SETTLEMENT STATUS</div>
                        <div id="settlementSummary" style="font-size: 0.9rem; margin-top: 5px;">✅ Settled</div>
                    </div>
                </div>
            </div>
            <div id="expenseList"></div>
        </div>

        <div id="membersView" class="tab-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4>Members in this Trip</h4>
                <button class="btn btn-sm btn-outline-primary" onclick="openAddMemberModal()">+ Add Person</button>
            </div>
            <div id="memberListArea"></div>
        </div>
    </div>
</div>

<div id="expenseModal" class="modal-overlay">
    <div class="modal-content-custom">
        <h4 id="modalTitle">Expense Detail</h4>
        <input type="hidden" id="editExpId">
        <select id="expCategory" class="form-input">
            <option value="🍛 Food">Food</option><option value="⛽ Petrol">Petrol</option>
            <option value="🚗 Travel">Travel</option><option value="⚙️ Misc">Misc</option>
        </select>
        <input type="text" id="expDesc" class="form-input" placeholder="Topic name...">
        <input type="number" id="expAmount" class="form-input" placeholder="Amount (₹)">
        <label class="small text-dim">Paid By</label>
        <select id="expPayer" class="form-input"></select>
        <label class="small text-dim">Participated</label>
        <div id="participantList" style="max-height: 120px; overflow-y: auto; margin-bottom: 15px; border:1px solid var(--border); padding:10px; border-radius:8px;"></div>
        <button class="btn-primary-custom w-100" onclick="saveExpense()">Confirm Transaction</button>
        <button class="btn btn-link w-100 mt-2 text-dim" onclick="closeModal('expenseModal')">Cancel</button>
    </div>
</div>

<div id="groupModal" class="modal-overlay">
    <div class="modal-content-custom">
        <h5>New Library Group</h5>
        <input type="text" id="groupName" class="form-input" placeholder="e.g. Europe Trip 2026">
        <button class="btn-primary-custom w-100" onclick="saveGroup()">Create Group</button>
        <button class="btn btn-link w-100 text-dim" onclick="closeModal('groupModal')">Cancel</button>
    </div>
</div>

<div id="memberModal" class="modal-overlay">
    <div class="modal-content-custom">
        <h5>Add Member to Trip</h5>
        <input type="text" id="memName" class="form-input" placeholder="Full Name">
        <button class="btn-primary-custom w-100" onclick="saveMember()">Add</button>
        <button class="btn btn-link w-100 text-dim" onclick="closeModal('memberModal')">Cancel</button>
    </div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyB9_sBL83skvIaOVAE8msHwIWq8QQwhxFU", projectId: "ak-chit-funds", authDomain: "ak-chit-funds.firebaseapp.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let MEMBERS = []; let EXPENSES = []; let GROUPS = [];
let activeGroupId = localStorage.getItem('activeGroupId') || null;

function startApp() {
    db.collection('groups').onSnapshot(snap => {
        GROUPS = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
        if (!activeGroupId && GROUPS.length > 0) setActiveGroup(GROUPS[0].id);
        renderSidebar();
    });
    db.collection('members').onSnapshot(snap => {
        MEMBERS = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
        renderMembers(); updatePayerDropdown(); renderParticipantsChecklist();
    });
    db.collection('expenses').orderBy('timestamp', 'desc').onSnapshot(snap => {
        EXPENSES = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
        renderExpenses(); calculateDebts();
    });
}

function setActiveGroup(id) {
    activeGroupId = id; localStorage.setItem('activeGroupId', id);
    const group = GROUPS.find(g => g.id === id);
    if(group) document.getElementById('currentTripName').innerText = group.name;
    renderSidebar(); renderExpenses(); renderMembers(); calculateDebts();
}

function renderSidebar() {
    const list = document.getElementById('sidebarGroups');
    list.innerHTML = GROUPS.map(g => {
        const mCount = MEMBERS.filter(m => m.groupId === g.id).length;
        return `
            <div class="nav-link-custom ${activeGroupId === g.id ? 'active' : ''}" onclick="setActiveGroup('${g.id}')">
                <span>${g.name}</span>
                <span class="count-badge">${mCount}</span>
            </div>
        `;
    }).join('');
}

function renderExpenses() {
    const list = document.getElementById('expenseList');
    const search = document.getElementById('expenseSearch').value.toLowerCase();
    let total = 0;
    const filtered = EXPENSES.filter(e => e.groupId === activeGroupId && e.description.toLowerCase().includes(search));

    list.innerHTML = filtered.map(exp => {
        if(exp.type !== 'settlement') total += parseFloat(exp.amount || 0);
        return `
        <div class="sap-card">
            <div>
                <div class="sap-card-title">${exp.description}</div>
                <div style="font-size: 0.75rem; color: var(--text-dim);">${exp.payerName} • ${exp.category || 'Misc'}</div>
            </div>
            <div style="text-align: right;">
                <div style="font-weight: 700; font-size: 1.1rem;">₹${exp.amount}</div>
                <div style="display: flex; gap: 10px; margin-top: 5px;">
                    <span onclick="editExpense('${exp.id}')" style="cursor:pointer">✏️</span>
                    <span onclick="deleteExpense('${exp.id}')" style="cursor:pointer">🗑️</span>
                </div>
            </div>
        </div>`;
    }).join('');
    document.getElementById('totalSpent').innerText = '₹' + total.toLocaleString('en-IN');
}

function calculateDebts() {
    const gExp = EXPENSES.filter(e => e.groupId === activeGroupId);
    const gMembers = MEMBERS.filter(m => m.groupId === activeGroupId);
    if (gMembers.length < 2) { document.getElementById('settlementSummary').innerText = "Add members first."; return; }
    
    let balances = {}; gMembers.forEach(m => balances[m.id] = 0);
    gExp.forEach(exp => {
        const amt = parseFloat(exp.amount);
        const parts = exp.participants || gMembers.map(m=>m.id);
        const share = amt / parts.length;
        if(balances[exp.payerId] !== undefined) balances[exp.payerId] += amt;
        parts.forEach(pId => { if(balances[pId] !== undefined) balances[pId] -= share; });
    });
    
    let instructions = [];
    let tempBal = {...balances};
    let debtors = gMembers.filter(m => tempBal[m.id] < -1).sort((a,b) => tempBal[a.id] - tempBal[b.id]);
    let creditors = gMembers.filter(m => tempBal[m.id] > 1).sort((a,b) => tempBal[b.id] - tempBal[a.id]);

    debtors.forEach(d => {
        creditors.forEach(c => {
            let owed = Math.min(Math.abs(tempBal[d.id]), tempBal[c.id]);
            if (owed > 1) {
                instructions.push(`<div style="margin-bottom:5px;"><b>${d.name}</b> owe <b>${c.name}</b> <span style="color:#ef4444">₹${owed.toFixed(0)}</span></div>`);
                tempBal[d.id] += owed; tempBal[c.id] -= owed;
            }
        });
    });
    document.getElementById('settlementSummary').innerHTML = instructions.length ? instructions.join('') : "✅ Trip is settled!";
}

function renderMembers() {
    const area = document.getElementById('memberListArea');
    const gMembers = MEMBERS.filter(m => m.groupId === activeGroupId);
    area.innerHTML = gMembers.map(m => `
        <div class="sap-card" style="border-left-color: #3b82f6;">
            <div class="sap-card-title">${m.name}</div>
            <button class="btn btn-sm text-danger" onclick="deleteMember('${m.id}')">Remove</button>
        </div>`).join('') || '<div class="text-dim">No members in this trip.</div>';
}

function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById(tab + 'View').classList.add('active');
    document.querySelectorAll('.nav-link-custom').forEach(l => l.classList.remove('active'));
    document.getElementById('nav-' + tab).classList.add('active');
}

// Logic helpers (save, delete, etc. same as before)
async function saveExpense() {
    const id = document.getElementById('editExpId').value;
    const data = {
        groupId: activeGroupId, description: document.getElementById('expDesc').value,
        amount: parseFloat(document.getElementById('expAmount').value),
        category: document.getElementById('expCategory').value,
        payerId: document.getElementById('expPayer').value,
        payerName: MEMBERS.find(m => m.id === document.getElementById('expPayer').value)?.name,
        participants: Array.from(document.querySelectorAll('.split-cb:checked')).map(cb => cb.value),
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    };
    if(id) await db.collection('expenses').doc(id).update(data);
    else await db.collection('expenses').add(data);
    closeModal('expenseModal');
}

async function saveGroup() {
    const name = document.getElementById('groupName').value;
    if(name) { const doc = await db.collection('groups').add({name}); setActiveGroup(doc.id); }
    closeModal('groupModal');
}

async function saveMember() {
    const name = document.getElementById('memName').value;
    if(name && activeGroupId) await db.collection('members').add({name, groupId: activeGroupId});
    closeModal('memberModal');
}

function updatePayerDropdown() {
    const gMembers = MEMBERS.filter(m => m.groupId === activeGroupId);
    document.getElementById('expPayer').innerHTML = gMembers.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
}

function renderParticipantsChecklist(selected = []) {
    const gMembers = MEMBERS.filter(m => m.groupId === activeGroupId);
    document.getElementById('participantList').innerHTML = gMembers.map(m => `
        <label class="participant-chip"><input type="checkbox" value="${m.id}" class="split-cb" checked> ${m.name}</label>`).join('');
}

function prepareNewExpense() {
    if(!activeGroupId) return alert("Select a trip!");
    document.getElementById('modalTitle').innerText = "Add New Topic";
    document.getElementById('editExpId').value = "";
    document.getElementById('expDesc').value = "";
    document.getElementById('expAmount').value = "";
    openModal('expenseModal');
}

async function deleteExpense(id) { if(confirm("Delete expense?")) await db.collection('expenses').doc(id).delete(); }
async function deleteMember(id) { if(confirm("Delete member?")) await db.collection('members').doc(id).delete(); }
function openModal(id) { document.getElementById(id).style.display = 'block'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function toggleTheme() { /* theme logic */ }

document.addEventListener('DOMContentLoaded', startApp);
</script>
</body>
</html>
