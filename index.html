<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="balance-card" id="chartSection" style="display:none; margin-top:0;">
    <h6 style="font-size: 0.7rem; color: var(--text-dim); margin-bottom: 15px; letter-spacing: 1px;">SPENDING BY CATEGORY</h6>
    <div style="max-height: 200px; position: relative;">
        <canvas id="categoryChart"></canvas>
    </div>
</div>

<script>
// 3. ADD THESE VARIABLES TO THE TOP OF YOUR SCRIPT
let categoryChart = null;

// 4. ADD THIS FUNCTION TO YOUR SCRIPT
function updateCategoryChart() {
    const chartCtx = document.getElementById('categoryChart');
    if (!chartCtx) return;

    // Aggregate spending by category
    const categoryTotals = {};
    EXPENSES.forEach(exp => {
        if (exp.type !== 'settlement') {
            const cat = exp.category || "⚙️ Misc";
            categoryTotals[cat] = (categoryTotals[cat] || 0) + parseFloat(exp.amount);
        }
    });

    const labels = Object.keys(categoryTotals);
    const data = Object.values(categoryTotals);

    // Show chart section only if there is data
    document.getElementById('chartSection').style.display = labels.length > 0 ? 'block' : 'none';

    // Chart.js Configuration
    const chartData = {
        labels: labels,
        datasets: [{
            data: data,
            backgroundColor: [
                '#3b82f6', '#10b981', '#f39c12', '#ef4444', '#8b5cf6', '#ec4899', '#64748b'
            ],
            borderWidth: 0,
            hoverOffset: 10
        }]
    };

    if (categoryChart) {
        categoryChart.data = chartData;
        categoryChart.update();
    } else {
        categoryChart = new Chart(chartCtx, {
            type: 'doughnut', // 'pie' or 'doughnut' look great
            data: chartData,
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'right',
                        labels: {
                            color: getComputedStyle(document.documentElement).getPropertyValue('--text-dim'),
                            font: { size: 10 },
                            usePointStyle: true
                        }
                    }
                },
                cutout: '70%' // Makes it a sleek doughnut
            }
        });
    }
}

// 5. CALL THIS AT THE END OF YOUR renderExpenses() FUNCTION
function renderExpenses() {
    // ... [your existing render logic] ...
    
    updateCategoryChart(); // Add this line here
}
</script>
