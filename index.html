<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Admin - Smart UPI Portal v4.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg:#0a0e1a; --card:#141b2d; --inp:#1c253b; --gold:#f39c12; --border:#252f48; --text-dim:#8e9aaf; --green:#2ecc71; }
        body { background-color:var(--bg); color:white; font-family:'Segoe UI',sans-serif; padding-bottom:120px; margin:0; }
        .stat-card { background:var(--card); border:1px solid var(--border); border-radius:15px; padding:15px; text-align:center; }
        .stat-num { font-size:1.6rem; font-weight:bold; }
        .btn-record-main { background:var(--gold); color:#000; font-weight:800; border:none; padding:18px; border-radius:15px; width:100%; font-size:1.1rem; margin-bottom: 15px;}
        .search-box { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px; width:100%; color:white; outline:none; }
        .suggestions-list { position:absolute; width:100%; background:var(--inp); border:1px solid var(--border); z-index:3000; border-radius:0 0 12px 12px; max-height:200px; overflow-y:auto; display:none; }
        .suggestion-item { padding:12px; cursor:pointer; border-bottom:1px solid var(--border); }
        .member-card { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:20px; margin-top:20px; border-left: 4px solid var(--gold); }
        .table-custom { width:100%; font-size:0.8rem; margin-top:10px; border-collapse: separate; border-spacing: 0 5px; }
        .table-custom th { color:var(--text-dim); padding:10px; text-transform:uppercase; font-size:0.6rem; }
        .table-custom td { padding:10px; vertical-align: middle; background: rgba(255,255,255,0.01); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; padding:20px; overflow-y:auto; }
        .m-content { background:var(--card); border-radius:25px; padding:25px; max-width:480px; margin:auto; border: 1px solid var(--border); }
        .f-inp { background:var(--inp); border:1px solid var(--border); color:white; padding:12px; border-radius:10px; width:100%; margin-bottom:15px; }
        .f-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; display: block; }
        .nav-bar { position:fixed; bottom:0; width:100%; background:#070b14; display:flex; justify-content:space-around; padding:15px 0; border-top:1px solid var(--border); z-index: 1000; }
        .nav-item { cursor:pointer; text-align:center; font-size:0.7rem; color:var(--text-dim); }
        .nav-item.active { color:var(--gold); font-weight: bold; }
        .tab-content { display:none; } .tab-content.active { display:block; }
    </style>
</head>
<body>

<div class="container py-3">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="mb-0 fw-bold text-warning">AK ADMIN <small class="text-dim" style="font-size:0.6rem">v4.0</small></h5>
        <button class="btn btn-sm btn-outline-warning rounded-pill px-3" onclick="openModal('setupModal')">⚙️ UPI Setup</button>
    </div>

    <div class="row g-2 mb-4 text-center">
        <div class="col-4"><div class="stat-card"><div class="stat-num" id="stM">0</div><small class="text-dim">MEMBERS</small></div></div>
        <div class="col-4"><div class="stat-card"><div class="stat-num" id="stG">0</div><small class="text-dim">GROUPS</small></div></div>
        <div class="col-4"><div class="stat-card"><div class="stat-num text-success" id="stT">₹0</div><small class="text-dim">TODAY</small></div></div>
    </div>

    <div id="homeTab" class="tab-content active">
        <button class="btn-record-main" onclick="openModal('payModal')">💳 Record Payment</button>
        <div class="row g-2 mb-4">
            <div class="col-6"><button class="btn btn-outline-warning w-100 py-3 fw-bold" style="border-radius:12px;" onclick="openModal('memModal')">👤 New Member</button></div>
            <div class="col-6"><button class="btn btn-outline-success w-100 py-3 fw-bold" style="border-radius:12px;" onclick="openModal('grpModal')">🏦 New Group</button></div>
        </div>
        <div class="position-relative mb-4">
            <input type="text" id="mSearch" class="search-box" placeholder="Search Member for Ledger..." oninput="handleSearch(this.value)">
            <div id="mSuggestions" class="suggestions-list shadow-lg"></div>
        </div>
        <div id="ledgerArea"></div>
    </div>

    <div id="groupsTab" class="tab-content">
        <div id="groupsArea"></div>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="switchTab('home', this)">🏠<br>Home</div>
    <div class="nav-item" onclick="switchTab('groups', this)">📁<br>Groups</div>
</nav>

<div id="setupModal" class="modal-overlay">
    <div class="m-content">
        <h5 class="text-warning fw-bold mb-3">⚙️ Admin Settings</h5>
        <label class="f-label">Full UPI ID (e.g. bhanumudhelli@okicici)</label>
        <input type="text" id="adminUPI" class="f-inp" placeholder="yourname@bank">
        <label class="f-label">Standard Chit Amount (₹)</label>
        <input type="number" id="stdAmt" class="f-inp" placeholder="e.g. 10000">
        <button class="btn btn-warning w-100 py-3 fw-bold" onclick="saveSettings()">Save Configuration</button>
        <button class="btn btn-link w-100 text-white mt-2" onclick="closeModal('setupModal')">Close</button>
    </div>
</div>

<div id="payModal" class="modal-overlay">
    <div class="m-content">
        <h5 class="mb-4 text-warning fw-bold">💳 Record Payment</h5>
        <label class="f-label">Member</label>
        <select id="pMember" class="f-inp" onchange="updateGroupDropdown()"></select>
        <label class="f-label">Group</label>
        <select id="pGroup" class="f-inp"></select>
        <div class="row g-2">
            <div class="col-6"><label class="f-label">Paid Amount</label><input type="number" id="pPaid" class="f-inp" placeholder="₹"></div>
            <div class="col-6"><label class="f-label">Balance</label><input type="number" id="pBal" class="f-inp" placeholder="₹"></div>
        </div>
        <label class="f-label">Chit Picked?</label>
        <select id="pPicked" class="f-inp"><option value="No">No</option><option value="Yes">Yes ✅</option></select>
        <button class="btn btn-warning w-100 py-3 fw-bold mt-2" onclick="savePayment()">✓ Sync Payment</button>
        <button class="btn btn-link w-100 text-white" onclick="closeModal('payModal')">Cancel</button>
    </div>
</div>

<div id="memModal" class="modal-overlay">
    <div class="m-content">
        <h5 class="mb-4 fw-bold text-center">👤 Create New Member</h5>
        <input type="text" id="memN" class="f-inp" placeholder="Full Name">
        <input type="tel" id="memP" class="f-inp" placeholder="Phone Number">
        <select id="memG" class="f-inp"></select>
        <input type="number" id="memQ" class="f-inp" value="1" placeholder="Quantity">
        <button class="btn btn-warning w-100 py-3 fw-bold" onclick="createMember()">Create Member</button>
        <button class="btn btn-link w-100 text-dim mt-2" onclick="closeModal('memModal')">Cancel</button>
    </div>
</div>

<div id="grpModal" class="modal-overlay">
    <div class="m-content text-center">
        <h5 class="mb-4 fw-bold">🏦 New Group</h5>
        <input type="text" id="grpN" class="f-inp" placeholder="Group Name">
        <input type="number" id="grpD" class="f-inp" placeholder="Duration (Months)">
        <button class="btn btn-success w-100 py-2 fw-bold" onclick="createGroup()">Create Group</button>
        <button class="btn btn-link text-dim mt-2" onclick="closeModal('grpModal')">Cancel</button>
    </div>
</div>

<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = { apiKey: "AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU", authDomain: "ak-events-2016.firebaseapp.com", projectId: "ak-events-2016" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let _cache = { m: [], g: [], p: [] };
let _settings = { upi: localStorage.getItem('ak_upi') || '', amt: localStorage.getItem('ak_amt') || '0' };

async function sync() {
    const [m, g, p] = await Promise.all([db.collection('members').get(), db.collection('groups').get(), db.collection('payments').get()]);
    _cache.m = m.docs.map(d => ({id:d.id, ...d.data()}));
    _cache.g = g.docs.map(d => ({id:d.id, ...d.data()}));
    _cache.p = p.docs.map(d => ({id:d.id, ...d.data()}));
    document.getElementById('stM').innerText = _cache.m.length;
    document.getElementById('stG').innerText = _cache.g.length;
}

function switchTab(id, el) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id + 'Tab').classList.add('active');
    el.classList.add('active');
    if(id === 'groups') renderGroups();
}

function handleSearch(val) {
    const list = document.getElementById('mSuggestions');
    if (val.length < 1) { list.style.display = 'none'; return; }
    const filtered = _cache.m.filter(m => m.name.toLowerCase().includes(val.toLowerCase()));
    list.innerHTML = filtered.map(m => `<div class="suggestion-item" onclick="selectMember('${m.id}','${m.name}')">${m.name}</div>`).join('');
    list.style.display = 'block';
}

function selectMember(id, name) {
    document.getElementById('mSearch').value = name;
    document.getElementById('mSuggestions').style.display = 'none';
    const m = _cache.m.find(x => x.id === id);
    const mPays = _cache.p.filter(p => p.memberId === id);
    document.getElementById('ledgerArea').innerHTML = `
        <div class="member-card">
            <h4 class="fw-bold mb-3">${m.name}</h4>
            <table class="table-custom">
                <thead><tr><th>Date</th><th>Paid</th><th>Bal</th><th>Pick</th></tr></thead>
                <tbody>${mPays.map(p => `<tr><td>${p.date}</td><td class="text-success">₹${p.amountPaid}</td><td class="text-warning">₹${p.balance}</td><td>${p.chitPicked === 'Yes' ? '✅' : '—'}</td></tr>`).join('')}</tbody>
            </table>
        </div>`;
}

function renderGroups() {
    const area = document.getElementById('groupsArea');
    area.innerHTML = _cache.g.map(group => {
        const members = _cache.m.filter(m => m.groupId === group.id || (m.groupIds && m.groupIds.includes(group.id)));
        return `
            <div class="member-card">
                <div class="d-flex justify-content-between mb-3">
                    <h6 class="text-warning fw-bold mb-0">${group.name}</h6>
                    <button class="btn btn-sm btn-outline-success py-0" style="font-size:0.6rem" onclick="bulkRemind('${group.id}','${group.name}')">Bulk Remind</button>
                </div>
                <table class="table-custom">
                    ${members.map(m => `
                        <tr>
                            <td>${m.name}</td>
                            <td class="text-end"><button class="btn btn-sm btn-success py-1" onclick="sendWA('${m.phone}','${m.name}','${group.name}')">📲 Send Link</button></td>
                        </tr>`).join('')}
                </table>
            </div>`;
    }).join('');
}

// --- IMPROVED WHATSAPP LINK LOGIC ---
function sendWA(phone, name, gName) {
    if(!phone) return;
    const upiId = _settings.upi;
    const amt = _settings.amt || "0";
    
    if(!upiId.includes('@')) return alert("Please update your full UPI ID in Settings (e.g. name@bank)");

    // Option 1: Deep Link
    const upiDeepLink = `upi://pay?pa=${upiId}&pn=AK%20Chit%20Funds&am=${amt}&cu=INR`;
    
    // Option 2: Universal Web Redirect (More likely to stay clickable for unsaved numbers)
    const webLink = `https://upilinks.in/pay/${upiId}/${amt}`;
    
    const msg = `*AK CHIT FUNDS REMINDER* 🏦\n\n` +
                `Hello *${name}*,\n` +
                `Payment for *${gName}* is due.\n\n` +
                `💰 *Amount:* ₹${amt}\n\n` +
                `👉 *Option 1 (Direct App):* ${upiDeepLink}\n\n` +
                `👉 *Option 2 (Web Link):* ${webLink}\n\n` +
                `_Note: If links are not blue/clickable, please reply 'OK' to this message or SAVE this number._`;
    
    window.open(`https://wa.me/91${phone.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`, '_blank');
}

function bulkRemind(gid, gName) {
    const members = _cache.m.filter(m => m.groupId === gid || (m.groupIds && m.groupIds.includes(gid)));
    if(confirm(`Send WhatsApp to ${members.length} members?`)) {
        members.forEach((m, i) => setTimeout(() => sendWA(m.phone, m.name, gName), i * 2000));
    }
}

function saveSettings() {
    const upi = document.getElementById('adminUPI').value;
    if(!upi.includes('@')) return alert("UPI ID must include a handle (e.g. @ybl)");
    localStorage.setItem('ak_upi', upi);
    localStorage.setItem('ak_amt', document.getElementById('stdAmt').value);
    _settings = { upi, amt: document.getElementById('stdAmt').value };
    closeModal('setupModal'); sync();
}

function openModal(id) {
    if(id === 'payModal') document.getElementById('pMember').innerHTML = '<option>Select</option>' + _cache.m.map(x=>`<option value="${x.id}">${x.name}</option>`).join('');
    if(id === 'memModal') document.getElementById('memG').innerHTML = '<option>Select Group</option>' + _cache.g.map(x=>`<option value="${x.id}">${x.name}</option>`).join('');
    document.getElementById(id).style.display = 'block';
}

function updateGroupDropdown() {
    const m = _cache.m.find(x => x.id === document.getElementById('pMember').value);
    document.getElementById('pGroup').innerHTML = (m && m.groupIds) ? m.groupIds.map(gid => {
        const g = _cache.g.find(x => x.id === gid);
        return g ? `<option value="${g.id}">${g.name}</option>` : '';
    }).join('') : '';
}

async function savePayment() {
    const data = { memberId: document.getElementById('pMember').value, groupId: document.getElementById('pGroup').value, amountPaid: parseFloat(document.getElementById('pPaid').value), balance: parseFloat(document.getElementById('pBal').value), chitPicked: document.getElementById('pPicked').value, date: new Date().toLocaleDateString('en-GB') };
    await db.collection('payments').add(data);
    closeModal('payModal'); sync();
}

async function createMember() {
    const name = document.getElementById('memN').value;
    const gid = document.getElementById('memG').value;
    if(!name || !gid) return alert("Fill details!");
    await db.collection('members').add({ name, phone: document.getElementById('memP').value, groupId: gid, groupIds: [gid], quantity: document.getElementById('memQ').value });
    closeModal('memModal'); sync();
}

async function createGroup() {
    await db.collection('groups').add({ name: document.getElementById('grpN').value, duration: document.getElementById('grpD').value });
    closeModal('grpModal'); sync();
}

function closeModal(id) { document.getElementById(id).style.display = 'none'; }
sync();
</script>
</body>
</html>
