<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Chit Funds - Management Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg:#0a0e1a; --card:#141b2d; --inp:#1c253b; --gold:#f39c12; --border:#252f48; --text-dim:#8e9aaf; --purple-glow: rgba(129, 140, 248, 0.15); }
        body { background-color:var(--bg); color:white; font-family:'Segoe UI',sans-serif; padding-bottom:100px; }
        
        /* Stats */
        .stat-card { background:var(--card); border:1px solid var(--border); border-radius:15px; padding:15px; text-align:center; }
        .stat-num { font-size:1.8rem; font-weight:bold; color:#fff; }

        /* Main Buttons */
        .btn-record-yellow { background:var(--gold); color:#000; font-weight:800; border:none; padding:18px; border-radius:15px; width:100%; font-size:1.1rem; box-shadow: 0 4px 15px rgba(243, 156, 18, 0.2); }
        .btn-print-orange { background:#ff851b; color:black; font-weight:800; border-radius:8px; padding:6px 18px; border:none; font-size:0.85rem; }
        
        /* Member Card Styling (Matching Screenshot 10.09.08) */
        .member-card { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:20px; margin-top:20px; }
        .avatar-initials { width:45px; height:45px; background:rgba(243,156,18,0.1); border:1px solid var(--gold); color:var(--gold); border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:bold; }
        .group-header-row { display:flex; justify-content:space-between; align-items:center; margin-top:20px; }
        .badge-v3 { background:rgba(243,156,18,0.2); color:var(--gold); border:1px solid var(--gold); padding:2px 8px; border-radius:6px; font-size:0.7rem; font-weight:bold; }
        .badge-meta { background:rgba(99,102,241,0.15); color:#a5b4fc; border:1px solid rgba(99,102,241,0.3); padding:3px 10px; border-radius:6px; font-size:0.7rem; }
        
        /* Table & History (Matching Screenshot 10.09.08) */
        .history-summary-bar { background:rgba(255,255,255,0.03); padding:12px 15px; border-radius:10px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; margin-top:15px; border-bottom: 2px solid var(--border); }
        .table-history { width:100%; font-size:0.8rem; margin-top:10px; border-collapse: separate; border-spacing: 0 5px; }
        .table-history th { color:var(--text-dim); padding:12px; text-transform:uppercase; font-size:0.65rem; border-bottom:1px solid var(--border); }
        .table-history td { padding:12px; vertical-align: middle; }
        .row-multi { background: var(--purple-glow) !important; border-left: 3px solid #818cf8; }
        .picked-badge { background:#2ecc71; color:black; font-weight:bold; font-size:0.65rem; padding:2px 6px; border-radius:4px; }

        /* Modals */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; padding:20px; }
        .m-content { background:var(--card); border-radius:25px; padding:25px; max-width:500px; margin:auto; border: 1px solid var(--border); }
        .f-inp { background:var(--inp); border:1px solid var(--border); color:white; padding:12px; border-radius:10px; width:100%; margin-bottom:12px; }
        .suggestions-list { position:absolute; width:100%; background:var(--inp); border:1px solid var(--border); z-index:3000; display:none; }
        .suggestion-item { padding:12px; cursor:pointer; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="container py-3">
    <div class="row g-2 mb-4 text-center">
        <div class="col-4"><div class="stat-card"><div class="stat-num" id="statM">0</div><small class="text-dim">MEMBERS</small></div></div>
        <div class="col-4"><div class="stat-card"><div class="stat-num" id="statG">0</div><small class="text-dim">GROUPS</small></div></div>
        <div class="col-4"><div class="stat-card"><div class="stat-num text-success" id="statT">₹0</div><small class="text-dim">TODAY</small></div></div>
    </div>

    <button class="btn-record-yellow mb-4" onclick="openPaymentModal()">💳 Record Payment</button>

    <div class="position-relative mb-3">
        <input type="text" id="mSearch" class="f-inp" placeholder="Search Member (e.g. Prasad)" oninput="handleSearch(this.value)">
        <div id="mSuggestions" class="suggestions-list shadow-lg"></div>
    </div>

    <div id="mainDisplay"></div>
</div>

<div id="payModal" class="modal-overlay">
    <div class="m-content">
        <h5 class="text-warning mb-4">Record Payment Entry</h5>
        <select id="pMember" class="f-inp"></select>
        <select id="pGroup" class="f-inp"></select>
        <div class="row g-2">
            <div class="col-6"><input type="number" id="pPaid" class="f-inp" placeholder="Amount Paid ₹"></div>
            <div class="col-6"><input type="number" id="pBal" class="f-inp" placeholder="Balance ₹"></div>
        </div>
        <input type="text" id="pMode" class="f-inp" placeholder="Payment Mode (GPay, Cash, etc.)">
        <button class="btn btn-warning w-100 py-3 fw-bold mt-2" onclick="savePayment()">Sync Payment</button>
        <button class="btn btn-link w-100 text-white" onclick="closeModal('payModal')">Cancel</button>
    </div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU", authDomain: "ak-events-2016.firebaseapp.com", projectId: "ak-events-2016" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let _cache = { m: [], g: [], p: [] };

async function syncData() {
    const [m, g, p] = await Promise.all([db.collection('members').get(), db.collection('groups').get(), db.collection('payments').get()]);
    _cache.m = m.docs.map(d => ({id:d.id, ...d.data()}));
    _cache.g = g.docs.map(d => ({id:d.id, ...d.data()}));
    _cache.p = p.docs.map(d => ({id:d.id, ...d.data()}));
    
    document.getElementById('statM').innerText = _cache.m.length;
    document.getElementById('statG').innerText = _cache.g.length;
}

function handleSearch(val) {
    const list = document.getElementById('mSuggestions');
    if (val.length < 1) { list.style.display = 'none'; return; }
    const filtered = _cache.m.filter(m => m.name.toLowerCase().includes(val.toLowerCase()));
    list.innerHTML = filtered.map(m => `<div class="suggestion-item" onclick="selectMember('${m.id}', '${m.name}')">${m.name}</div>`).join('');
    list.style.display = 'block';
}

function selectMember(id, name) {
    document.getElementById('mSearch').value = name;
    document.getElementById('mSuggestions').style.display = 'none';
    renderMemberCard(id);
}

function renderMemberCard(mid) {
    const m = _cache.m.find(x => x.id === mid);
    const mPays = _cache.p.filter(p => p.memberId === mid);
    const totalPaid = mPays.reduce((s, p) => s + (parseFloat(p.amountPaid) || 0), 0);
    const totalBal = mPays.reduce((s, p) => s + (parseFloat(p.balance) || 0), 0);

    document.getElementById('mainDisplay').innerHTML = `
        <div class="member-card">
            <div class="d-flex justify-content-between">
                <div class="d-flex align-items-center gap-3">
                    <div class="avatar-initials">${m.name[0]}</div>
                    <div><h4 class="mb-0 fw-bold">${m.name}</h4><small class="text-dim">${mPays.length} payments · 1 group</small></div>
                </div>
                <div class="d-flex gap-2 align-items-center">
                    <button class="btn btn-sm border-secondary text-white">✏️</button>
                    <button class="btn-print-orange">🖨️ Print</button>
                </div>
            </div>

            <div class="group-header-row">
                <div>
                    <span class="fw-bold fs-5" style="color:var(--gold)">📂 5 Lakhs</span>
                    <span class="badge-v3 ms-2">V3</span>
                    <div class="mt-2 d-flex gap-1">
                        <span class="badge-meta">🗓️ Started: 05/02/2026</span>
                        <span class="badge-meta">📅 Due: 5th</span>
                        <span class="badge-meta">📦 2 bulk payments</span>
                    </div>
                </div>
                <div class="text-end">
                    <h4 class="mb-0">19<small class="text-dim">/21</small></h4>
                    <small class="text-dim" style="font-size:0.6rem">MONTHS PENDING</small>
                </div>
            </div>

            <div class="history-summary-bar" onclick="toggleHistory()">
                <span class="text-dim fw-bold small">PAYMENT HISTORY (${mPays.length} ENTRIES)</span>
                <div class="d-flex gap-3">
                    <span class="text-success fw-bold">₹${totalPaid.toLocaleString()} paid</span>
                    <span class="text-warning fw-bold">₹${totalBal.toLocaleString()} bal</span>
                    <span id="chevron">▼</span>
                </div>
            </div>

            <div id="historyCollapse" style="display:none;">
                <div class="table-responsive">
                    <table class="table-history">
                        <thead>
                            <tr><th>#</th><th>Month(s) Covered</th><th>Pay Date</th><th>Chit/Mo</th><th>Total Paid</th><th>Balance</th><th>Mode</th><th>Chit Picked</th></tr>
                        </thead>
                        <tbody>
                            ${mPays.map((p, i) => `
                                <tr class="${p.isBulk ? 'row-multi' : ''}">
                                    <td>${i+1}</td>
                                    <td class="text-primary fw-bold">05/03/2026</td>
                                    <td>${p.date}</td>
                                    <td>₹12,000</td>
                                    <td class="text-success fw-bold">₹${p.amountPaid}</td>
                                    <td class="text-warning">₹${p.balance}</td>
                                    <td>${p.mode || 'GPay'}</td>
                                    <td>${p.picked ? '<span class="picked-badge">✅ Picked</span>' : '—'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
                <div class="mt-2 small text-dim"><span class="badge-meta">🗓️</span> Purple rows = multi-month bulk payments</div>
            </div>
        </div>
    `;
}

function toggleHistory() {
    const el = document.getElementById('historyCollapse');
    const chev = document.getElementById('chevron');
    if (el.style.display === 'none') {
        el.style.display = 'block';
        chev.style.transform = 'rotate(180deg)';
    } else {
        el.style.display = 'none';
        chev.style.transform = 'rotate(0deg)';
    }
}

function openPaymentModal() {
    document.getElementById('payModal').style.display = 'block';
    // Logic to populate dropdowns
    const mSel = document.getElementById('pMember');
    const gSel = document.getElementById('pGroup');
    mSel.innerHTML = _cache.m.map(x => `<option value="${x.id}">${x.name}</option>`).join('');
    gSel.innerHTML = _cache.g.map(x => `<option value="${x.id}">${x.name}</option>`).join('');
}

async function savePayment() {
    const data = {
        memberId: document.getElementById('pMember').value,
        groupId: document.getElementById('pGroup').value,
        amountPaid: parseFloat(document.getElementById('pPaid').value),
        balance: parseFloat(document.getElementById('pBal').value),
        mode: document.getElementById('pMode').value,
        date: new Date().toLocaleDateString('en-GB')
    };
    await db.collection('payments').add(data);
    closeModal('payModal');
    syncData();
}

function closeModal(id) { document.getElementById(id).style.display = 'none'; }

syncData();
</script>
</body>
</html>
