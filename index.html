<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Chit Funds - Management Vault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --bg:#0a0e1a; --card:#141b2d; --inp:#1c253b; --gold:#f39c12; --border:#252f48; --text-dim:#8e9aaf; --purple:#818cf8; --orange-btn: #ff851b; }
        body { background-color:var(--bg); color:white; font-family:'Segoe UI',sans-serif; padding-bottom:100px; margin:0; }
        
        /* Stats & Dashboard */
        .stat-card { background:var(--card); border:1px solid var(--border); border-radius:15px; padding:20px; text-align:center; }
        .stat-num { font-size:1.8rem; font-weight:bold; }
        .btn-record-main { background:var(--gold); color:#000; font-weight:800; border:none; padding:18px; border-radius:15px; width:100%; font-size:1.1rem; box-shadow: 0 4px 15px rgba(243, 156, 18, 0.2); margin-bottom: 20px; }

        /* Search & Suggestions */
        .search-box { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:15px; width:100%; color:white; outline:none; }
        .suggestions-list { position:absolute; width:100%; background:var(--inp); border:1px solid var(--border); z-index:3000; display:none; border-radius:0 0 12px 12px; max-height: 200px; overflow-y: auto; }
        .suggestion-item { padding:12px; cursor:pointer; border-bottom:1px solid var(--border); }
        .suggestion-item:hover { background:var(--card); color:var(--gold); }

        /* Member Card Layout */
        .member-card { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:20px; margin-top:20px; }
        .avatar { width:45px; height:45px; background:rgba(243,156,18,0.1); border:1px solid var(--gold); color:var(--gold); border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:bold; }
        .badge-v3 { background:rgba(243,156,18,0.2); color:var(--gold); border:1px solid var(--gold); padding:2px 8px; border-radius:6px; font-size:0.7rem; font-weight:bold; }
        .badge-meta { background:rgba(99,102,241,0.15); color:#a5b4fc; border:1px solid rgba(99,102,241,0.3); padding:3px 10px; border-radius:6px; font-size:0.7rem; margin-right: 5px; }
        
        /* History & Expansion */
        .history-summary-bar { background:rgba(255,255,255,0.03); padding:12px 15px; border-radius:10px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; margin-top:15px; border-bottom: 2px solid var(--border); }
        .table-history { width:100%; font-size:0.75rem; margin-top:10px; }
        .table-history th { color:var(--text-dim); padding:10px; text-transform:uppercase; font-size:0.6rem; border-bottom: 1px solid var(--border); }
        .table-history td { padding:12px 10px; vertical-align: middle; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .row-multi { background: rgba(129, 140, 248, 0.08) !important; border-left: 3px solid var(--purple); }

        /* Modal Month Grid */
        .month-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 15px; }
        .month-item { background: var(--inp); border: 1px solid var(--border); padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; font-size: 0.7rem; }
        .month-item.selected { border-color: var(--purple); background: rgba(129, 140, 248, 0.1); }
        .month-item.paid { border-color: #2ecc71; color: #2ecc71; opacity: 0.6; pointer-events: none; }

        /* General UI */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; padding:20px; overflow-y:auto; }
        .m-content { background:var(--card); border-radius:25px; padding:25px; max-width:500px; margin:auto; border: 1px solid var(--border); }
        .f-inp { background:var(--inp); border:1px solid var(--border); color:white; padding:12px; border-radius:10px; width:100%; margin-bottom:12px; font-size:0.9rem; }
        .nav-bar { position:fixed; bottom:0; width:100%; background:#070b14; display:flex; justify-content:space-around; padding:15px 0; border-top:1px solid var(--border); z-index: 1000; }
        .nav-item { cursor:pointer; text-align:center; font-size:0.7rem; color:var(--text-dim); text-decoration:none; }
        .nav-item.active { color:var(--gold); font-weight: bold; }

        /* Print Overlay Styles */
        #printOverlay { position:fixed; inset:0; background:white; z-index:99999; overflow-y:auto; padding:30px; display:none; color:#000; }
        .print-table { width:100%; border-collapse: collapse; margin-top: 10px; }
        .print-table th { background: #f8f8f8; border: 1px solid #eee; padding: 8px; font-size: 0.7rem; color: #666; }
        .print-table td { border: 1px solid #eee; padding: 10px 8px; font-size: 0.8rem; }
        .member-box-print { border: 2px solid var(--gold); border-radius: 15px; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div id="printOverlay"></div>

<div class="container py-3" id="mainContent">
    <div class="d-flex gap-2 mb-4 mt-2">
        <button class="btn btn-warning btn-sm fw-bold rounded-pill text-black px-3" style="font-size:0.7rem;">ADMIN</button>
        <button class="btn btn-dark btn-sm text-warning rounded-pill px-3 border border-secondary" style="font-size:0.7rem;">🔒 Requests</button>
    </div>

    <div class="row g-2 mb-4 text-center">
        <div class="col-4"><div class="stat-card"><div class="stat-num" id="stM">0</div><small class="text-dim">MEMBERS</small></div></div>
        <div class="col-4"><div class="stat-card"><div class="stat-num" id="stG">0</div><small class="text-dim">GROUPS</small></div></div>
        <div class="col-4"><div class="stat-card"><div class="stat-num text-success" id="stT">₹0</div><small class="text-dim">TODAY</small></div></div>
    </div>

    <button class="btn-record-main" onclick="openModal('payModal')">💳 Record Payment</button>

    <div class="position-relative mb-3">
        <input type="text" id="mSearch" class="search-box" placeholder="Search Member for Summary / PDF..." oninput="handleSearch(this.value, 'mSuggestions', 'mSearch', true)">
        <div id="mSuggestions" class="suggestions-list shadow-lg"></div>
    </div>

    <div id="ledgerArea"></div>
</div>

<div id="payModal" class="modal-overlay">
    <div class="m-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="text-white fw-bold mb-0">💳 Record Payment</h5>
            <button class="btn btn-sm btn-outline-warning" onclick="sync()">Refresh</button>
        </div>

        <label class="small text-dim mb-1">PAYMENT DATE</label>
        <input type="date" id="pDate" class="f-inp">

        <label class="small text-dim mb-1">MEMBER</label>
        <div class="position-relative">
            <input type="text" id="pMemSearch" class="f-inp" placeholder="🔍 Search Member..." oninput="handleSearch(this.value, 'pSuggestions', 'pMemSearch', false)">
            <div id="pSuggestions" class="suggestions-list"></div>
            <input type="hidden" id="pSelectedMid">
        </div>

        <label class="small text-dim mb-1">GROUP / ENROLLMENT</label>
        <select id="pGroup" class="f-inp" onchange="onGroupSelect()"><option value="">-- Select Member First --</option></select>

        <label class="small text-dim mb-1">PAYMENT TYPE</label>
        <select id="pType" class="f-inp" onchange="toggleMonthGrid()">
            <option value="single">Single Month</option>
            <option value="multi">Multiple Months (Bulk) 📅</option>
        </select>

        <div id="monthSelectorArea" style="display:none;">
            <div class="small text-secondary mb-2">🗓️ SELECT MONTHS TO PAY</div>
            <div id="monthGrid" class="month-grid"></div>
        </div>

        <div class="row g-2">
            <div class="col-6"><label class="small text-dim">CHIT AMOUNT</label><input type="number" id="pChit" class="f-inp" placeholder="₹ per month"></div>
            <div class="col-6"><label class="small text-dim">TOTAL PAID</label><input type="number" id="pPaid" class="f-inp" placeholder="₹ total"></div>
        </div>

        <label class="small text-dim mb-1">PAID BY</label>
        <select id="pMode" class="f-inp">
            <option value="GPay">GPay</option>
            <option value="PhonePe">PhonePe</option>
            <option value="Cash">Cash</option>
            <option value="Bank Transfer">Bank Transfer</option>
        </select>

        <label class="small text-dim mb-1">CHIT PICKED?</label>
        <select id="pPicked" class="f-inp">
            <option value="No">No</option>
            <option value="Yes">Yes ✅</option>
        </select>

        <button class="btn w-100 py-3 fw-bold mt-2" style="background: linear-gradient(90deg, #ff8000, #ff9500); color: black; border-radius: 12px;" onclick="savePaymentEntry()">✓ Sync Payment</button>
        <button class="btn btn-link w-100 text-white mt-1" onclick="closeModal('payModal')">Cancel</button>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item active">🏠<br>Home</div>
    <div class="nav-item">📁<br>Groups</div>
    <div class="nav-item">📲<br>Remind</div>
    <div class="nav-item">💾<br>Backup</div>
</nav>

<script>
// --- CORE CONFIG ---
const firebaseConfig = {
    apiKey: "AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU",
    authDomain: "ak-events-2016.firebaseapp.com",
    projectId: "ak-events-2016",
    appId: "1:78066764444:web:5bb9e0d48c128a8632fb59"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let _cache = { m: [], g: [], p: [] };
let selectedMonths = [];

// 1. Data Sync
async function sync() {
    const [m, g, p] = await Promise.all([db.collection('members').get(), db.collection('groups').get(), db.collection('payments').get()]);
    _cache.m = m.docs.map(d => ({id:d.id, ...d.data()}));
    _cache.g = g.docs.map(d => ({id:d.id, ...d.data()}));
    _cache.p = p.docs.map(d => ({id:d.id, ...d.data()}));
    
    document.getElementById('stM').innerText = _cache.m.length;
    document.getElementById('stG').innerText = _cache.g.length;
}

// 2. Search & Selection Logic
function handleSearch(val, listId, inputId, isMain) {
    const list = document.getElementById(listId);
    if (val.length < 1) { list.style.display = 'none'; return; }
    const filtered = _cache.m.filter(m => m.name.toLowerCase().includes(val.toLowerCase()));
    list.innerHTML = filtered.map(m => `
        <div class="suggestion-item" onclick="onSelect('${m.id}', '${m.name}', '${listId}', '${inputId}', ${isMain})">
            ${m.name}
        </div>`).join('');
    list.style.display = 'block';
}

function onSelect(id, name, listId, inputId, isMain) {
    document.getElementById(inputId).value = name;
    document.getElementById(listId).style.display = 'none';
    if (isMain) renderLedger(id);
    else populateMemberGroups(id);
}

// 3. Ledger Rendering (Matches Image 3 & 4)
function renderLedger(mid) {
    const m = _cache.m.find(x => x.id === mid);
    const mPays = _cache.p.filter(p => p.memberId === mid);
    const totalPaid = mPays.reduce((s, p) => s + (parseFloat(p.amountPaid) || 0), 0);
    const totalBal = mPays.reduce((s, p) => s + (parseFloat(p.balance) || 0), 0);

    document.getElementById('ledgerArea').innerHTML = `
        <div class="member-card">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <div class="avatar">${m.name[0]}</div>
                    <div><h4 class="mb-0 fw-bold">${m.name}</h4><small class="text-dim">${mPays.length} payments · 1 group</small></div>
                </div>
                <button class="btn-print-orange" onclick="printStatement('${m.id}')">🖨️ Print</button>
            </div>
            <div class="d-flex justify-content-between mt-4">
                <div>
                    <span class="fw-bold fs-5" style="color:var(--gold)">📂 5 Lakhs <span class="badge-v3">V3</span></span>
                    <div class="mt-2">
                        <span class="badge-meta">🗓️ Started: 05/02/2026</span>
                        <span class="badge-meta">📅 Due: 5th</span>
                    </div>
                </div>
                <div class="text-end"><h4>19<small class="text-dim">/21</small></h4><small class="text-dim" style="font-size:0.6rem">MONTHS PENDING</small></div>
            </div>
            <div class="history-summary-bar" onclick="toggleHistory()">
                <span class="text-dim fw-bold small">PAYMENT HISTORY</span>
                <div class="d-flex gap-3">
                    <span class="text-success fw-bold">₹${totalPaid.toLocaleString()} paid</span>
                    <span class="text-warning fw-bold">₹${totalBal.toLocaleString()} bal</span>
                    <span id="chev">▼</span>
                </div>
            </div>
            <div id="hist" style="display:none; overflow-x:auto;">
                <table class="table-history">
                    <thead><tr><th>#</th><th>Month</th><th>Pay Date</th><th>Chit</th><th>Paid</th><th>Bal</th><th>Mode</th><th>Pick</th></tr></thead>
                    <tbody>${mPays.map((p, i) => `<tr class="${p.isBulk ? 'row-multi' : ''}"><td>${i+1}</td><td>05/03/26</td><td>${p.date}</td><td>₹${(parseFloat(p.amountPaid)+parseFloat(p.balance)).toLocaleString()}</td><td class="text-success fw-bold">₹${p.amountPaid}</td><td class="text-warning">₹${p.balance}</td><td>${p.mode || 'GPay'}</td><td>${p.chitPicked === 'Yes' ? '✅' : '—'}</td></tr>`).join('')}</tbody>
                </table>
            </div>
        </div>`;
}

// 4. Modal Logic (Multi-month + Safety Lock)
function populateMemberGroups(mid) {
    document.getElementById('pSelectedMid').value = mid;
    const member = _cache.m.find(x => x.id === mid);
    const gDrop = document.getElementById('pGroup');
    gDrop.innerHTML = '<option value="">-- Select Group --</option>' + (member.groupIds || []).map(gid => {
        const group = _cache.g.find(g => g.id === gid);
        return `<option value="${gid}">${group ? group.name : 'Unknown Group'}</option>`;
    }).join('');
}

async function checkChitStatus() {
    const mid = document.getElementById('pSelectedMid').value;
    const gid = document.getElementById('pGroup').value;
    const isPicked = _cache.p.some(p => p.memberId === mid && p.groupId === gid && p.chitPicked === 'Yes');
    const sel = document.getElementById('pPicked');
    if (isPicked) { sel.value = "No"; sel.options[1].disabled = true; sel.style.opacity = "0.5"; }
    else { sel.options[1].disabled = false; sel.style.opacity = "1"; }
}

function onGroupSelect() {
    checkChitStatus();
    if(document.getElementById('pType').value === 'multi') generateMonthGrid();
}

function toggleMonthGrid() {
    const isMulti = document.getElementById('pType').value === 'multi';
    document.getElementById('monthSelectorArea').style.display = isMulti ? 'block' : 'none';
    if(isMulti) generateMonthGrid();
}

function generateMonthGrid() {
    const grid = document.getElementById('monthGrid');
    const gid = document.getElementById('pGroup').value;
    const group = _cache.g.find(g => g.id === gid);
    const duration = group ? group.duration : 12;
    
    grid.innerHTML = Array.from({length: duration}, (_, i) => `
        <div class="month-item" onclick="this.classList.toggle('selected');">Month ${i+1}</div>
    `).join('');
}

// 5. Print Statement Logic
function printStatement(mid) {
    const m = _cache.m.find(x => x.id === mid);
    const mPays = _cache.p.filter(p => p.memberId === mid);
    const totalPaid = mPays.reduce((s, p) => s + (parseFloat(p.amountPaid) || 0), 0);
    const totalBal = mPays.reduce((s, p) => s + (parseFloat(p.balance) || 0), 0);
    const today = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' });

    const overlay = document.getElementById('printOverlay');
    overlay.innerHTML = `
        <div class="print-container">
            <div class="no-print d-flex gap-2 mb-4">
                <button class="btn btn-warning fw-bold" onclick="window.print()">Confirm Print</button>
                <button class="btn btn-secondary" onclick="document.getElementById('printOverlay').style.display='none'">Close</button>
            </div>
            <div class="print-header">
                <h3>MEMBER STATEMENT</h3>
                <small>Generated: ${today}</small>
            </div>
            <div class="member-box-print">
                <div><h1>${m.name}</h1><p>Phone: ${m.phone || '—'}</p></div>
                <div class="d-flex gap-4">
                    <div class="text-center"><b style="color:green">Rs.${totalPaid}</b><br><small>PAID</small></div>
                    <div class="text-center"><b style="color:orange">Rs.${totalBal}</b><br><small>BAL</small></div>
                </div>
            </div>
            <table class="print-table mt-4">
                <thead><tr><th>Date</th><th>Paid</th><th>Balance</th><th>Mode</th></tr></thead>
                <tbody>${mPays.map(p => `<tr><td>${p.date}</td><td>Rs.${p.amountPaid}</td><td>Rs.${p.balance}</td><td>${p.mode||'GPay'}</td></tr>`).join('')}</tbody>
            </table>
        </div>
    `;
    overlay.style.display = 'block';
}

// 6. Final Save
async function savePaymentEntry() {
    const mid = document.getElementById('pSelectedMid').value;
    const chit = parseFloat(document.getElementById('pChit').value) || 0;
    const paid = parseFloat(document.getElementById('pPaid').value) || 0;
    
    if(!mid || isNaN(paid)) return alert("Required data missing.");

    await db.collection('payments').add({
        memberId: mid,
        groupId: document.getElementById('pGroup').value,
        amountPaid: paid,
        balance: Math.max(0, chit - paid),
        mode: document.getElementById('pMode').value,
        chitPicked: document.getElementById('pPicked').value,
        date: document.getElementById('pDate').value,
        isBulk: document.getElementById('pType').value === 'multi'
    });
    
    closeModal('payModal'); sync();
    alert("✅ Payment Synced");
}

function toggleHistory() {
    const el = document.getElementById('hist');
    const isHidden = el.style.display === 'none';
    el.style.display = isHidden ? 'block' : 'none';
    document.getElementById('chev').style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
}

function openModal(id) { 
    document.getElementById('pDate').value = new Date().toISOString().split('T')[0];
    document.getElementById(id).style.display = 'block'; 
}
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

sync();
</script>
</body>
</html>
