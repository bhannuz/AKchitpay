<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UPI Payment Generator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      width: 320px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .pay {
      background: #4CAF50;
      color: white;
    }

    .whatsapp {
      background: #25D366;
      color: white;
    }

    .output {
      margin-top: 10px;
      word-break: break-all;
      font-size: 12px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>UPI Payment</h2>

  <input type="text" id="name" placeholder="Customer Name" />
  <input type="number" id="amount" placeholder="Amount (₹)" />
  <input type="text" id="note" placeholder="Note (optional)" />

  <button class="pay" onclick="generateLink()">Generate Payment</button>

  <button class="whatsapp" onclick="sendWhatsApp()">Send via WhatsApp</button>

  <div class="output" id="output"></div>
</div>

<script>
  const UPI_ID = "yourupi@upi"; // 🔴 Replace with your UPI ID
  const PAYEE_NAME = "Your Business Name";

  let paymentLink = "";

  function generateLink() {
    const name = document.getElementById("name").value || PAYEE_NAME;
    const amount = document.getElementById("amount").value;
    const note = document.getElementById("note").value || "Payment";

    if (!amount) {
      alert("Please enter amount");
      return;
    }

    const encodedName = encodeURIComponent(name);
    const encodedNote = encodeURIComponent(note);

    // UPI deep link
    paymentLink = `upi://pay?pa=${UPI_ID}&pn=${encodedName}&am=${amount}&cu=INR&tn=${encodedNote}`;

    document.getElementById("output").innerHTML =
      "<strong>UPI Link:</strong><br>" + paymentLink;
  }

  function sendWhatsApp() {
    if (!paymentLink) {
      alert("Generate payment link first!");
      return;
    }

    const message = encodeURIComponent(
      `Hello, please complete your payment using this link:\n${paymentLink}`
    );

    const whatsappURL = `https://wa.me/?text=${message}`;

    window.open(whatsappURL, "_blank");
  }
</script>

</body>
</html>
