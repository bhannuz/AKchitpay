<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Chit Funds - Management Vault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg:#0a0e1a; --card:#141b2d; --inp:#1c253b; --gold:#f39c12; --brd:#252f48; --dim:#8e9aaf; }
        body { background-color:var(--bg); color:white; font-family:'Segoe UI',sans-serif; padding-bottom:100px; }
        .stat-card { background:var(--card); border:1px solid var(--brd); border-radius:15px; padding:15px; text-align:center; }
        .btn-record-main { background:var(--gold); color:#000; font-weight:800; border:none; padding:18px; border-radius:15px; width:100%; font-size:1.1rem; margin-bottom: 20px; }
        .search-box { background:var(--card); border:1px solid var(--brd); border-radius:12px; padding:15px; width:100%; color:white; outline:none; }
        .suggestions-list { position:absolute; width:100%; background:var(--inp); border:1px solid var(--brd); z-index:3000; max-height:200px; overflow-y:auto; border-radius:0 0 12px 12px; }
        .suggestion-item { padding:12px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.05); }
        .member-card { background:var(--card); border:1px solid var(--brd); border-radius:18px; padding:20px; margin-top:20px; }
        .avatar { width:45px; height:45px; background:rgba(243,156,18,0.1); border:1px solid var(--gold); color:var(--gold); border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:bold; }
        .badge-custom { font-size:0.65rem; padding:3px 8px; border-radius:6px; background:rgba(99,102,241,0.2); color:#a5b4fc; border:1px solid rgba(99,102,241,0.3); margin-right:5px; }
        .history-bar { background:rgba(255,255,255,0.03); padding:12px 15px; border-radius:10px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; margin-top:15px; border: 1px solid var(--brd); }
        .table-history { width:100%; font-size:0.8rem; margin-top:10px; color: white; }
        .table-history th { color:var(--dim); border-bottom:1px solid var(--brd); padding:10px; text-transform:uppercase; font-size: 0.7rem; }
        .table-history td { padding:12px 10px; border-bottom:1px solid rgba(255,255,255,0.05); }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; padding:20px; }
        .m-content { background:var(--card); border-radius:25px; padding:25px; max-width:450px; margin:auto; border: 1px solid var(--brd); }
        .f-inp { background:var(--inp); border:1px solid var(--brd); color:white; padding:12px; border-radius:10px; width:100%; margin-bottom:12px; }
    </style>
</head>
<body>

<div class="container py-3">
    <div class="row g-2 mb-4 text-center">
        <div class="col-4"><div class="stat-card"><b class="fs-3 d-block" id="countM">0</b><small class="text-dim">Members</small></div></div>
        <div class="col-4"><div class="stat-card"><b class="fs-3 d-block" id="countG">0</b><small class="text-dim">Groups</small></div></div>
        <div class="col-4"><div class="stat-card"><b class="fs-3 d-block text-success" id="sumT">₹0</b><small class="text-dim">Today</small></div></div>
    </div>

    <button class="btn-record-main" onclick="openModal('payModal')">💳 Record Payment</button>

    <div class="position-relative">
        <input type="text" id="mSearch" class="search-box" placeholder="Search Member for Summary / PDF..." oninput="handleSearch(this.value)">
        <div id="mSuggestions" class="suggestions-list" style="display:none;"></div>
    </div>

    <div id="ledgerArea"></div>
</div>

<div id="payModal" class="modal-overlay">
    <div class="m-content">
        <h5 class="text-warning mb-3">Sync Payment Entry</h5>
        <label class="small text-dim">Member</label>
        <select id="pMemberId" class="f-inp"></select>
        <label class="small text-dim">Group</label>
        <select id="pGroupId" class="f-inp"></select>
        <div class="row g-2">
            <div class="col-6"><label class="small text-dim">Paid</label><input type="number" id="pAmount" class="f-inp" placeholder="₹"></div>
            <div class="col-6"><label class="small text-dim">Balance</label><input type="number" id="pBalance" class="f-inp" placeholder="₹"></div>
        </div>
        <button class="btn btn-warning w-100 py-3 fw-bold" onclick="submitPayment()">Sync Payment</button>
        <button class="btn btn-link w-100 text-white mt-2" onclick="closeModal('payModal')">Cancel</button>
    </div>
</div>

<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = { apiKey: "AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU", authDomain: "ak-events-2016.firebaseapp.com", projectId: "ak-events-2016" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let _data = { m: [], g: [], p: [] };

// 1. Fetch Data
async function sync() {
    const [m, g, p] = await Promise.all([db.collection('members').get(), db.collection('groups').get(), db.collection('payments').get()]);
    _data.m = m.docs.map(d => ({id:d.id, ...d.data()}));
    _data.g = g.docs.map(d => ({id:d.id, ...d.data()}));
    _data.p = p.docs.map(d => ({id:d.id, ...d.data()}));

    document.getElementById('countM').innerText = _data.m.length;
    document.getElementById('countG').innerText = _data.g.length;
    
    // Populate Dropdowns for Record Payment
    document.getElementById('pMemberId').innerHTML = _data.m.map(x => `<option value="${x.id}">${x.name}</option>`).join('');
    document.getElementById('pGroupId').innerHTML = _data.g.map(x => `<option value="${x.id}">${x.name}</option>`).join('');
}

// 2. Search Logic
function handleSearch(val) {
    const list = document.getElementById('mSuggestions');
    if (val.length < 1) { list.style.display = 'none'; return; }
    const filtered = _data.m.filter(m => m.name.toLowerCase().includes(val.toLowerCase()));
    list.innerHTML = filtered.map(m => `<div class="suggestion-item" onclick="selectMember('${m.id}', '${m.name}')">${m.name}</div>`).join('');
    list.style.display = filtered.length ? 'block' : 'none';
}

function selectMember(id, name) {
    document.getElementById('mSearch').value = name;
    document.getElementById('mSuggestions').style.display = 'none';
    renderMemberView(id);
}

// 3. Render Member View (Matching Screenshot Format)
function renderMemberView(mid) {
    const member = _data.m.find(x => x.id === mid);
    const mPays = _data.p.filter(p => p.memberId === mid);
    const totalPaid = mPays.reduce((s, p) => s + (parseFloat(p.amountPaid) || 0), 0);
    const totalBal = mPays.reduce((s, p) => s + (parseFloat(p.balance) || 0), 0);

    document.getElementById('ledgerArea').innerHTML = `
        <div class="member-card">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <div class="avatar">${member.name[0]}</div>
                    <div>
                        <h5 class="mb-0 fw-bold">${member.name}</h5>
                        <small class="text-dim">${mPays.length} payments · 1 group</small>
                    </div>
                </div>
                <button class="btn btn-warning btn-sm fw-bold px-3" style="background:#ff851b; border:none; color:black;">🖨️ Print</button>
            </div>

            <div class="mt-4">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="fw-bold" style="color:#f39c12">📂 5 Lakhs <span class="badge-custom">V3</span></span>
                    <span class="fw-bold">19<small class="text-dim">/21</small></span>
                </div>
                <div class="d-flex gap-1 mt-2">
                    <span class="badge-custom">🗓️ Started: 05/02/2026</span>
                    <span class="badge-custom">📅 Due: 5th</span>
                    <span class="badge-custom">📦 2 bulk payments</span>
                </div>
            </div>

            <div class="history-bar" onclick="toggleHistory()">
                <span class="small fw-bold text-dim">PAYMENT HISTORY (${mPays.length} ENTRIES)</span>
                <div class="d-flex align-items-center gap-2">
                    <span class="text-success fw-bold">₹${totalPaid.toLocaleString()} paid</span>
                    <span class="text-warning fw-bold">₹${totalBal.toLocaleString()} bal</span>
                    <span id="chevron">▶</span>
                </div>
            </div>

            <div id="historyTable" style="display:none;">
                <table class="table-history">
                    <thead><tr><th>Date</th><th>Paid</th><th>Bal</th></tr></thead>
                    <tbody>
                        ${mPays.map(p => `<tr><td>${p.date}</td><td class="text-success">₹${p.amountPaid}</td><td class="text-warning">₹${p.balance}</td></tr>`).join('')}
                    </tbody>
                </table>
            </div>
        </div>
    `;
}

// 4. Toggle Function
function toggleHistory() {
    const el = document.getElementById('historyTable');
    const chev = document.getElementById('chevron');
    if (el.style.display === 'none') {
        el.style.display = 'block';
        chev.style.transform = 'rotate(90deg)';
    } else {
        el.style.display = 'none';
        chev.style.transform = 'rotate(0deg)';
    }
}

// 5. Submit Payment to Firebase
async function submitPayment() {
    const data = {
        memberId: document.getElementById('pMemberId').value,
        groupId: document.getElementById('pGroupId').value,
        amountPaid: parseFloat(document.getElementById('pAmount').value),
        balance: parseFloat(document.getElementById('pBalance').value),
        date: new Date().toISOString().split('T')[0]
    };
    
    if(!data.memberId || isNaN(data.amountPaid)) return alert("Fill details");
    
    await db.collection('payments').add(data);
    closeModal('payModal');
    sync(); // Refresh local data
    alert("✅ Payment Recorded");
}

function openModal(id) { document.getElementById(id).style.display = 'block'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

sync();
</script>
</body>
</html>
