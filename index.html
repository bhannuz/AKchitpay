<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Chit Funds - Advanced Vault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg:#0a0e1a; --card:#141b2d; --inp:#1c253b; --gold:#f39c12; --border:#252f48; --purple:#818cf8; }
        body { background-color:var(--bg); color:white; font-family:'Segoe UI',sans-serif; }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; padding:20px; overflow-y:auto; }
        .m-content { background:var(--card); border-radius:25px; padding:25px; max-width:500px; margin:auto; border: 1px solid var(--border); }
        .f-inp { background:var(--inp); border:1px solid var(--border); color:white; padding:12px; border-radius:10px; width:100%; margin-bottom:12px; font-size: 0.9rem; }
        
        /* Month Selector Grid (Matching Screenshot 10.45.04) */
        .month-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 15px; }
        .month-item { background: var(--inp); border: 1px solid var(--border); padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; font-size: 0.7rem; position: relative; }
        .month-item.selected { border-color: var(--purple); background: rgba(129, 140, 248, 0.1); }
        .month-item.paid { border-color: #2ecc71; background: rgba(46, 204, 113, 0.1); opacity: 0.7; pointer-events: none; }
        .month-item.paid::after { content: '✅ Paid'; display: block; color: #2ecc71; font-size: 0.5rem; }
        
        .diff-amt-box { background: rgba(129, 140, 248, 0.05); padding: 10px; border-radius: 10px; border: 1px dashed var(--purple); margin-bottom: 15px; }
        .btn-sync { background: linear-gradient(90deg, #ff8000, #ff9500); color: black; font-weight: 800; border-radius: 12px; padding: 15px; border: none; }
    </style>
</head>
<body>

<div class="container py-5 text-center">
    <button class="btn btn-warning px-5 py-3 fw-bold" onclick="openPaymentModal()">💳 Open Record Payment</button>
</div>

<div id="paymentModal" class="modal-overlay">
    <div class="m-content">
        <h5 class="mb-4 fw-bold">💳 Record Payment</h5>
        
        <label class="small text-secondary mb-1">MEMBER</label>
        <select id="pMember" class="f-inp" onchange="checkChitStatus()"></select>

        <label class="small text-secondary mb-1">GROUP</label>
        <select id="pGroup" class="f-inp" onchange="generateMonthGrid()"></select>

        <label class="small text-secondary mb-1">PAYMENT TYPE</label>
        <select id="pType" class="f-inp" onchange="toggleMonthGrid()">
            <option value="single">Single Month</option>
            <option value="multi">Multiple Months (past dues / bulk) 📅</option>
        </select>

        <div id="monthSelectorArea" style="display:none;">
            <div class="small text-purple mb-2">🗓️ SELECT MONTHS TO PAY</div>
            <div id="monthGrid" class="month-grid"></div>
            
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="small text-secondary">💰 AMOUNT PER MONTH</span>
                <label class="small"><input type="checkbox" id="diffAmtToggle" onchange="toggleDiffAmts()"> Different amounts</label>
            </div>
            <div id="diffAmtContainer" class="diff-amt-box" style="display:none;"></div>
        </div>

        <div class="row g-2">
            <div class="col-6"><label class="small text-secondary">CHIT AMOUNT</label><input type="number" id="pChit" class="f-inp" placeholder="₹ per month"></div>
            <div class="col-6"><label class="small text-secondary">TOTAL PAID</label><input type="number" id="pPaid" class="f-inp" placeholder="₹ total"></div>
        </div>

        <label class="small text-secondary">CHIT PICKED?</label>
        <select id="pPicked" class="f-inp">
            <option value="No">No</option>
            <option value="Yes">Yes ✅</option>
        </select>

        <button class="btn-sync w-100 mt-3" onclick="processPayment()">✓ Sync Payment</button>
        <button class="btn btn-link w-100 text-white mt-2" onclick="closeModal()">Cancel</button>
    </div>
</div>

<script>
// --- DB CORE ---
const firebaseConfig = { apiKey: "AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU", authDomain: "ak-events-2016.firebaseapp.com", projectId: "ak-events-2016" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let selectedMonths = [];
let membersCache = [];
let groupsCache = [];

async function openPaymentModal() {
    const [mSnap, gSnap] = await Promise.all([db.collection('members').get(), db.collection('groups').get()]);
    membersCache = mSnap.docs.map(d => ({id:d.id, ...d.data()}));
    groupsCache = gSnap.docs.map(d => ({id:d.id, ...d.data()}));
    
    document.getElementById('pMember').innerHTML = membersCache.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
    document.getElementById('pGroup').innerHTML = groupsCache.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
    
    document.getElementById('paymentModal').style.display = 'block';
    checkChitStatus();
}

// Logic: Disable "Chit Picked" if already exists (Requirement 2)
async function checkChitStatus() {
    const mid = document.getElementById('pMember').value;
    const gid = document.getElementById('pGroup').value;
    const pickedQuery = await db.collection('payments')
        .where('memberId', '==', mid)
        .where('groupId', '==', gid)
        .where('chitPicked', '==', 'Yes').get();

    const select = document.getElementById('pPicked');
    if (!pickedQuery.empty) {
        select.value = "No";
        select.options[1].disabled = true; // Disable "Yes"
        select.style.opacity = "0.5";
    } else {
        select.options[1].disabled = false;
        select.style.opacity = "1";
    }
}

function toggleMonthGrid() {
    const area = document.getElementById('monthSelectorArea');
    area.style.display = document.getElementById('pType').value === 'multi' ? 'block' : 'none';
    generateMonthGrid();
}

// Logic: Month Selector Grid (Requirement 1 - Screenshot 10.45.04)
async function generateMonthGrid() {
    const mid = document.getElementById('pMember').value;
    const gid = document.getElementById('pGroup').value;
    const grid = document.getElementById('monthGrid');
    grid.innerHTML = 'Loading months...';

    // Get group duration
    const group = groupsCache.find(g => g.id === gid);
    const duration = group.duration || 21;

    // Get already paid months from DB
    const paidSnap = await db.collection('payments').where('memberId','==',mid).where('groupId','==',gid).get();
    const paidMonths = paidSnap.docs.map(d => d.data().monthDate); // Assuming you store month identifier

    grid.innerHTML = "";
    for(let i=1; i<=duration; i++) {
        const div = document.createElement('div');
        div.className = 'month-item';
        div.innerText = `Month ${i}`;
        // if already paid, add class
        if(paidMonths.includes(`M${i}`)) div.classList.add('paid');
        
        div.onclick = () => {
            div.classList.toggle('selected');
            updateSelection();
        };
        div.dataset.month = `M${i}`;
        grid.appendChild(div);
    }
}

function updateSelection() {
    const selected = document.querySelectorAll('.month-item.selected');
    selectedMonths = Array.from(selected).map(el => el.dataset.month);
    if(document.getElementById('diffAmtToggle').checked) toggleDiffAmts();
}

function toggleDiffAmts() {
    const container = document.getElementById('diffAmtContainer');
    const isChecked = document.getElementById('diffAmtToggle').checked;
    container.style.display = isChecked ? 'block' : 'none';
    
    if(isChecked) {
        container.innerHTML = selectedMonths.map(m => `
            <div class="d-flex align-items-center mb-2">
                <small class="flex-grow-1">${m}</small>
                <input type="number" class="f-inp mb-0 w-50 multi-amt-input" data-month="${m}" placeholder="₹ amount">
            </div>
        `).join('');
    }
}

async function processPayment() {
    // Collect data and save to Firebase
    // If multi, loop through selectedMonths and save
    alert("Syncing " + selectedMonths.length + " months to Firebase...");
    closeModal();
}

function closeModal() { document.getElementById('paymentModal').style.display = 'none'; }
</script>

</body>
</html>
