<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THODP - Smart Trip Expenses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-dark:#0a0e1a; --card-bg:#141b2d; --input-bg:#1c253b; --accent-blue:#3b82f6; --text-main:#ffffff; --text-dim:#8e9aaf; --border:#252f48; }
        body { background-color:var(--bg-dark); color:var(--text-main); font-family:'Segoe UI', sans-serif; padding-bottom:120px; transition: background 0.3s; margin:0; }
        .app-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:#070b14; position:sticky; top:0; z-index:2000; }
        .balance-card { background:linear-gradient(135deg, #1e293b, #0f172a); border-radius:24px; padding:20px; margin:15px; border:1px solid var(--border); }
        .expense-item { background:var(--card-bg); border-radius:18px; padding:15px; margin-bottom:12px; border:1px solid var(--border); display:flex; align-items:center; gap:12px; }
        .avatar { width:45px; height:45px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; background:var(--input-bg); color:var(--accent-blue); }
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:3000; padding:20px; overflow-y:auto; }
        .modal-content-custom { background:var(--card-bg); border-radius:28px; padding:25px; max-width:400px; margin:auto; border:1px solid var(--border); }
        .form-input { background:var(--input-bg); border:1px solid var(--border); color:white; padding:12px; border-radius:12px; width:100%; margin-bottom:15px; font-size: 0.9rem; }
        .tab-content { display:none; }
        .tab-content.active { display:block; }
        .nav-bar { position:fixed; bottom:0; width:100%; background:#070b14; display:flex; justify-content:space-around; padding:12px 0 25px; border-top:1px solid var(--border); z-index:1000; }
        .nav-item { text-align:center; font-size:0.65rem; color:var(--text-dim); cursor:pointer; flex:1; text-decoration:none; }
        .nav-item.active { color:var(--accent-blue); }
        .participant-chip { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.05); padding:8px 12px; border-radius:10px; margin-bottom:5px; font-size:0.85rem; cursor:pointer; }
        .btn-primary-custom { background:var(--accent-blue); color:white; border:none; border-radius:14px; padding:14px; font-weight:bold; width:100%; }
        .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--text-main); border-radius:14px; padding:14px; width:100%; margin-top:10px; }
        .group-header { background: #1c253b; padding: 12px 15px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .active-group-badge { background:rgba(59, 130, 246, 0.2); border:1px solid var(--accent-blue); color:var(--accent-blue); padding:4px 12px; border-radius:50px; font-size:0.75rem; font-weight:800; display:inline-block; margin-bottom:10px; }
    </style>
</head>
<body>

<div class="app-header">
    <div style="font-size:1.2rem; font-weight:900; color:#f39c12;">🧅 THODP</div>
    <div style="display:flex; align-items:center; gap:12px;">
        <button onclick="toggleTheme()" style="background:none; border:none; font-size:1.2rem;" id="themeIcon">🌙</button>
        <div style="font-size:0.6rem; color:#10b981; border:1px solid #10b981; padding:2px 8px; border-radius:50px;">LIVE</div>
    </div>
</div>

<div id="activityTab" class="tab-content active">
    <div class="balance-card">
        <div style="text-align:center;">
            <div id="activeGroupLabel" class="active-group-badge">No Trip Selected</div>
            <div style="max-height:140px;"><canvas id="categoryChart"></canvas></div>
            <div style="font-size:0.7rem; color:var(--text-dim); text-transform:uppercase; margin-top:10px;">Total Spending</div>
            <div id="totalSpent" style="font-size:2.2rem; font-weight:900;">₹0</div>
        </div>
    </div>
    <div class="container">
        <input type="text" id="expenseSearch" class="form-input" placeholder="🔍 Search description..." oninput="renderExpenses()">
        <button class="btn-primary-custom mb-3" onclick="prepareNewExpense()">+ Add Expense</button>
        <div id="expenseList"></div>
    </div>
</div>

<div id="groupsTab" class="tab-content">
    <div class="container py-4">
        <div class="d-flex justify-content-between mb-3">
            <h5 style="font-weight:900;">Trips</h5>
            <button class="btn btn-sm btn-primary" onclick="openGroupModal()">+ New Trip</button>
        </div>
        <div id="groupListArea"></div>
    </div>
</div>

<div id="membersTab" class="tab-content">
    <div class="container py-4">
        <div class="balance-card" style="background: rgba(59, 130, 246, 0.1); border-color: var(--accent-blue);">
            <h6 style="font-size: 0.65rem; color: var(--accent-blue); font-weight: 800;">WHO OWES WHOM</h6>
            <div id="settlementSummary" style="margin-top: 10px; font-size: 0.85rem; color: var(--text-dim);">Select a trip to see balances</div>
        </div>
        <div class="d-flex justify-content-between mb-3 mt-4">
            <h5 style="font-weight:900;">Members By Group</h5>
            <button class="btn btn-sm btn-primary" onclick="openAddMemberModal()">+ Add Person</button>
        </div>
        <div id="memberGroupedArea"></div>
    </div>
</div>

<div id="expenseModal" class="modal-overlay">
    <div class="modal-content-custom">
        <h5 id="modalTitle" style="font-weight:900; margin-bottom:5px;">Expense</h5>
        <div id="modalGroupContext" style="font-size:0.75rem; color:var(--accent-blue); margin-bottom:15px; font-weight:700;"></div>
        <input type="hidden" id="editExpId">
        <select id="expCategory" class="form-input">
            <option value="🍛 Food">🍛 Food</option><option value="⛽ Petrol">⛽ Petrol</option>
            <option value="🚗 Travel">🚗 Travel</option><option value="🏠 Stay">🏠 Stay</option>
            <option value="⚙️ Misc">⚙️ Misc</option>
        </select>
        <input type="text" id="expDesc" class="form-input" placeholder="Description">
        <input type="number" id="expAmount" class="form-input" placeholder="Amount (₹)">
        <label class="small text-dim">PAID BY</label>
        <select id="expPayer" class="form-input"></select>
        <label class="small text-dim">SPLIT BETWEEN</label>
        <div id="participantList" style="max-height: 120px; overflow-y: auto; margin-bottom: 15px; border:1px solid var(--border); padding:10px; border-radius:12px;"></div>
        <button class="btn-primary-custom" onclick="saveExpense()">Confirm</button>
        <button class="btn-ghost" onclick="closeModal('expenseModal')">Cancel</button>
    </div>
</div>

<div id="groupModal" class="modal-overlay">
    <div class="modal-content-custom">
        <h5 id="gModalTitle">Trip Group</h5>
        <input type="hidden" id="editGroupId">
        <input type="text" id="groupName" class="form-input" placeholder="Trip Name">
        <button class="btn-primary-custom" onclick="saveGroup()">Save Trip</button>
        <button id="delGroupBtn" class="btn-ghost text-danger" style="display:none;" onclick="deleteGroup()">Delete Trip</button>
        <button class="btn-ghost" onclick="closeModal('groupModal')">Cancel</button>
    </div>
</div>

<div id="memberModal" class="modal-overlay">
    <div class="modal-content-custom">
        <h5>Add Member</h5>
        <label class="small text-dim">Which Trip?</label>
        <select id="memGroupLink" class="form-input"></select>
        <input type="text" id="memName" class="form-input" placeholder="Name">
        <button class="btn-primary-custom" onclick="saveMember()">Add to Trip</button>
        <button class="btn-ghost" onclick="closeModal('memberModal')">Cancel</button>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" id="navActivity" onclick="switchTab('activity')">🕒<br>Activity</div>
    <div class="nav-item" id="navGroups" onclick="switchTab('groups')">✈️<br>Trips</div>
    <div class="nav-item" id="navMembers" onclick="switchTab('members')">👥<br>Members</div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyB9_sBL83skvIaOVAE8msHwIWq8QQwhxFU", projectId: "ak-chit-funds", authDomain: "ak-chit-funds.firebaseapp.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let MEMBERS = []; let EXPENSES = []; let GROUPS = [];
let activeGroupId = localStorage.getItem('activeGroupId') || null;
let categoryChart = null;

function startApp() {
    db.collection('groups').onSnapshot(snap => {
        GROUPS = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
        if (!activeGroupId && GROUPS.length > 0) setActiveGroup(GROUPS[0].id);
        updateActiveGroupLabel();
        renderGroups();
        updateMemberGroupDropdown();
    });
    db.collection('members').onSnapshot(snap => {
        MEMBERS = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
        renderMembersGrouped();
        updatePayerDropdown();
        renderParticipantsChecklist();
    });
    db.collection('expenses').orderBy('timestamp', 'desc').onSnapshot(snap => {
        EXPENSES = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
        renderExpenses();
        calculateDebts();
    });
}

function updateActiveGroupLabel() {
    const el = document.getElementById('activeGroupLabel');
    if(!activeGroupId) {
        el.innerText = "No Trip Selected";
        return;
    }
    const group = GROUPS.find(g => g.id === activeGroupId);
    if(group) el.innerHTML = `📍 ${group.name.toUpperCase()}`;
}

function setActiveGroup(id) {
    activeGroupId = id; localStorage.setItem('activeGroupId', id);
    updateActiveGroupLabel();
    renderGroups(); renderExpenses(); calculateDebts();
    renderParticipantsChecklist();
    updatePayerDropdown();
}

function renderMembersGrouped() {
    const area = document.getElementById('memberGroupedArea');
    area.innerHTML = GROUPS.map(g => {
        const gMembers = MEMBERS.filter(m => m.groupId === g.id);
        return `
            <div class="group-header" onclick="toggleAccordion('acc_${g.id}')">
                <span><b>${g.name}</b> (${gMembers.length})</span>
                <span id="icon_acc_${g.id}">▼</span>
            </div>
            <div id="acc_${g.id}" style="display:none; padding: 0 10px 15px;">
                ${gMembers.map(m => `
                    <div class="member-card p-3 mb-2 bg-dark rounded d-flex justify-content-between align-items-center">
                        <span>${m.name}</span>
                        <button class="btn btn-sm text-danger" onclick="deleteMember('${m.id}')">✕</button>
                    </div>
                `).join('') || '<div class="small text-dim p-2">No members added yet.</div>'}
            </div>
        `;
    }).join('');
}

function toggleAccordion(id) {
    const el = document.getElementById(id);
    const icon = document.getElementById('icon_' + id);
    const isHidden = el.style.display === 'none';
    el.style.display = isHidden ? 'block' : 'none';
    icon.innerText = isHidden ? '▲' : '▼';
}

function renderExpenses() {
    const list = document.getElementById('expenseList');
    const search = document.getElementById('expenseSearch').value.toLowerCase();
    let total = 0;
    const gExp = EXPENSES.filter(e => e.groupId === activeGroupId);
    const filtered = gExp.filter(e => e.description.toLowerCase().includes(search));

    list.innerHTML = filtered.map(exp => {
        if(exp.type !== 'settlement') total += parseFloat(exp.amount || 0);
        const emoji = exp.type === 'settlement' ? '🤝' : (exp.category ? exp.category.split(' ')[0] : '⚙️');
        return `<div class="expense-item">
            <div class="avatar">${emoji}</div>
            <div style="flex:1;">
                <div style="font-weight:bold;">${exp.description}</div>
                <div style="font-size:0.7rem; color:var(--text-dim);">${exp.payerName}</div>
            </div>
            <div style="text-align:right;">
                <div style="font-weight:900;">₹${exp.amount}</div>
                <div class="d-flex gap-2 justify-content-end mt-1">
                    <button onclick="editExpense('${exp.id}')" style="border:none; background:none; font-size:0.8rem;">✏️</button>
                    <button onclick="deleteExpense('${exp.id}')" style="border:none; background:none; font-size:0.8rem;">🗑️</button>
                </div>
            </div>
        </div>`;
    }).join('');
    document.getElementById('totalSpent').innerText = '₹' + total.toLocaleString('en-IN');
    updateChart(gExp);
}

function updateChart(data) {
    const canvas = document.getElementById('categoryChart');
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const totals = {};
    data.forEach(e => { if(e.type !== 'settlement') totals[e.category || '⚙️ Misc'] = (totals[e.category] || 0) + parseFloat(e.amount); });
    if (categoryChart) categoryChart.destroy();
    if(Object.keys(totals).length === 0) return;
    categoryChart = new Chart(ctx, {
        type: 'doughnut',
        data: { labels: Object.keys(totals), datasets: [{ data: Object.values(totals), backgroundColor: ['#3b82f6','#10b981','#f39c12','#ef4444','#8b5cf6'], borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { display: false } } }
    });
}

function calculateDebts() {
    const gExp = EXPENSES.filter(e => e.groupId === activeGroupId);
    const gMembers = MEMBERS.filter(m => m.groupId === activeGroupId);
    if (gMembers.length < 2) { document.getElementById('settlementSummary').innerText = "Add members to this trip."; return; }
    
    let balances = {}; gMembers.forEach(m => balances[m.id] = 0);
    gExp.forEach(exp => {
        const amt = parseFloat(exp.amount);
        const parts = exp.participants || gMembers.map(m=>m.id);
        const share = amt / parts.length;
        if(balances[exp.payerId] !== undefined) balances[exp.payerId] += amt;
        parts.forEach(pId => { if(balances[pId] !== undefined) balances[pId] -= share; });
    });
    
    let instructions = [];
    let tempBal = {...balances};
    let debtors = gMembers.filter(m => tempBal[m.id] < -1).sort((a,b) => tempBal[a.id] - tempBal[b.id]);
    let creditors = gMembers.filter(m => tempBal[m.id] > 1).sort((a,b) => tempBal[b.id] - tempBal[a.id]);

    debtors.forEach(d => {
        creditors.forEach(c => {
            let owed = Math.min(Math.abs(tempBal[d.id]), tempBal[c.id]);
            if (owed > 1) {
                instructions.push(`<div class="expense-item" style="border-left:4px solid #ef4444; background:rgba(239,68,68,0.05);">
                    <div style="flex:1; font-size:0.8rem;"><b>${d.name}</b> owes <b>${c.name}</b></div>
                    <div style="font-weight:bold; color:#ef4444; margin-right:10px;">₹${owed.toFixed(0)}</div>
                    <button class="btn btn-sm btn-success" onclick="settleDebt('${d.id}','${d.name}','${c.id}','${c.name}',${owed})">Settle</button>
                </div>`);
                tempBal[d.id] += owed; tempBal[c.id] -= owed;
            }
        });
    });
    document.getElementById('settlementSummary').innerHTML = instructions.length ? instructions.join('') : "✅ All clear!";
}

async function saveExpense() {
    const id = document.getElementById('editExpId').value;
    const payerId = document.getElementById('expPayer').value;
    const parts = Array.from(document.querySelectorAll('.split-cb:checked')).map(cb => cb.value);
    const desc = document.getElementById('expDesc').value;
    const amt = parseFloat(document.getElementById('expAmount').value);

    if(!activeGroupId) return alert("Select a trip!");
    if(!desc || isNaN(amt) || !payerId || parts.length === 0) return alert("Fill all fields and select members!");

    const data = {
        groupId: activeGroupId, description: desc,
        amount: amt,
        category: document.getElementById('expCategory').value,
        payerId: payerId, payerName: MEMBERS.find(m => m.id === payerId)?.name,
        participants: parts, timestamp: firebase.firestore.FieldValue.serverTimestamp()
    };
    if(id) await db.collection('expenses').doc(id).update(data);
    else await db.collection('expenses').add(data);
    closeModal('expenseModal');
}

function prepareNewExpense() {
    if(!activeGroupId) return alert("Create a trip first!");
    const group = GROUPS.find(g => g.id === activeGroupId);
    const gMembers = MEMBERS.filter(m => m.groupId === activeGroupId);
    if(gMembers.length === 0) return alert("Add members to this trip first!");
    
    document.getElementById('modalTitle').innerText = "Add Expense";
    document.getElementById('modalGroupContext').innerText = `Adding to: ${group.name}`;
    document.getElementById('editExpId').value = "";
    document.getElementById('expDesc').value = "";
    document.getElementById('expAmount').value = "";
    renderParticipantsChecklist();
    updatePayerDropdown();
    openModal('expenseModal');
}

function editExpense(id) {
    const exp = EXPENSES.find(e => e.id === id);
    if(!exp) return;
    const group = GROUPS.find(g => g.id === exp.groupId);
    document.getElementById('modalTitle').innerText = "Edit Expense";
    document.getElementById('modalGroupContext').innerText = `Trip: ${group ? group.name : 'Unknown'}`;
    document.getElementById('editExpId').value = id;
    document.getElementById('expDesc').value = exp.description;
    document.getElementById('expAmount').value = exp.amount;
    document.getElementById('expCategory').value = exp.category || "⚙️ Misc";
    updatePayerDropdown();
    document.getElementById('expPayer').value = exp.payerId;
    renderParticipantsChecklist(exp.participants || []);
    openModal('expenseModal');
}

async function saveGroup() {
    const id = document.getElementById('editGroupId').value;
    const name = document.getElementById('groupName').value.trim();
    if(!name) return alert("Enter trip name!");
    if(id) await db.collection('groups').doc(id).update({name});
    else { const doc = await db.collection('groups').add({name}); setActiveGroup(doc.id); }
    closeModal('groupModal');
}

function openGroupModal(id = null) {
    if(id) {
        const g = GROUPS.find(x => x.id === id);
        document.getElementById('gModalTitle').innerText = "Edit Trip";
        document.getElementById('editGroupId').value = id;
        document.getElementById('groupName').value = g.name;
        document.getElementById('delGroupBtn').style.display = "block";
    } else {
        document.getElementById('gModalTitle').innerText = "New Trip";
        document.getElementById('editGroupId').value = "";
        document.getElementById('groupName').value = "";
        document.getElementById('delGroupBtn').style.display = "none";
    }
    openModal('groupModal');
}

async function deleteGroup() {
    const id = document.getElementById('editGroupId').value;
    if(confirm("Delete this trip and all its expenses?")) {
        await db.collection('groups').doc(id).delete();
        activeGroupId = null;
        closeModal('groupModal');
    }
}

async function saveMember() {
    const gid = document.getElementById('memGroupLink').value;
    const name = document.getElementById('memName').value.trim();
    if(!gid || !name) return alert("Select trip and enter name!");
    await db.collection('members').add({name, groupId: gid});
    document.getElementById('memName').value = "";
    closeModal('memberModal');
}

function openAddMemberModal() {
    if(GROUPS.length === 0) return alert("Create a trip first!");
    updateMemberGroupDropdown();
    if(activeGroupId) document.getElementById('memGroupLink').value = activeGroupId;
    openModal('memberModal');
}

function renderGroups() {
    document.getElementById('groupListArea').innerHTML = GROUPS.map(g => `
        <div class="expense-item" style="border-left:5px solid ${activeGroupId === g.id ? 'var(--accent-blue)' : 'transparent'}">
            <div style="flex:1;" onclick="setActiveGroup('${g.id}')">
                <b>${g.name}</b> ${activeGroupId === g.id ? '✅' : ''}
            </div>
            <button onclick="openGroupModal('${g.id}')" style="border:none; background:none; font-size:1.1rem;">⚙️</button>
        </div>`).join('');
}

function updateMemberGroupDropdown() {
    const sel = document.getElementById('memGroupLink');
    if(!sel) return;
    sel.innerHTML = GROUPS.map(g => `<option value="${g.id}" ${g.id === activeGroupId ? 'selected' : ''}>${g.name}</option>`).join('');
}

function updatePayerDropdown() {
    const sel = document.getElementById('expPayer');
    if(!sel) return;
    const gMembers = MEMBERS.filter(m => m.groupId === activeGroupId);
    sel.innerHTML = gMembers.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
}

function renderParticipantsChecklist(selected = []) {
    const list = document.getElementById('participantList');
    if(!list) return;
    const gMembers = MEMBERS.filter(m => m.groupId === activeGroupId);
    list.innerHTML = gMembers.map(m => `
        <label class="participant-chip">
            <input type="checkbox" value="${m.id}" class="split-cb" 
            ${selected.length === 0 || selected.includes(m.id) ? 'checked' : ''}> ${m.name}
        </label>`).join('') || '<div class="small text-dim">Add members to this trip first!</div>';
}

async function deleteMember(id) { if(confirm("Delete member?")) await db.collection('members').doc(id).delete(); }
async function deleteExpense(id) { if(confirm("Delete expense?")) await db.collection('expenses').doc(id).delete(); }
async function settleDebt(fId, fName, tId, tName, amt) { await db.collection('expenses').add({ groupId: activeGroupId, description: `Settlement: ${fName} to ${tName}`, amount: amt, payerId: fId, payerName: fName, participants: [tId], type: 'settlement', timestamp: firebase.firestore.FieldValue.serverTimestamp() }); }

function openModal(id) { document.getElementById(id).style.display = 'block'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

function switchTab(t) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.getElementById(t+'Tab').classList.add('active');
    document.getElementById('nav' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
}

function toggleTheme() {
    const root = document.documentElement;
    const icon = document.getElementById('themeIcon');
    const isDark = getComputedStyle(root).getPropertyValue('--bg-dark').trim() === '#0a0e1a';
    if (isDark) {
        root.style.setProperty('--bg-dark', '#f8fafc'); root.style.setProperty('--card-bg', '#ffffff');
        root.style.setProperty('--input-bg', '#f1f5f9'); root.style.setProperty('--text-main', '#0f172a');
        root.style.setProperty('--text-dim', '#64748b'); root.style.setProperty('--border', '#e2e8f0');
        icon.innerText = '☀️';
    } else {
        root.style.setProperty('--bg-dark', '#0a0e1a'); root.style.setProperty('--card-bg', '#141b2d');
        root.style.setProperty('--input-bg', '#1c253b'); root.style.setProperty('--text-main', '#ffffff');
        root.style.setProperty('--text-dim', '#8e9aaf'); root.style.setProperty('--border', '#252f48');
        icon.innerText = '🌙';
    }
}

document.addEventListener('DOMContentLoaded', startApp);
</script>
</body>
</html>
