const db = firebase.firestore();

// COMPRESSED LOGIC CORE
let _dbCache = {}, _cacheTs = {};
const getCollection = async (col) => {
    if (_dbCache[col] && (Date.now() - _cacheTs[col] < 60000)) return _dbCache[col];
    const s = await db.collection(col).get();
    _dbCache[col] = s.docs.map(d => ({id: d.id, ...d.data()}));
    _cacheTs[col] = Date.now();
    return _dbCache[col];
};
