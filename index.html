<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Chit Funds - Management Vault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --bg:#0a0e1a; --card:#141b2d; --inp:#1c253b; --gold:linear-gradient(90deg,#ff9800,#f57c00); --txt:#fff; --dim:#8e9aaf; --brd:#252f48; }
        body { background:var(--bg); color:var(--txt); font-family:'Segoe UI',sans-serif; padding-bottom:100px; margin:0; }
        .app-h { display:flex; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--brd); background:var(--card); position:sticky; top:0; z-index:1000; }
        .stat-card { background:var(--card); border:1px solid var(--brd); border-radius:15px; padding:12px; text-align:center; height:100%; }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; padding:20px; overflow-y:auto; }
        .m-content { background:var(--card); border-radius:25px; padding:25px; max-width:450px; margin:auto; border: 1px solid var(--brd); }
        .f-inp { background:var(--inp); border:1px solid var(--brd); color:#fff; padding:12px; border-radius:12px; width:100%; margin-bottom:10px; font-size:0.9rem; }
        .nav-b { position:fixed; bottom:0; width:100%; background:#070b14; display:flex; justify-content:space-around; padding:12px 0; border-top:1px solid var(--brd); z-index:1000; }
        .n-item { cursor:pointer; text-align:center; font-size:0.65rem; color:var(--dim); transition: 0.3s; }
        .n-item.active { color:#f39c12; font-weight:bold; }
        .sap-card { background:var(--card); border:1px solid var(--brd); border-radius:12px; padding:15px; margin-bottom:12px; border-left:4px solid #f39c12; transition: 0.2s; }
        .t-custom { color:#fff; font-size:0.75rem; width:100%; border-collapse: collapse; }
        .t-custom th { color:var(--dim); padding:10px 5px; border-bottom:1px solid var(--brd); text-transform:uppercase; font-size:0.6rem; }
        .t-custom td { padding:10px 5px; border-bottom:1px solid rgba(255,255,255,0.05); }
        .tab-c { display:none; } .tab-c.active { display:block; }
        .suggest-l { background:var(--inp); border:1px solid var(--brd); position:absolute; width:100%; z-index:100; max-height:150px; overflow-y:auto; border-radius: 0 0 12px 12px; }
        .btn-upi { background:#10b981; color:#fff; border:none; padding:4px 10px; border-radius:6px; font-size:0.65rem; font-weight:bold; text-decoration:none; }
    </style>
</head>
<body>

<header class="app-h">
    <div class="text-warning fw-bold fs-5">AK CHIT FUNDS</div>
    <div class="d-flex gap-2">
        <button id="accessReqBtn" onclick="openAccessRequests()" class="btn btn-sm btn-dark text-warning border-warning">Requests</button>
        <button class="btn btn-sm btn-outline-danger" onclick="handleLogout()">⏻</button>
    </div>
</header>

<div class="container py-3">
    <main id="homeTab" class="tab-c active">
        <div class="row g-2">
            <div class="col-4"><div class="stat-card"><span class="d-block fw-bold text-warning" id="memberCount">0</span><small class="stat-label">Members</small></div></div>
            <div class="col-4"><div class="stat-card"><span class="d-block fw-bold text-warning" id="groupCount">0</span><small class="stat-label">Groups</small></div></div>
            <div class="col-4"><div class="stat-card text-success"><span class="d-block fw-bold" id="todayColl">₹0</span><small class="stat-label">Today</small></div></div>
        </div>

        <button class="btn btn-warning w-100 py-3 mt-3 rounded-4 fw-bold shadow" onclick="openModal('paymentModal')">💳 Record Payment</button>

        <div class="mt-4 p-3 bg-dark rounded-4 border border-secondary position-relative">
            <input type="text" id="summarySearch" class="f-inp" placeholder="🔍 Search Member Ledger..." oninput="filterSearch('summarySearch','summaryList','summaryView')">
            <div id="summaryList" class="suggest-l" style="display:none;"></div>
            <input type="hidden" id="summaryView">
            <div id="ledgerData" class="mt-3"></div>
        </div>
    </main>

    <section id="groupsTab" class="tab-c">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold">My Groups</h5>
            <button class="btn btn-sm btn-success" onclick="openAddGroup()">+ New Group</button>
        </div>
        <div id="groupListArea"></div>
    </section>

    <section id="backupTab" class="tab-c">
        <div class="stat-card p-4">
            <h6 class="mb-3">Data Management</h6>
            <button class="btn btn-outline-warning w-100 mb-2" onclick="exportFullBackup()">💾 Download JSON</button>
            <button class="btn btn-outline-success w-100 mb-4" onclick="exportToExcel()">📊 Export Excel</button>
            <input type="file" id="restoreFile" class="form-control bg-dark text-white border-secondary mb-2">
            <button class="btn btn-danger w-100" onclick="confirmRestore()">🔄 Restore Data</button>
        </div>
    </section>
</div>

<nav class="nav-b">
    <div class="n-item active" onclick="switchTab('home')" id="navHome">🏠<br>Home</div>
    <div class="n-item" onclick="switchTab('groups')" id="navGroups">📁<br>Groups</div>
    <div class="n-item" onclick="switchTab('backup')" id="navBackup">💾<br>Backup</div>
</nav>

<div id="paymentModal" class="modal-overlay">
    <div class="m-content">
        <h5 class="mb-3 fw-bold">Record Payment</h5>
        <input type="date" id="pDate" class="f-inp">
        <input type="text" id="pMemberSearch" class="f-inp" placeholder="Search Member...">
        <select id="pGroup" class="f-inp"><option value="">Select Group</option></select>
        <div class="row g-2">
            <div class="col-6"><input type="number" id="pChit" class="f-inp" placeholder="Chit ₹"></div>
            <div class="col-6"><input type="number" id="pPaid" class="f-inp" placeholder="Paid ₹"></div>
        </div>
        <button class="btn btn-warning w-100 py-2 fw-bold" onclick="savePayment()">✓ Save Sync</button>
        <button class="btn btn-link w-100 text-white mt-2" onclick="closeModal('paymentModal')">Cancel</button>
    </div>
</div>

<script>
    // PART 1: CONFIG & INITIALIZATION
    const firebaseConfig = { 
        apiKey: "AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU", 
        authDomain: "ak-events-2016.firebaseapp.com", 
        projectId: "ak-events-2016" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let _dbCache = {};

    const fmtAmt = v => '₹' + (parseFloat(v)||0).toLocaleString('en-IN');
    const fmtDate = d => d ? d.split("-").reverse().join("/") : "—";

    async function getCollection(col) {
        if(_dbCache[col]) return _dbCache[col];
        const s = await db.collection(col).get();
        _dbCache[col] = s.docs.map(d=>({id:d.id, ...d.data()}));
        return _dbCache[col];
    }

    // PART 2: SACRED LOGIC (PLANNER & LEDGER)
    const ChitPlanner = {
        generateSchedule: function(amount, members, duration, escalation) {
            const r = escalation / 100;
            let basePay = r > 0 ? (amount * r) / (Math.pow(1 + r, duration) - 1) : (amount / members);
            return Array.from({ length: duration }, (_, i) => Math.round(basePay * Math.pow(1 + r, i)));
        }
    };

    async function loadMemberLedger() {
        const mid = document.getElementById('summaryView').value;
        if (!mid) return;
        const [ms, gs, ps] = await Promise.all([getCollection('members'), getCollection('groups'), getCollection('payments')]);
        const m = ms.find(x => x.id === mid);
        const mPays = ps.filter(p => p.memberId === mid);

        document.getElementById('ledgerData').innerHTML = mPays.map(p => `
            <div class="sap-card">
                <div class="d-flex justify-content-between">
                    <b>${fmtDate(p.date)}</b>
                    <span class="text-success fw-bold">${fmtAmt(p.paid)}</span>
                </div>
                <div class="small text-dim">Balance: ${fmtAmt(p.balance)} | Mode: ${p.paidBy || '—'}</div>
            </div>
        `).join('') || '<div class="text-center text-dim">No payment history.</div>';
    }

    // PART 3: UTILITIES (BACKUP & WHATSAPP)
    function sendWhatsApp(phone, msg) {
        window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    async function exportFullBackup() {
        const data = { m: await getCollection('members'), g: await getCollection('groups'), p: await getCollection('payments') };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `AK_Chit_Backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
    }

    // UI CONTROLS
    function switchTab(t) {
        document.querySelectorAll('.tab-c').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.n-item').forEach(i => i.classList.remove('active'));
        document.getElementById(t + 'Tab').classList.add('active');
        document.getElementById('nav' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
    }

    function openModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // Init App
    document.addEventListener('DOMContentLoaded', () => {
        getCollection('payments').then(() => {
            document.getElementById('memberCount').innerText = _dbCache['members']?.length || 0;
            document.getElementById('groupCount').innerText = _dbCache['groups']?.length || 0;
        });
    });
</script>
</body>
</html>
