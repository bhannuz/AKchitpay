<div id="groupCreateModal" class="modal-overlay">
    <div class="modal-content-custom">
        <h5 style="font-weight:900;">Create Trip Group</h5>
        <input type="text" id="newGroupName" class="form-input" placeholder="Trip Name (e.g. Goa 2026)">
        <button class="btn-primary-custom" onclick="saveNewGroup()">Create Group</button>
        <button class="btn-ghost" onclick="closeModal('groupCreateModal')">Cancel</button>
    </div>

<script>
// 1. ADD NEW GLOBAL STATE
let GROUPS = [];
let activeGroupId = localStorage.getItem('activeGroupId') || null;

// 2. UPDATE startApp TO LISTEN FOR GROUPS
function startApp() {
    initMonthFilter();
    
    // Listen for Groups
    db.collection('groups').onSnapshot(snap => {
        GROUPS = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
        if (!activeGroupId && GROUPS.length > 0) setActiveGroup(GROUPS[0].id);
        renderGroups();
    });

    // Modified Member Sync (Filters by Active Group)
    db.collection('members').onSnapshot(snap => {
        MEMBERS = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
        renderMembers();
        updatePayerDropdown();
        renderParticipantsChecklist();
    });

    // Modified Expense Sync (Filters by Active Group)
    db.collection('expenses').orderBy('timestamp', 'desc').onSnapshot(snap => {
        EXPENSES = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
        renderExpenses();
        calculateDebts();
    });
}

// 3. GROUP SWITCHING LOGIC
function setActiveGroup(id) {
    activeGroupId = id;
    localStorage.setItem('activeGroupId', id);
    document.querySelectorAll('.group-card-item').forEach(el => el.style.borderColor = 'var(--border)');
    renderExpenses();
    calculateDebts();
}

async function saveNewGroup() {
    const name = document.getElementById('newGroupName').value;
    if(!name) return;
    const doc = await db.collection('groups').add({ name, createdAt: new Date() });
    setActiveGroup(doc.id);
    closeModal('groupCreateModal');
}

function renderGroups() {
    const list = document.getElementById('groupListArea');
    list.innerHTML = GROUPS.map(g => `
        <div class="expense-item group-card-item" 
             style="cursor:pointer; border-left: 5px solid ${activeGroupId === g.id ? 'var(--accent-blue)' : 'transparent'}" 
             onclick="setActiveGroup('${g.id}')">
            <div class="avatar">${g.name[0].toUpperCase()}</div>
            <div style="flex:1;">
                <div style="font-weight:bold;">${g.name}</div>
                <div style="font-size:0.7rem; color:var(--text-dim);">${activeGroupId === g.id ? 'Active Group' : 'Switch to Group'}</div>
            </div>
            ${activeGroupId === g.id ? '✅' : ''}
        </div>
    `).join('');
}
