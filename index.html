<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Chit Funds - Admin Portal v3.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg:#0a0e1a; --card:#141b2d; --inp:#1c253b; --gold:#f39c12; --border:#252f48; --text-dim:#8e9aaf; --purple:#818cf8; --orange-btn: #ff851b; }
        body { background-color:var(--bg); color:white; font-family:'Segoe UI',sans-serif; padding-bottom:100px; margin:0; }
        
        /* Stats & UI */
        .stat-card { background:var(--card); border:1px solid var(--border); border-radius:15px; padding:15px; text-align:center; }
        .stat-num { font-size:1.8rem; font-weight:bold; }
        .btn-record-main { background:var(--gold); color:#000; font-weight:800; border:none; padding:18px; border-radius:15px; width:88%; font-size:1.1rem; }
        .btn-refresh-sq { background:var(--card); border:1px solid var(--border); color:var(--gold); border-radius:12px; width:45px; display:flex; justify-content:center; align-items:center; cursor:pointer; }
        
        /* Search & Ledger */
        .search-box { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px; width:100%; color:white; outline:none; }
        .suggestions-list { position:absolute; width:100%; background:var(--inp); border:1px solid var(--border); z-index:3000; border-radius:0 0 12px 12px; max-height:200px; overflow-y:auto; display:none; }
        .suggestion-item { padding:12px; cursor:pointer; border-bottom:1px solid var(--border); }
        .suggestion-item:hover { background:var(--card); color:var(--gold); }

        /* Member Card & Table */
        .member-card { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:20px; margin-top:20px; }
        .avatar { width:45px; height:45px; background:rgba(243,156,18,0.1); border:1px solid var(--gold); color:var(--gold); border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:1.2rem; }
        .badge-v3 { background:rgba(243,156,18,0.2); color:var(--gold); border:1px solid var(--gold); padding:1px 6px; border-radius:5px; font-size:0.65rem; font-weight:bold; }
        .badge-meta { background:rgba(99,102,241,0.15); color:#a5b4fc; border:1px solid rgba(99,102,241,0.3); padding:3px 8px; border-radius:6px; font-size:0.65rem; margin-right:5px; }
        .history-bar { background:rgba(255,255,255,0.03); padding:12px 15px; border-radius:10px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; margin-top:15px; border: 1px solid var(--border); }
        .table-history { width:100%; font-size:0.75rem; margin-top:10px; border-collapse: separate; border-spacing: 0 4px; }
        .table-history th { color:var(--text-dim); padding:10px; text-transform:uppercase; font-size:0.55rem; border-bottom: 1px solid var(--border); }
        .table-history td { padding:10px; vertical-align: middle; background: rgba(255,255,255,0.01); }

        /* Modals */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; padding:20px; overflow-y:auto; }
        .m-content { background:var(--card); border-radius:25px; padding:25px; max-width:480px; margin:auto; border: 1px solid var(--border); }
        .f-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; display: block; letter-spacing: 0.5px; }
        .f-inp { background:var(--inp); border:1px solid var(--border); color:white; padding:12px; border-radius:10px; width:100%; margin-bottom:15px; font-size:0.9rem; }
        
        /* Month Selector Grid */
        .month-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px; margin-bottom: 15px; }
        .month-item { background: var(--inp); border: 1px solid var(--border); padding: 8px; border-radius: 8px; text-align: center; cursor: pointer; font-size: 0.7rem; }
        .month-item.selected { border-color: var(--purple); background: rgba(129, 140, 248, 0.15); }
        .month-item.paid { color: #2ecc71; opacity: 0.5; pointer-events: none; border-color: #2ecc71; }

        /* Print Styling */
        #printOverlay { position:fixed; inset:0; background:white; z-index:99999; overflow-y:auto; padding:30px; display:none; color:#000; }
        .print-box { border: 2px solid var(--gold); border-radius: 15px; padding: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .print-stat { border: 1px solid #ddd; padding: 10px; border-radius: 8px; text-align: center; min-width: 80px; }
        .print-table { width:100%; border-collapse: collapse; font-size: 11px; }
        .print-table th { background: #f5f5f5; border: 1px solid #ddd; padding: 8px; }
        .print-table td { border: 1px solid #eee; padding: 8px; }

        /* Nav */
        .nav-bar { position:fixed; bottom:0; width:100%; background:#070b14; display:flex; justify-content:space-around; padding:15px 0; border-top:1px solid var(--border); z-index: 1000; }
        .nav-item { cursor:pointer; text-align:center; font-size:0.7rem; color:var(--text-dim); text-decoration:none; }
        .nav-item.active { color:var(--gold); font-weight: bold; }
    </style>
</head>
<body>

<div id="printOverlay"></div>

<div class="container py-3">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex gap-2">
            <span class="badge rounded-pill bg-warning text-dark px-3 py-2 fw-bold">ADMIN</span>
            <button class="btn btn-sm btn-dark border border-secondary rounded-pill text-warning">🔒 Requests</button>
        </div>
        <button class="btn btn-sm btn-outline-danger rounded-pill px-3" onclick="location.reload()">Logout</button>
    </div>

    <div class="row g-2 mb-4 text-center">
        <div class="col-4"><div class="stat-card"><div class="stat-num" id="stM">0</div><small class="text-dim">Members</small></div></div>
        <div class="col-4"><div class="stat-card"><div class="stat-num" id="stG">0</div><small class="text-dim">Groups</small></div></div>
        <div class="col-4"><div class="stat-card"><div class="stat-num text-success" id="stT">₹0</div><small class="text-dim">Today</small></div></div>
    </div>

    <div class="d-flex gap-2 mb-4">
        <button class="btn-record-main" onclick="openModal('payModal')">💳 Record Payment</button>
        <div class="btn-refresh-sq" onclick="sync()">🔄</div>
    </div>

    <div class="position-relative mb-4 d-flex gap-2">
        <input type="text" id="mSearch" class="search-box" placeholder="Search Member for Summary / PDF..." oninput="handleSearch(this.value, 'mSuggestions', 'mSearch', true)">
        <div class="btn-refresh-sq" onclick="location.reload()">🔄</div>
        <div id="mSuggestions" class="suggestions-list shadow-lg"></div>
    </div>

    <div class="row g-2 mb-4">
        <div class="col-6"><button class="btn btn-outline-warning w-100 py-3 fw-bold" style="border-radius:12px;" onclick="openModal('memModal')">👤 Create Member</button></div>
        <div class="col-6"><button class="btn btn-outline-success w-100 py-3 fw-bold" style="border-radius:12px;" onclick="openModal('grpModal')">🏦 New Group</button></div>
    </div>

    <div id="ledgerArea"></div>
</div>

<div id="payModal" class="modal-overlay"><div class="m-content">
    <div class="d-flex justify-content-between mb-4"><h5>💳 Record Payment</h5><button class="btn btn-sm btn-outline-warning" onclick="resetPayForm()">Refresh</button></div>
    <label class="f-label">PAYMENT DATE</label><input type="date" id="pDate" class="f-inp">
    <label class="f-label">MEMBER</label>
    <div class="position-relative">
        <input type="text" id="pMSearch" class="f-inp" placeholder="🔍 Search Member..." oninput="handleSearch(this.value, 'pSuggestions', 'pMSearch', false)">
        <div id="pSuggestions" class="suggestions-list"></div>
        <input type="hidden" id="pSelectedMid">
    </div>
    <label class="f-label">GROUP / ENROLLMENT</label>
    <select id="pGroup" class="f-inp" onchange="onGroupSelect()"><option value="">-- Select Member First --</option></select>
    <label class="f-label">PAYMENT TYPE</label>
    <select id="pType" class="f-inp" onchange="toggleMonthGrid()"><option value="single">Single Month</option><option value="multi">Multiple Months (Bulk) 📅</option></select>
    <div id="monthArea" style="display:none;"><div id="monthGrid" class="month-grid"></div></div>
    <div class="row g-2">
        <div class="col-6"><label class="f-label">CHIT AMOUNT</label><input type="number" id="pChit" class="f-inp" placeholder="₹ per mo"></div>
        <div class="col-6"><label class="f-label">TOTAL PAID</label><input type="number" id="pPaid" class="f-inp" placeholder="₹ total"></div>
    </div>
    <label class="f-label">PAID BY</label>
    <select id="pMode" class="f-inp"><option>GPay</option><option>PhonePe</option><option>Cash</option></select>
    <label class="f-label">CHIT PICKED?</label>
    <select id="pPicked" class="f-inp"><option value="No">No</option><option value="Yes">Yes ✅</option></select>
    <button class="btn w-100 py-3 fw-bold mt-2" style="background:linear-gradient(90deg,#ff8000,#ff9500); color:black; border-radius:12px;" onclick="savePayment()">✓ Sync Payment</button>
</div></div>

<div id="memModal" class="modal-overlay"><div class="m-content">
    <h5 class="mb-4">👤 Create Member</h5>
    <input type="text" id="memN" class="f-inp" placeholder="Full Name">
    <input type="tel" id="memP" class="f-inp" placeholder="Phone Number">
    <button class="btn btn-warning w-100 py-2 fw-bold" onclick="createMember()">Create</button>
</div></div>

<div id="grpModal" class="modal-overlay"><div class="m-content">
    <h5 class="mb-4">🏦 New Group</h5>
    <input type="text" id="grpN" class="f-inp" placeholder="Group Name">
    <input type="number" id="grpD" class="f-inp" placeholder="Duration (Months)">
    <button class="btn btn-success w-100 py-2 fw-bold" onclick="createGroup()">Create</button>
</div></div>

<nav class="nav-bar">
    <div class="nav-item active">🏠<br>Home</div>
    <div class="nav-item">📁<br>Groups</div>
    <div class="nav-item">📜<br>List</div>
    <div class="nav-item">📲<br>Remind</div>
    <div class="nav-item">💾<br>Backup</div>
</nav>

<script>
// --- CORE LOGIC ---
const firebaseConfig = { apiKey: "AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU", authDomain: "ak-events-2016.firebaseapp.com", projectId: "ak-events-2016" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let _cache = { m: [], g: [], p: [] };

async function sync() {
    const [m, g, p] = await Promise.all([db.collection('members').get(), db.collection('groups').get(), db.collection('payments').get()]);
    _cache.m = m.docs.map(d => ({id:d.id, ...d.data()}));
    _cache.g = g.docs.map(d => ({id:d.id, ...d.data()}));
    _cache.p = p.docs.map(d => ({id:d.id, ...d.data()}));
    document.getElementById('stM').innerText = _cache.m.length;
    document.getElementById('stG').innerText = _cache.g.length;
}

function handleSearch(val, listId, inputId, isMain) {
    const list = document.getElementById(listId);
    if (val.length < 1) { list.style.display = 'none'; return; }
    const filtered = _cache.m.filter(m => m.name.toLowerCase().includes(val.toLowerCase()));
    list.innerHTML = filtered.map(m => `<div class="suggestion-item" onclick="onSelect('${m.id}','${m.name}','${listId}','${inputId}',${isMain})">${m.name}</div>`).join('');
    list.style.display = 'block';
}

function onSelect(id, name, listId, inputId, isMain) {
    document.getElementById(inputId).value = name;
    document.getElementById(listId).style.display = 'none';
    if(isMain) renderLedger(id);
    else {
        document.getElementById('pSelectedMid').value = id;
        const member = _cache.m.find(x => x.id === id);
        document.getElementById('pGroup').innerHTML = (member.groupIds || []).map(gid => `<option value="${gid}">${_cache.g.find(g=>g.id===gid).name}</option>`).join('');
        checkChitStatus();
    }
}

function renderLedger(mid) {
    const m = _cache.m.find(x => x.id === mid);
    const mPays = _cache.p.filter(p => p.memberId === mid);
    const totalPaid = mPays.reduce((s, p) => s + (parseFloat(p.amountPaid) || 0), 0);
    const totalBal = mPays.reduce((s, p) => s + (parseFloat(p.balance) || 0), 0);

    document.getElementById('ledgerArea').innerHTML = `
        <div class="member-card">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <div class="avatar">${m.name[0]}</div>
                    <div><h4 class="mb-0 fw-bold">${m.name}</h4><small class="text-dim">${mPays.length} payments · 1 group</small></div>
                </div>
                <button class="btn-print-orange" onclick="printPDF('${m.id}')">🖨️ Print</button>
            </div>
            <div class="d-flex justify-content-between mt-4">
                <div><span class="fw-bold" style="color:var(--gold)">📁 5 Lakhs <span class="badge-v3">V3</span></span></div>
                <div class="text-end"><h4>19<small class="text-dim">/21</small></h4><small class="text-dim" style="font-size:0.5rem">MONTHS PENDING</small></div>
            </div>
            <div class="history-bar" onclick="toggleHistory()">
                <span class="small fw-bold text-dim">PAYMENT HISTORY</span>
                <div class="d-flex gap-3"><span class="text-success fw-bold">₹${totalPaid.toLocaleString()} paid</span><span id="chev">▼</span></div>
            </div>
            <div id="hist" style="display:none; overflow-x:auto;">
                <table class="table-history">
                    <thead><tr><th>#</th><th>Month</th><th>Date</th><th>Paid</th><th>Bal</th><th>Pick</th></tr></thead>
                    <tbody>${mPays.map((p, i) => `<tr><td>${i+1}</td><td>05/03</td><td>${p.date}</td><td class="text-success">₹${p.amountPaid}</td><td class="text-warning">₹${p.balance}</td><td>${p.chitPicked || '—'}</td></tr>`).join('')}</tbody>
                </table>
            </div>
        </div>`;
}

// PDF Print Engine (Standard White Statement)
function printPDF(mid) {
    const m = _cache.m.find(x => x.id === mid);
    const mPays = _cache.p.filter(p => p.memberId === mid);
    const totalPaid = mPays.reduce((s, p) => s + (parseFloat(p.amountPaid) || 0), 0);
    const totalBal = mPays.reduce((s, p) => s + (parseFloat(p.balance) || 0), 0);
    const picked = mPays.filter(p => p.chitPicked === 'Yes').length;

    const overlay = document.getElementById('printOverlay');
    overlay.innerHTML = `
        <div class="no-print mb-4"><button class="btn btn-warning fw-bold" onclick="window.print()">Confirm Print</button> <button class="btn btn-light border" onclick="this.parentElement.parentElement.style.display='none'">Close</button></div>
        <h3>MEMBER STATEMENT</h3>
        <div class="print-box">
            <div><h1>${m.name}</h1><p>Groups: 5 Lakhs (V3)</p></div>
            <div class="d-flex gap-2">
                <div class="print-stat"><b style="color:green">Rs.${totalPaid}</b><br><small>PAID</small></div>
                <div class="print-stat"><b style="color:red">Rs.${totalBal}</b><br><small>BAL</small></div>
                <div class="print-stat"><b>${mPays.length}</b><br><small>PAYS</small></div>
                <div class="print-stat"><b>${picked}</b><br><small>PICKED</small></div>
            </div>
        </div>
        <table class="print-table">
            <thead><tr><th>#</th><th>Covered</th><th>Pay Date</th><th>Chit Amt</th><th>Paid</th><th>Balance</th><th>Mode</th></tr></thead>
            <tbody>${mPays.map((p, i) => `<tr><td>${i+1}</td><td>05/03/26</td><td>${p.date}</td><td>Rs.${parseFloat(p.amountPaid)+parseFloat(p.balance)}</td><td>Rs.${p.amountPaid}</td><td>Rs.${p.balance}</td><td>${p.mode||'GPay'}</td></tr>`).join('')}</tbody>
        </table>`;
    overlay.style.display = 'block';
}

function checkChitStatus() {
    const mid = document.getElementById('pSelectedMid').value;
    const gid = document.getElementById('pGroup').value;
    const isPicked = _cache.p.some(p => p.memberId === mid && p.groupId === gid && p.chitPicked === 'Yes');
    const sel = document.getElementById('pPicked');
    if (isPicked) { sel.value = "No"; sel.options[1].disabled = true; sel.style.opacity = "0.5"; }
    else { sel.options[1].disabled = false; sel.style.opacity = "1"; }
}

function onGroupSelect() { checkChitStatus(); if(document.getElementById('pType').value === 'multi') generateMonthGrid(); }
function toggleMonthGrid() { document.getElementById('monthArea').style.display = document.getElementById('pType').value === 'multi' ? 'block' : 'none'; generateMonthGrid(); }
function generateMonthGrid() {
    const grid = document.getElementById('monthGrid');
    grid.innerHTML = Array.from({length:12}, (_,i)=> `<div class="month-item" onclick="this.classList.toggle('selected')">Month ${i+1}</div>`).join('');
}

async function savePayment() {
    const data = {
        memberId: document.getElementById('pSelectedMid').value,
        groupId: document.getElementById('pGroup').value,
        amountPaid: parseFloat(document.getElementById('pPaid').value),
        balance: parseFloat(document.getElementById('pChit').value) - parseFloat(document.getElementById('pPaid').value),
        mode: document.getElementById('pMode').value,
        chitPicked: document.getElementById('pPicked').value,
        date: document.getElementById('pDate').value
    };
    await db.collection('payments').add(data);
    closeModal('payModal'); sync();
}

function toggleHistory() {
    const el = document.getElementById('hist');
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function openModal(id) { 
    if(id === 'payModal') document.getElementById('pDate').value = new Date().toISOString().split('T')[0];
    document.getElementById(id).style.display = 'block'; 
}
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
sync();
</script>
</body>
</html>
