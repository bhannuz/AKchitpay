<!-- HTML Section -->
<div id="group-details">
  <h3>Group: <span id="group-name"></span></h3>
  <div id="upi-link-container"></div>

  <!-- Admin input to update UPI link -->
  <input type="text" id="upi-input" placeholder="Enter UPI link" style="width: 300px;"/>
  <button id="save-upi-btn">Save UPI Link</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore.js"></script>
<script>
  // Firebase configuration - replace with your config
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    // Other config values...
  };

  // Initialize Firebase
  const app = firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // Example Group ID - dynamically set this as per your app logic
  const groupId = 'exampleGroupId123';

  // Display group name and UPI link
  async function renderGroupDetails(groupId) {
    try {
      const doc = await db.collection('groups').doc(groupId).get();
      if (doc.exists) {
        const groupData = doc.data();
        document.getElementById('group-name').textContent = groupData.groupName || 'Unnamed Group';

        const container = document.getElementById('upi-link-container');
        container.innerHTML = ''; // clear previous content

        if (groupData.upiLink) {
          const upiAnchor = document.createElement('a');
          upiAnchor.href = groupData.upiLink;
          upiAnchor.textContent = 'Pay via UPI';
          upiAnchor.target = '_blank';
          upiAnchor.style = "color: blue; text-decoration: underline; font-weight: bold;";
          container.appendChild(upiAnchor);

          // Also show the link text for copy so user can copy if needed
          const copyText = document.createElement('p');
          copyText.textContent = `UPI Link: ${groupData.upiLink}`;
          container.appendChild(copyText);

          // Prefill the input box for admin efficiency
          document.getElementById('upi-input').value = groupData.upiLink;
        } else {
          container.textContent = 'No UPI link set for this group.';
          document.getElementById('upi-input').value = '';
        }
      } else {
        alert('Group not found!');
      }
    } catch (error) {
      console.error('Error fetching group details:', error);
    }
  }

  // Save/update UPI link for the group
  async function saveUpiLink(groupId, upiLink) {
    if (!upiLink.startsWith('upi://') && !upiLink.includes('upi/pay')) {
      alert('Please enter a valid UPI link starting with "upi://".');
      return;
    }
    try {
      await db.collection('groups').doc(groupId).update({
        upiLink: upiLink
      });
      alert('UPI Link updated successfully!');
      renderGroupDetails(groupId); // Refresh displayed data
    } catch (error) {
      console.error('Error updating UPI link:', error);
      alert('Failed to update UPI link. See console for details.');
    }
  }

  // Event listener for Save button
  document.getElementById('save-upi-btn').addEventListener('click', () => {
    const upiInput = document.getElementById('upi-input').value.trim();
    if (upiInput) {
      saveUpiLink(groupId, upiInput);
    } else {
      alert('Please enter a UPI link.');
    }
  });

  // Initial load
  renderGroupDetails(groupId);
</script>
